# Deployment - PSA restricted compliant
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: 1
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx user in the nginx image
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nginx
        image: 877483565445.dkr.ecr.eu-north-1.amazonaws.com/biz-net-ecr-proxy-hub/nginxinc/nginx-unprivileged
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 1m
            memory: 12Mi
            ephemeral-storage: 1Mi
          limits:
            cpu: 250m
            memory: 256Mi
            ephemeral-storage: 500Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
---
# StatefulSet - PSA restricted compliant
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}second
  labels:
    app: {{ .Release.Name }}second
spec:
  replicas: 2
  serviceName: {{ .Release.Name }}second
  selector:
    matchLabels:
      app: {{ .Release.Name }}second
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}second
    spec:
      terminationGracePeriodSeconds: 1
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx user in the nginx image
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - {{ .Release.Name }}second
              topologyKey: topology.kubernetes.io/zone
      containers:
      - name: nginx
        image: 877483565445.dkr.ecr.eu-north-1.amazonaws.com/biz-net-ecr-proxy-hub/nginxinc/nginx-unprivileged
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 1m
            memory: 12Mi
            ephemeral-storage: 1Mi
          limits:
            cpu: 250m
            memory: 256Mi
            ephemeral-storage: 500Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    autonetpol: zone
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
  - port: 8080
    targetPort: 80
    name: myhttp
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}second
  labels:
    autonetpol: zone
spec:
  selector:
    app: {{ .Release.Name }}second
  ports:
  - port: 8080
    targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-curl
  labels:
    app: {{ .Release.Name }}-curl
spec:
  terminationGracePeriodSeconds: 1
  securityContext:
    runAsNonRoot: true
    runAsUser: 100 # curl_user in curlimages/curl
    runAsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: curl
    image: 877483565445.dkr.ecr.eu-north-1.amazonaws.com/biz-net-ecr-proxy-hub/curlimages/curl
    imagePullPolicy: IfNotPresent
    command: ["sleep", "infinity"]
    resources:
      requests:
        cpu: 1m
        memory: 12Mi
        ephemeral-storage: 1Mi
      limits:
        cpu: 250m
        memory: 256Mi
        ephemeral-storage: 500Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - host: {{ .Release.Name }}.biz-net-route53.infralib.entigo.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }} #Service nimi
                port:
                  name: myhttp
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}second #Service nimi
                port:
                  number: 8080 # Service port
          - path: /apiv2
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}second #Service nimi
                port:
                  number: 8080 # Service port
          - path: /apiv3
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }} #Service nimi
                port:
                  number: 8080 # Service port
