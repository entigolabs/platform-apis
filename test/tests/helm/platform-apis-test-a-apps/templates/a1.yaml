apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: a1
  namespace: a-apps
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: a1
  project: a
  source:
    chart: platform-apis-test-app
    repoURL: ghcr.io/entigolabs
    targetRevision: ">= 0.0.0-0"
    helm:
      releaseName: a1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - Retry=true
      - ServerSideApply=true
