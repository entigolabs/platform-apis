apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: a1-default
  namespace: a-apps
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: bar
  project: a
  source:
    chart: platform-apis-test-app
    repoURL: ghcr.io/entigolabs
    targetRevision: '{{ .Values.targetRevision }}'
    helm:
      values: |
        targetRevision: '{{ .Values.targetRevision }}'
      releaseName: bar
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
