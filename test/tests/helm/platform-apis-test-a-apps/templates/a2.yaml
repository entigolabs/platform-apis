apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: a2
  namespace: a-apps
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: a2
  project: a
  source:
    chart: platform-apis-test-app
    repoURL: ghcr.io/entigolabs
    targetRevision: '{{ .Values.targetRevision }}'
    helm:
      values: |
        targetRevision: '{{ .Values.targetRevision }}'
        ingressClassName: external
      releaseName: a2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
