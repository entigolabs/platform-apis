---
apiVersion: kafka.entigo.com/v1alpha1
kind: MSK
metadata:
  name: {{ .Values.clusterName }}-observed
spec:
  clusterARN: {{ .Values.clusterARN | quote }}
---
apiVersion: kafka.entigo.com/v1alpha1
kind: Topic
metadata:
  name: test-topic-a
  namespace: {{ .Release.Namespace }}
spec:
  clusterName: {{ .Values.clusterName }}
  partitions: 6
  replicationFactor: 3
  config:
    retention.ms: '604800000'
---
apiVersion: kafka.entigo.com/v1alpha1
kind: KafkaUser
metadata:
  name: test-user-a
  namespace: {{ .Release.Namespace }}
spec:
  clusterName: {{ .Values.clusterName }}
  consumerGroups:
    - alpha
    - gamma
  acls:
    - topic: test-topic-a
      operation: Read
    - topic: test-topic-a
      operation: Write