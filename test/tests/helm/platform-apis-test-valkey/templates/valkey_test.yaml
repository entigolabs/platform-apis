---
apiVersion: database.entigo.com/v1alpha1
kind: ValkeyInstance
metadata:
  name: test-valkey-minimal
  namespace: {{ .Release.Namespace }}
spec: {}
---
apiVersion: database.entigo.com/v1alpha1
kind: ValkeyInstance
metadata:
  name: test-valkey-custom
  namespace: {{ .Release.Namespace }}
spec:
  deletionProtection: false
  engineVersion: "8.2"
  instanceType: cache.t4g.medium
  numCacheClusters: 2
  snapshotRetentionLimit: 3