apiVersion: tenancy.entigo.com/v1alpha1
kind: Zone
metadata:
  name: a
  annotations:
    tags.entigo.com/etag: eztest
    tags.entigo.com/zutag: zutest
  labels:
    tags.entigo.com/tag: ztest
spec:
  pools:
    - name: default
      requirements:
        - key: instance-type
          values:
            - t3.large
        - key: capacity-type
          value: ON_DEMAND
        - key: min-size
          value: 1
        - key: max-size
          value: 2

