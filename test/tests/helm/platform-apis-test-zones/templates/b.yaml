apiVersion: tenancy.entigo.com/v1alpha1
kind: Zone
metadata:
  name: b
spec:
  granularNamespaceNetworkPolicy: true
  namespaces:
    - name: b1
      pool: default-a
    - name: b2
  pools:
    - name: default-a
      requirements:
        - key: instance-type
          values:
            - t3.large
        - key: capacity-type
          value: ON_DEMAND
        - key: min-size
          value: 1
        - key: max-size
          value: 1
        - key: zone
          values:
            - eu-north-1a
    - name: default-b
      requirements:
        - key: instance-type
          values:
            - t3.large
        - key: capacity-type
          value: ON_DEMAND
        - key: min-size
          value: 1
        - key: max-size
          value: 1
        - key: zone
          values:
            - eu-north-1b
