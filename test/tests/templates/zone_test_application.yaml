apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-zones
  namespace: argocd-biz
spec:
  destination:
    server: https://kubernetes.default.svc
  project: zone
  source:
    chart: platform-apis-test-zones
    repoURL: ghcr.io/entigolabs
    targetRevision: '*.*.*-0'
    helm:
      releaseName: platform-apis-test-zones
      values: |
        targetRevision: '*.*.*-0'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
