apiVersion: v1
kind: Namespace
metadata:
  name: test-s3bucket
  labels:
    tenancy.entigo.com/zone: a
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-s3bucket
  namespace: argocd-biz
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: test-s3bucket
  project: a
  source:
    chart: platform-apis-test-s3bucket
    repoURL: ghcr.io/entigolabs
    targetRevision: '*.*.*-0'
    helm:
      releaseName: s3bucket
      values: |
        targetRevision: '*.*.*-0'
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true