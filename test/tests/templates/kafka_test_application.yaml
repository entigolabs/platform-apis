apiVersion: v1
kind: Namespace
metadata:
  name: test-kafka
  labels:
    tenancy.entigo.com/zone: a
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-kafka
  namespace: argocd-biz
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: test-kafka
  project: a
  source:
    chart: platform-apis-test-kafka
    repoURL: ghcr.io/entigolabs
    targetRevision: '*.*.*-0'
    helm:
      releaseName: kafka
      values: |
        targetRevision: '*.*.*-0'
        clusterARN: ""  # Override with the MSK cluster ARN for the target environment
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true