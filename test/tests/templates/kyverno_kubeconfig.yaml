apiVersion: v1
kind: Config
clusters:
- cluster:
    certificate-authority-data: {{ .CA }}
    server: {{ .Server }}
  name: role-cluster
contexts:
- context:
    cluster: role-cluster
    user: role-user
  name: role-context
current-context: role-context
users:
- name: role-user
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1beta1
      command: aws
      args:
      - eks
      - get-token
      - --cluster-name
      - {{ .ClusterName }}
      - --region
      - {{ .Region }}
      env:
      - name: AWS_ACCESS_KEY_ID
        value: {{ .KeyID }}
      - name: AWS_SECRET_ACCESS_KEY
        value: {{ .Secret }}
      interactiveMode: Never