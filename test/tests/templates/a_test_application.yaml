apiVersion: v1
kind: Namespace
metadata:
  name: a-apps
  labels:
    tenancy.entigo.com/zone: a
---
apiVersion: v1
kind: Namespace
metadata:
  name: test-postgresql
  labels:
    tenancy.entigo.com/zone: a
---
apiVersion: v1
kind: Namespace
metadata:
  name: a1
  labels:
    tenancy.entigo.com/zone: a
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    istio-injection: enabled
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: a-apps
  namespace: a-apps
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: a-apps
  project: a
  source:
    chart: platform-apis-test-a-apps
    repoURL: ghcr.io/entigolabs
    targetRevision: '*.*.*-0'
    helm:
      releaseName: platform-apis-test-a-apps
      values: |
        targetRevision: '*.*.*-0'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
