platform-apis:
  zone:
    clusterResourceWhitelist:
    - group: '*'
      kind: '*'
    environmentConfig:
      granularEgress: true
      roleMapping:
        - roleRef: maintainer
          groups: ["web-read-only-343159627493470238"]
      appProject:
        namespaceResourceBlacklist: []
        namespaceResourceWhitelist:
        - group: '*'
          kind: '*'
      tags:
        etag: etest
        eutag: eutest
  kafka:
    install: true
    environmentConfig:
      kafkaNamespace: crossplane-kafka-biz
  database:
    environmentConfig:
      postgresBackupBeforeDeletion: false
      valkeyBackupBeforeDeletion: false
      backupRetentionPeriod: 0
  functions:
    function-go-templating:
      install: true
    function-auto-ready:
      install: true
    function-sequencer:
      install: true
    function-patch-and-transform:
      install: true
    function-extra-resources:
      install: true
