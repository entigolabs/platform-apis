platform-apis:
  zone:
    clusterResourceWhitelist:
    - group: '*'
      kind: '*'
    environmentConfig:
      granularEgress: true
      appProject:
        maintainerGroups: ["web-read-only-343159627493470238"]
        namespaceResourceBlacklist: []
        namespaceResourceWhitelist:
        - group: '*'
          kind: '*'
      tags:
        etag: etest
        eutag: eutest
  kafka:
    install: true
    environmentConfig:
      awsProvider: crossplane-aws
      configKMSKey: config
      kafkaNamespace: crossplane-kafka-biz
  database:
    environmentConfig:
      postgresBackupBeforeDeletion: false
      valkeyBackupBeforeDeletion: false
      backupRetentionPeriod: 0
