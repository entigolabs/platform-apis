platform-apis:
  zone:
    clusterResourceWhitelist:
    - group: '*'
      kind: '*'
    environmentConfig:
      granularEgress: true
      appProject:
        maintainerGroups: ["web-read-only-343159627493470238"]
        namespaceResourceBlacklist: []
        namespaceResourceWhitelist:
        - group: '*'
          kind: '*'
  kafka:
    install: true
    environmentConfig:
      awsProvider: crossplane-aws
      configKMSKey: config
      kafkaNamespace: crossplane-kafka
  database:
    environmentConfig:
      backupBeforeDeletion: false
      backupRetentionPeriod: 0
