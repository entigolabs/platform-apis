{{- if .Values.postgresql.install }}
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: platform-apis-database
data:
  awsProvider: {{ .Values.database.environmentConfig.awsProvider }}
  dataKMSKey: {{ .Values.database.environmentConfig.dataKMSKey }}
  configKMSKey: {{ .Values.database.environmentConfig.configKMSKey }}
  vpc: {{ .Values.database.environmentConfig.vpc }}
  subnetGroup: {{ .Values.database.environmentConfig.subnetGroup }}
  elasticacheSubnetGroup: {{ .Values.database.environmentConfig.elasticacheSubnetGroup }}
  esClusterSecretStore: {{ .Values.database.environmentConfig.esClusterSecretStore }}
  postgresBackupBeforeDeletion: {{ .Values.database.environmentConfig.postgresBackupBeforeDeletion }}
  valkeyBackupBeforeDeletion: {{ .Values.database.environmentConfig.valkeyBackupBeforeDeletion }}
  backupRetentionPeriod: {{ .Values.database.environmentConfig.backupRetentionPeriod }}
  {{- if .Values.database.environmentConfig.tags }}
  tags: {{- toYaml .Values.database.environmentConfig.tags | nindent 4 }}
  {{- else }}
  tags: {}
  {{- end }}
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
  name: platform-apis-database-fn
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        metadata:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8080"
            prometheus.io/path: "/metrics"
        spec:
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - preference:
                    matchExpressions:
                      - key: tools
                        operator: In
                        values:
                          - 'true'
                  weight: 90
          containers:
          - name: package-runtime
            {{- if .Values.workspace }}
            env:
              - name: WORKSPACE
                value: {{ .Values.workspace }}
            {{- end }}
            resources:
              requests:
                cpu: 1m
                memory: 21Mi
              limits:
                cpu: 2000m
                memory: 1024Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
          securityContext:
            fsGroup: 2000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          tolerations:
            - effect: NoSchedule
              key: tools
              operator: Equal
              value: 'true'
---
apiVersion: pkg.crossplane.io/v1beta1
kind: Function
metadata:
  name: platform-apis-database-fn
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  package: {{ .Values.database.function.image }}:{{ .Values.database.function.tag }}
  runtimeConfigRef:
    name: platform-apis-database-fn
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: platform-apis-database
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["database.entigo.com"]
        apiVersions: ["v1alpha1"]
        operations: ["DELETE"]
        resources: ["postgresqldatabases"]
  validations:
    - expression: "!has(oldObject.spec.deletionProtection) || oldObject.spec.deletionProtection != true"
      message: "PostgreSQLDatabase is protected from deletion. Set spec.deletionProtection to false before deleting."
      reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: platform-apis-database
spec:
  policyName: platform-apis-database
  validationActions: [Deny]
  matchResources:
    namespaceSelector: {}
{{- end }}
