{{- if .Values.s3bucket.install }}

apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: platform-apis-storage
data:
  awsProvider: {{ .Values.storage.environmentConfig.awsProvider }}
  dataKMSKey: {{ .Values.storage.environmentConfig.dataKMSKey }}
  configKMSKey: {{ .Values.storage.environmentConfig.configKMSKey }}
  {{- if .Values.storage.environmentConfig.tags }}
  tags: {{- toYaml .Values.storage.environmentConfig.tags | nindent 4 }}
  {{- else }}
  tags: {}
  {{- end }}
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
  name: platform-apis-storage-fn
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        metadata:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8080"
            prometheus.io/path: "/metrics"
        spec:
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - preference:
                    matchExpressions:
                      - key: tools
                        operator: In
                        values:
                          - 'true'
                  weight: 90
          containers:
          - name: package-runtime
            resources:
              requests:
                cpu: 1m
                memory: 12Mi
              limits:
                cpu: 2000m
                memory: 1024Mi
            securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
          securityContext:
            fsGroup: 2000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          tolerations:
            - effect: NoSchedule
              key: tools
              operator: Equal
              value: 'true'
---
apiVersion: pkg.crossplane.io/v1beta1
kind: Function
metadata:
  name: platform-apis-storage-fn
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  package: {{ .Values.storage.function.image }}:{{ .Values.storage.function.tag }}
  runtimeConfigRef:
    name: platform-apis-storage-fn

{{- end }}


