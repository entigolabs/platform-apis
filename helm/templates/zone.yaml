---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: platform-apis-zone
data:
  granularEgress: {{ .Values.zone.environmentConfig.granularEgress }}
  granularEgressExclude: {{ .Values.zone.environmentConfig.granularEgressExclude }}
  argoCDNamespace: {{ .Values.zone.environmentConfig.argoCDNamespace }}
  awsProvider: {{ .Values.zone.environmentConfig.awsProvider }}
  appProject:
    maintainerGroups: {{ .Values.zone.environmentConfig.appProject.maintainerGroups }}
    observerGroups: {{ .Values.zone.environmentConfig.appProject.observerGroups }}
    sourceRepos:
    {{- range .Values.zone.environmentConfig.appProject.sourceRepos }}
      - {{ . | quote }}
    {{- end }}
  cluster: {{ .Values.zone.environmentConfig.cluster }}
  dataKMSAlias: {{ .Values.zone.environmentConfig.dataKMSAlias }}
  securityGroup: {{ .Values.zone.environmentConfig.securityGroup }}
  vpc: {{ .Values.zone.environmentConfig.vpc }}
  computeSubnetType: {{ .Values.zone.environmentConfig.computeSubnetType }}
  serviceSubnetType: {{ .Values.zone.environmentConfig.serviceSubnetType }}
  publicSubnetType: {{ .Values.zone.environmentConfig.publicSubnetType }}
  controlSubnetType: {{ .Values.zone.environmentConfig.controlSubnetType }}
  podSecurity: {{ .Values.zone.environmentConfig.podSecurity }}
  {{- if .Values.zone.environmentConfig.tags }}
  tags: {{- toYaml .Values.zone.environmentConfig.tags | nindent 4 }}
  {{- else }}
  tags: {}
  {{- end }}
---
apiVersion: pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: platform-apis-zone
spec:
  package: {{ .Values.zone.package.image }}:{{ .Values.zone.package.tag }}
  skipDependencyResolution: true
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: zone
  namespace: {{ .Values.zone.environmentConfig.argoCDNamespace }}
spec:
  description: "Project with maintainer access for creating zones"
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: tenancy.entigo.com
    kind: Zone
  - group: eks.aws.upbound.io
    kind: NodeGroup
  namespaceResourceBlacklist:
  - group: '*'
    kind: '*'
  {{- $sourceRepos := list -}}
  {{- if hasKey .Values.zone.environmentConfig.appProject "sourceRepos" -}}
    {{- $sourceRepos = .Values.zone.environmentConfig.appProject.sourceRepos -}}
  {{- end }}
  {{- if $sourceRepos }}
  sourceRepos:
    {{- range $sourceRepos }}
  - {{ . | quote }}
    {{- end }}
  {{- end }}
  roles:
  - description: Maintainer permissions
    {{- $maintainerGroups := list -}}
    {{- if hasKey .Values.zone.environmentConfig.appProject "maintainerGroups" -}}
      {{- $maintainerGroups = .Values.zone.environmentConfig.appProject.maintainerGroups -}}
    {{- end }}
    {{- if $maintainerGroups }}
    groups:
    {{- range $maintainerGroups }}
    - {{ . }}
      {{- end }}
    {{- else }}
    groups: []
    {{- end }}
    name: maintainer
    policies:
    - p, proj:zone:maintainer, applications, *, zone/*, allow
    - p, proj:zone:maintainer, repositories, *, zone/*, allow
  - description: Observer permissions
    {{- $observerGroups := list -}}
    {{- if hasKey .Values.zone.environmentConfig.appProject "observerGroups" -}}
      {{- $observerGroups = .Values.zone.environmentConfig.appProject.observerGroups -}}
    {{- end }}
    {{- if $observerGroups }}
    groups:
    {{- range $observerGroups }}
    - {{ . }}
    {{- end }}
    {{- else }}
    groups: []
    {{- end }}
    name: observer
    policies:
    - p, proj:zone:observer, applications, get, zone/*, allow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-zone-access
rules:
- apiGroups: ["tenancy.entigo.com"]
  resources: ["zones"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create", "update"]
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-zone-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-zone-access
subjects:
- kind: ServiceAccount
  name: kyverno-admission-controller
  namespace: {{ .Values.zone.kyvernoNamespace }}
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: {{ .Values.zone.kyvernoNamespace }}
- kind: ServiceAccount
  name: kyverno-reports-controller
  namespace: {{ .Values.zone.kyvernoNamespace }}
---
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: platform-apis-zone-namespace-ownership
spec:
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
    - apiGroups: ["tenancy.entigo.com"]
      apiVersions: ["v1alpha1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["zones"]
  variables:
  - name: existingNamespaces
    expression: |
      resource.List("v1", "namespaces", "")
  - name: zoneLabel
    expression: |
      "tenancy.entigo.com/zone"
  validations:
  - expression: |
      object.spec.namespaces.all(requestedNs,
        !dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          has(existingNs.metadata.labels) &&
          variables.zoneLabel in existingNs.metadata.labels &&
          existingNs.metadata.labels[variables.zoneLabel] != object.metadata.name
        ) &&
        !dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          (!has(existingNs.metadata.labels) || !(variables.zoneLabel in existingNs.metadata.labels))
        )
      )
    messageExpression: |
      "Cannot manage namespace(s): " +
      object.spec.namespaces.filter(requestedNs,
        dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          has(existingNs.metadata.labels) &&
          variables.zoneLabel in existingNs.metadata.labels &&
          existingNs.metadata.labels[variables.zoneLabel] != object.metadata.name
        ) ||
        dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          (!has(existingNs.metadata.labels) || !(variables.zoneLabel in existingNs.metadata.labels))
        )
      ).map(requestedNs,
        requestedNs.name + " - " +
        (dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          has(existingNs.metadata.labels) &&
          variables.zoneLabel in existingNs.metadata.labels
        ) ?
          "owned by zone: " + dyn(variables.existingNamespaces.items).filter(existingNs, existingNs.metadata.name == requestedNs.name)[0].metadata.labels[variables.zoneLabel]
          : "no zone label - must be labeled manually first")
      ).join(", ")
---
apiVersion: policies.kyverno.io/v1alpha1
kind: MutatingPolicy
metadata:
  name: platform-apis-zone-namespace-pod-security
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  matchConditions:
    - name: "exclude-system-namespaces"
      expression: "!(object.metadata.name in ['kube-system'])"
    - name: "has-zone-label"
      expression: "has(object.metadata.labels) && 'tenancy.entigo.com/zone' in object.metadata.labels && object.metadata.labels['tenancy.entigo.com/zone'] != 'infralib'"
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          (
            !('pod-security.kubernetes.io/enforce' in object.metadata.labels) ?
            [
              JSONPatch{
                op: "add",
                path: "/metadata/labels/pod-security.kubernetes.io~1enforce",
                value: "{{ .Values.zone.environmentConfig.podSecurity }}"
              }
            ] : []
          ) + (
            !('pod-security.kubernetes.io/warn' in object.metadata.labels) ?
            [
              JSONPatch{
                op: "add",
                path: "/metadata/labels/pod-security.kubernetes.io~1warn",
                value: "{{ .Values.zone.environmentConfig.podSecurity }}"
              }
            ] : []
          )
---
apiVersion: tenancy.entigo.com/v1alpha1
kind: Zone
metadata:
  name: infralib
  annotations:
    argocd.argoproj.io/sync-wave: "50"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  namespaces: []
  pools:
    - name: default
      requirements:
        - key: max-size
          value: 0
---
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: platform-apis-zone-namespace-pod-security
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  variables:
    - name: existingZones
      expression: |
        resource.List("tenancy.entigo.com/v1alpha1", "zones", "")
  matchConditions:
    - name: "exclude-system-namespaces"
      expression: "!(object.metadata.name in ['kube-system', 'default', 'kube-public', 'kube-node-lease'])"
    - name: "has-no-infralib-zone-label"
      expression: "!has(object.metadata.labels) || !('tenancy.entigo.com/zone' in object.metadata.labels) || object.metadata.labels['tenancy.entigo.com/zone'] != 'infralib'"
  validations:
    - expression: >-
        has(object.metadata.labels) &&
        'tenancy.entigo.com/zone' in object.metadata.labels &&
        object.metadata.labels['tenancy.entigo.com/zone'] != ''
      message: "The namespace must have a 'tenancy.entigo.com/zone' label."
    - expression: >-
        !has(object.metadata.labels) ||
        !('tenancy.entigo.com/zone' in object.metadata.labels) ||
        dyn(variables.existingZones.items).exists(zone,
          zone.metadata.name == object.metadata.labels['tenancy.entigo.com/zone']
        )
      message: "The namespace 'tenancy.entigo.com/zone' label must reference an existing Zone."
    - expression: >-
        !has(object.metadata.labels) ||
        ('pod-security.kubernetes.io/enforce' in object.metadata.labels &&
        (
        {{- if eq .Values.zone.environmentConfig.podSecurity "restricted" }}
          object.metadata.labels['pod-security.kubernetes.io/enforce'] == 'restricted'
        {{- else if eq .Values.zone.environmentConfig.podSecurity "baseline" }}
          object.metadata.labels['pod-security.kubernetes.io/enforce'] in ['baseline', 'restricted']
        {{- else }}
          object.metadata.labels['pod-security.kubernetes.io/enforce'] in ['baseline', 'restricted', 'privileged']
        {{- end }}
        ))
      message: "The 'pod-security.kubernetes.io/enforce' label must be set to '{{ .Values.zone.environmentConfig.podSecurity }}' (or stricter)."
    - expression: >-
        !has(object.metadata.labels) ||
        ('pod-security.kubernetes.io/warn' in object.metadata.labels &&
        (
        {{- if eq .Values.zone.environmentConfig.podSecurity "restricted" }}
          object.metadata.labels['pod-security.kubernetes.io/warn'] == 'restricted'
        {{- else if eq .Values.zone.environmentConfig.podSecurity "baseline" }}
          object.metadata.labels['pod-security.kubernetes.io/warn'] in ['baseline', 'restricted']
        {{- else }}
          object.metadata.labels['pod-security.kubernetes.io/warn'] in ['baseline', 'restricted', 'privileged']
        {{- end }}
        ))
      message: "The 'pod-security.kubernetes.io/warn' label must be set to '{{ .Values.zone.environmentConfig.podSecurity }}' (or stricter)."
---
apiVersion: policies.kyverno.io/v1alpha1
kind: GeneratingPolicy
metadata:
  name: generate-namespace-from-argocd-app
  annotations:
    policies.kyverno.io/title: Generate Namespace from ArgoCD Application
    policies.kyverno.io/category: ArgoCD
    policies.kyverno.io/description: >-
      Generates a namespace based on ArgoCD Application's destination if it doesn't exist.
      The namespace is labeled with tenancy.entigo.com/zone derived from the Application's project.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["argoproj.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE","UPDATE"]
        resources: ["applications"]
  matchConditions:
    - name: has-destination-namespace
      expression: >-
        has(object.spec.destination) &&
        has(object.spec.destination.namespace) &&
        object.spec.destination.namespace != "" &&
        object.spec.project != "default" &&
        object.spec.project != "infralib"
  variables:
    - name: destNamespace
      expression: "object.spec.destination.namespace"
    - name: projectName
      expression: "object.spec.project"
  generate:
    - expression: |
        generator.Apply("", [
          {
            "kind": dyn("Namespace"),
            "apiVersion": dyn("v1"),
            "metadata": dyn({
              "name": dyn(variables.destNamespace),
              "labels": dyn({
                "tenancy.entigo.com/zone": dyn(variables.projectName),
                "pod-security.kubernetes.io/enforce": dyn("{{ .Values.zone.environmentConfig.podSecurity }}"),
                "pod-security.kubernetes.io/warn": dyn("{{ .Values.zone.environmentConfig.podSecurity }}")
              })
            })
          }
        ])
---
apiVersion: policies.kyverno.io/v1alpha1
kind: MutatingPolicy
metadata:
  name: platform-apis-namespace-add-missing-zone-label
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  matchConditions:
    - name: "exclude-system-namespaces"
      expression: "!(object.metadata.name in ['kube-system', 'default', 'kube-public', 'kube-node-lease'])"
    - name: "has-no-zone-label"
      expression: "!has(object.metadata.labels) || !('tenancy.entigo.com/zone' in object.metadata.labels) || object.metadata.labels['tenancy.entigo.com/zone'] == ''"
  variables:
    - name: existingZones
      expression: |
        resource.List("tenancy.entigo.com/v1alpha1", "zones", "")
    - name: defaultZoneName
      expression: >-
        dyn(variables.existingZones.items)
        .filter(z, has(z.metadata.labels) &&
          'tenancy.entigo.com/default-zone' in z.metadata.labels &&
          z.metadata.labels['tenancy.entigo.com/default-zone'] == 'true')
        .map(z, z.metadata.name)
    - name: fallbackZoneName
      expression: >-
        dyn(variables.existingZones.items)
          .filter(z, z.metadata.name != 'infralib')
          .map(z, z.metadata.name)
    - name: selectedZone
      expression: >-
        variables.defaultZoneName.size() > 0 ? variables.defaultZoneName[0] :
          (variables.fallbackZoneName.size() > 0 ? variables.fallbackZoneName[0] : '')
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          variables.selectedZone == '' ? [] :
          (
            !has(object.metadata.labels) ?
            [
              JSONPatch{
                op: "add",
                path: "/metadata/labels",
                value: {
                  "tenancy.entigo.com/zone": variables.selectedZone,
                  "pod-security.kubernetes.io/enforce": "{{ .Values.zone.environmentConfig.podSecurity }}",
                  "pod-security.kubernetes.io/warn": "{{ .Values.zone.environmentConfig.podSecurity }}"
                }
              }
            ] :
            ([
              JSONPatch{
                op: "add",
                path: "/metadata/labels/tenancy.entigo.com~1zone",
                value: variables.selectedZone
              }
            ]) + (
              !('pod-security.kubernetes.io/enforce' in object.metadata.labels) ?
              [
                JSONPatch{
                  op: "add",
                  path: "/metadata/labels/pod-security.kubernetes.io~1enforce",
                  value: "{{ .Values.zone.environmentConfig.podSecurity }}"
                }
              ] : []
            ) + (
              !('pod-security.kubernetes.io/warn' in object.metadata.labels) ?
              [
                JSONPatch{
                  op: "add",
                  path: "/metadata/labels/pod-security.kubernetes.io~1warn",
                  value: "{{ .Values.zone.environmentConfig.podSecurity }}"
                }
              ] : []
            )
          )
---
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: platform-apis-zone-namespace-contributor-deny
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["UPDATE", "DELETE"]
        resources: ["namespaces"]
  matchConditions:
    - name: "check-user-group"
      expression: '"contributor" in request.userInfo.groups'
  validations:
    - expression: "false"
      message: "contributor cannot modify namespaces."
---
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: platform-apis-zone-namespace-moving
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  matchConditions:
    - name: "check-user-group"
      expression: '"maintainer" in request.userInfo.groups'
    - name: "has-infralib-zone-label"
      expression: "has(object.metadata.labels) && ('tenancy.entigo.com/zone' in object.metadata.labels) && object.metadata.labels['tenancy.entigo.com/zone'] == 'infralib'"
  validations:
    - expression: "false"
      message: "cannot use infralib zone."

{{- end }}
