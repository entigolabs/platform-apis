---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
  name: platform-apis-zone
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services"]
    verbs: ["*"]
  - apiGroups: ["argoproj.io"]
    resources: ["appprojects"]
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings", "roles"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["*"]
  - apiGroups: ["policies.kyverno.io"]
    resources: ["mutatingpolicies", "validatingpolicies","mutatingpolicies/status", "validatingpolicies/status"]
    verbs: ["*"]
  - apiGroups: ["networking.istio.io"]
    resources: ["*"]
    verbs: ["*"]

---
apiVersion: apiextensions.crossplane.io/v1alpha1
kind: ManagedResourceActivationPolicy
metadata:
  name: platform-apis-zone
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  activate:
  - launchtemplates.ec2.aws.upbound.io
  - nodegroups.eks.aws.upbound.io
  - accessentries.eks.aws.upbound.io
  - roles.iam.upbound.io

# ---
# apiVersion: rbac.authorization.k8s.io/v1
# kind: ClusterRoleBinding
# metadata:
#   name: platform-apis-zone
# roleRef:
#   apiGroup: rbac.authorization.k8s.io
#   kind: ClusterRole
#   name: platform-apis-zone
# subjects:
# - kind: ServiceAccount
#   name: crossplane
#   namespace: crossplane-system
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: platform-apis-zone
data:
  granularEgress: {{ .Values.zone.environmentConfig.granularEgress }}
  granularEgressExclude: {{ .Values.zone.environmentConfig.granularEgressExclude }}
  argoCDNamespace: {{ .Values.zone.environmentConfig.argoCDNamespace }}
  awsProvider: {{ .Values.zone.environmentConfig.awsProvider }}
  appProject:
    maintainerGroups: {{ .Values.zone.environmentConfig.appProject.maintainerGroups }}
    observerGroups: {{ .Values.zone.environmentConfig.appProject.observerGroups }}
    sourceRepos:
    {{- range .Values.zone.environmentConfig.appProject.sourceRepos }}
      - {{ . | quote }}
    {{- end }}
  cluster: {{ .Values.zone.environmentConfig.cluster }}
  dataKMSAlias: {{ .Values.zone.environmentConfig.dataKMSAlias }}
  securityGroup: {{ .Values.zone.environmentConfig.securityGroup }}
  vpc: {{ .Values.zone.environmentConfig.vpc }}
  computeSubnetType: {{ .Values.zone.environmentConfig.computeSubnetType }}
  serviceSubnetType: {{ .Values.zone.environmentConfig.serviceSubnetType }}
  publicSubnetType: {{ .Values.zone.environmentConfig.publicSubnetType }}
  {{- if .Values.zone.environmentConfig.tags }}
  tags: {{- toYaml .Values.zone.environmentConfig.tags | nindent 4 }}
  {{- else }}
  tags: {}
  {{- end }}
---
apiVersion: pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: platform-apis-zone
spec:
  package: {{ .Values.zone.package.image }}:{{ .Values.zone.package.tag }}
  skipDependencyResolution: true
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: zone
  namespace: {{ .Values.zone.environmentConfig.argoCDNamespace }}
spec:
  description: "Project with maintainer access for creating zones"
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: tenancy.entigo.com
    kind: Zone
  - group: eks.aws.upbound.io
    kind: NodeGroup
  - group: ec2.aws.upbound.io
    kind: LaunchTemplate
  - group: eks.aws.upbound.io
    kind: AccessEntry
  - group: policies.kyverno.io
    kind: MutatingPolicy
  - group: policies.kyverno.io
    kind: ValidatingPolicy
  namespaceResourceBlacklist:
  - group: '*'
    kind: '*'
  namespaceResourceWhitelist:
  - group: argoproj.io
    kind: Application
  {{- $sourceRepos := list -}}
  {{- if hasKey .Values.zone.environmentConfig.appProject "sourceRepos" -}}
    {{- $sourceRepos = .Values.zone.environmentConfig.appProject.sourceRepos -}}
  {{- end }}
  {{- if $sourceRepos }}
  sourceRepos:
    {{- range $sourceRepos }}
  - {{ . | quote }}
    {{- end }}
  {{- end }}
  roles:
  - description: Maintainer permissions
    {{- $maintainerGroups := list -}}
    {{- if hasKey .Values.zone.environmentConfig.appProject "maintainerGroups" -}}
      {{- $maintainerGroups = .Values.zone.environmentConfig.appProject.maintainerGroups -}}
    {{- end }}
    {{- if $maintainerGroups }}
    groups:
    {{- range $maintainerGroups }}
    - {{ . }}
      {{- end }}
    {{- else }}
    groups: []
    {{- end }}
    name: maintainer
    policies:
    - p, proj:zone:maintainer, applications, *, zone/*, allow
    - p, proj:zone:maintainer, repositories, *, zone/*, allow
  - description: Observer permissions
    {{- $observerGroups := list -}}
    {{- if hasKey .Values.zone.environmentConfig.appProject "observerGroups" -}}
      {{- $observerGroups = .Values.zone.environmentConfig.appProject.observerGroups -}}
    {{- end }}
    {{- if $observerGroups }}
    groups:
    {{- range $observerGroups }}
    - {{ . }}
    {{- end }}
    {{- else }}
    groups: []
    {{- end }}
    name: observer
    policies:
    - p, proj:zone:observer, applications, get, zone/*, allow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-zone-access
rules:
- apiGroups: ["tenancy.entigo.com"]
  resources: ["zones"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-zone-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-zone-access
subjects:
- kind: ServiceAccount
  name: kyverno-admission-controller
  namespace: kyverno
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
- kind: ServiceAccount
  name: kyverno-reports-controller
  namespace: kyverno
---
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: platform-apis-zone-namespace-ownership
spec:
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
    - apiGroups: ["tenancy.entigo.com"]
      apiVersions: ["v1alpha1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["zones"]
  variables:
  - name: existingNamespaces
    expression: |
      resource.List("v1", "namespaces", "")
  - name: zoneLabel
    expression: |
      "tenancy.entigo.com/zone"
  validations:
  - expression: |
      object.spec.namespaces.all(requestedNs,
        !dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          has(existingNs.metadata.labels) &&
          variables.zoneLabel in existingNs.metadata.labels &&
          existingNs.metadata.labels[variables.zoneLabel] != object.metadata.name
        ) &&
        !dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          (!has(existingNs.metadata.labels) || !(variables.zoneLabel in existingNs.metadata.labels))
        )
      )
    messageExpression: |
      "Cannot manage namespace(s): " +
      object.spec.namespaces.filter(requestedNs,
        dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          has(existingNs.metadata.labels) &&
          variables.zoneLabel in existingNs.metadata.labels &&
          existingNs.metadata.labels[variables.zoneLabel] != object.metadata.name
        ) ||
        dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          (!has(existingNs.metadata.labels) || !(variables.zoneLabel in existingNs.metadata.labels))
        )
      ).map(requestedNs,
        requestedNs.name + " - " +
        (dyn(variables.existingNamespaces.items).exists(existingNs,
          existingNs.metadata.name == requestedNs.name &&
          has(existingNs.metadata.labels) &&
          variables.zoneLabel in existingNs.metadata.labels
        ) ?
          "owned by zone: " + dyn(variables.existingNamespaces.items).filter(existingNs, existingNs.metadata.name == requestedNs.name)[0].metadata.labels[variables.zoneLabel]
          : "no zone label - must be labeled manually first")
      ).join(", ")

{{- end }}
