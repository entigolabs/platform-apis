workspace: ""

database:
  function:
    image: ghcr.io/entigolabs/platform-apis-database-fn
    tag: v0.0.0
  environmentConfig:
    awsProvider: crossplane-aws
    dataKMSKey: data
    configKMSKey: config
    vpc: vpc
    subnetGroup: database
    elasticacheSubnetGroup: elasticache
    esClusterSecretStore: external-secrets
    postgresBackupBeforeDeletion: true
    valkeyBackupBeforeDeletion: true
    backupRetentionPeriod: 14
    tags: {}

postgresql:
  install: true
  package:
    image: ghcr.io/entigolabs/platform-apis-postgresql
    tag: v0.0.0

valkey:
  install: true
  package:
    image: ghcr.io/entigolabs/platform-apis-valkey
    tag: v0.0.0

artifact:
  function:
    image: ghcr.io/entigolabs/platform-apis-artifact-fn
    tag: v0.0.0
  environmentConfig:
    awsProvider: "crossplane-aws"
    dataKMSKey: data
    scanOnPush: true
    imageTagMutability: "MUTABLE"
    tags: {}

repository:
  install: true
  package:
    image: ghcr.io/entigolabs/platform-apis-repository
    tag: v0.0.0

storage:
  function:
    image: ghcr.io/entigolabs/platform-apis-storage-fn
    tag: v0.0.0
  environmentConfig:
    awsProvider: "crossplane-aws"
    dataKMSKey: data
    configKMSKey: config
    tags: {}

s3bucket:
  install: true
  package:
    image: ghcr.io/entigolabs/platform-apis-s3bucket
    tag: v0.0.0

queue:
  function:
    image: ghcr.io/entigolabs/platform-apis-queue-fn
    tag: v0.0.0

kafka:
  install: false
  environmentConfig:
    awsProvider: "crossplane-aws"
    configKMSKey: config
    kafkaNamespace: crossplane-kafka
    tags: {}
  package:
    image: ghcr.io/entigolabs/platform-apis-kafka
    tag: v0.0.0

tenancy:
  function:
    image: ghcr.io/entigolabs/platform-apis-tenancy-fn
    tag: v0.0.0

zone:
  install: true
  package:
    image: ghcr.io/entigolabs/platform-apis-zone
    tag: v0.0.0
  environmentConfig:
    granularEgress: false
    granularEgressExclude: []
    argoCDNamespace: "argocd"
    awsProvider: "crossplane-aws"
    appProject:
      maintainerGroups: []
      observerGroups: []
      sourceRepos: ["*"]
      namespaceResourceBlacklist:
        - group: "*.m.upbound.io"
          kind: "*"
      namespaceResourceWhitelist: []
    cluster: eks
    dataKMSAlias: data
    securityGroup: "eks-node"
    vpc: vpc
    computeSubnetType: compute
    serviceSubnetType: service
    publicSubnetType: public
    controlSubnetType: control
    podSecurity: baseline
    tags: {}
  clusterrolebinding:
    maintainerGroups: ["maintainer"]
    observerGroups: ["observer"]
    contributorGroups: ["contributor"]
  kyvernoNamespace: kyverno
  clusterResourceWhitelist:
    - group: tenancy.entigo.com
      kind: Zone
    - group: eks.aws.upbound.io
      kind: NodeGroup

networking:
  function:
    image: ghcr.io/entigolabs/platform-apis-networking-fn
    tag: v0.0.0
  environmentConfig:
    istioGateway: "istio-gateway/istio-gateway"

webaccess:
  install: true
  package:
    image: ghcr.io/entigolabs/platform-apis-webaccess
    tag: v0.0.0

workload:
  function:
    image: ghcr.io/entigolabs/platform-apis-workload-fn
    tag: v0.0.0
  environmentConfig:
    cpuRequestMultiplier: 0.5
    memoryRequestMultiplier: 0.8
    imagePullSecrets: []

webapp:
  install: true
  package:
    image: ghcr.io/entigolabs/platform-apis-webapp
    tag: v0.0.0

cronjob:
  install: true
  package:
    image: ghcr.io/entigolabs/platform-apis-cronjob
    tag: v0.0.0

providers: {}

functions:
  function-go-templating:
    install: true
    image: xpkg.upbound.io/crossplane-contrib/function-go-templating
    tag: v0.11.4
  function-auto-ready:
    install: true
    image: xpkg.upbound.io/crossplane-contrib/function-auto-ready
    tag: v0.6.1
  function-sequencer:
    install: true
    image: xpkg.upbound.io/crossplane-contrib/function-sequencer
    tag: v0.5.0
  function-patch-and-transform:
    install: true
    image: xpkg.upbound.io/crossplane-contrib/function-patch-and-transform
    tag: v0.10.2
  function-extra-resources:
    install: false
    image: xpkg.upbound.io/crossplane-contrib/function-extra-resources
    tag: v0.3.0

extraFunctions: []
#  - name: function-foo
#    image: xpkg.upbound.io/crossplane-contrib/function-foo
#    tag: v0.1.0
extraProviders: []
