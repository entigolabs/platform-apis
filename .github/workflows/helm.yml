name: Helm Chart CI/CD
on:
  push:
    paths:
      - "helm/**"
    branches:
      - main
  pull_request:
    paths:
      - "helm/**"
    branches:
      - main
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  CHART_PATH: helm
  CHART_NAME: platform-apis
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Helm Lint
        run: helm lint ${{ env.CHART_PATH }}
      - name: Helm Template
        run: |
          mkdir -p out
          helm template test-release ${{ env.CHART_PATH }} > out/manifest.yaml
      - name: Install kube-score
        run: |
          wget https://github.com/zegl/kube-score/releases/download/v1.19.0/kube-score_1.19.0_linux_amd64 -O kube-score
          chmod +x kube-score
          sudo mv kube-score /usr/local/bin/
      - name: Run kube-score
        run: kube-score score out/manifest.yaml --output-format ci
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Versioning Rules
        id: rules
        run: |
            CURRENT_VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
            MAJOR_MINOR=$(echo $CURRENT_VERSION | cut -d. -f1,2)
            BASE_VERSION="${MAJOR_MINOR}.${{ github.run_number }}"
            
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              NEW_VERSION="${BASE_VERSION}-rc.${{ github.event.number }}"
              # Takes latest, RC or not...
              echo "JQ_FILTER=startswith(\"v\")" >> $GITHUB_ENV
            else
              NEW_VERSION="${BASE_VERSION}"
              echo "JQ_FILTER=test(\"^v[0-9]+\\\\.[0-9]+\\\\.[0-9]+$\")" >> $GITHUB_ENV
            fi
            
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
            echo "Calculated Chart Version: $NEW_VERSION"
      - name: Update Dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -A PACKAGES=(
            ["artifact"]="platform-apis-artifact-fn"
            ["cronjob"]="platform-apis-cronjob"
            ["database"]="platform-apis-database-fn"
            ["kafka"]="platform-apis-kafka"
            ["networking"]="platform-apis-networking-fn"
            ["postgresql"]="platform-apis-postgresql"
            ["repository"]="platform-apis-repository"
            ["s3bucket"]="platform-apis-s3bucket"
            ["tenancy"]="platform-apis-tenancy-fn"
            ["valkey"]="platform-apis-valkey"
            ["webaccess"]="platform-apis-webaccess"
            ["webapp"]="platform-apis-webapp"
            ["workload"]="platform-apis-workload-fn"
            ["zone"]="platform-apis-zone" 
          )
          
          for KEY in "${!PACKAGES[@]}"; do
            PKG_NAME="${PACKAGES[$KEY]}"
            echo "Fetching tag for $PKG_NAME..."
          
            TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/orgs/entigolabs/packages/container/$PKG_NAME/versions" \
              | jq -r "[.[] | select(.metadata.container.tags[] | $JQ_FILTER)] | sort_by(.created_at) | .[-1].metadata.container.tags[] | select($JQ_FILTER)" \
              | head -n 1)
          
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "Error: Could not find a matching tag for $PKG_NAME using filter."
              exit 1
            fi
          
            echo "Found tag: $TAG"
          
            if [[ "$PKG_NAME" == *"-fn" ]]; then
              YQ_PATH=".$KEY.function.tag"
            else
              YQ_PATH=".$KEY.package.tag"
            fi
            
            yq -i "$YQ_PATH = \"$TAG\"" ${{ env.CHART_PATH }}/values.yaml
          done
          
          echo "Updated values.yaml"
          cat ${{ env.CHART_PATH }}/values.yaml

      - name: Update Chart Version
        run: |
          sed -i "s/^version:.*/version: ${{ env.NEW_VERSION }}/" ${{ env.CHART_PATH }}/Chart.yaml
          echo "Updated Chart.yaml version to ${{ env.NEW_VERSION }}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm Chart
        run: helm package ${{ env.CHART_PATH }}

      - name: Push Helm Chart to GHCR
        run: |
          helm push ${{ env.CHART_NAME }}-${{ env.NEW_VERSION }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}
