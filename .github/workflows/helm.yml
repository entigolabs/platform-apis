name: Helm Chart CI/CD
on:
  push:
    paths:
      - 'helm/**'
    branches:
      - main
  pull_request:
    paths:
      - 'helm/**'
    branches:
      - main
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  CHART_PATH: helm
  CHART_NAME: platform-apis
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Helm Lint
        run: helm lint ${{ env.CHART_PATH }}
      - name: Helm Template
        run: |
          mkdir -p out
          helm template test-release ${{ env.CHART_PATH }} > out/manifest.yaml
      - name: Install kube-score
        run: |
          wget https://github.com/zegl/kube-score/releases/download/v1.19.0/kube-score_1.19.0_linux_amd64 -O kube-score
          chmod +x kube-score
          sudo mv kube-score /usr/local/bin/
      - name: Run kube-score
        run: kube-score score out/manifest.yaml --output-format ci
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    #if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch Latest Image Tags from GHCR
        run: |
          # Fetch most recently pushed tags for each package
          POSTGRESQL_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/orgs/entigolabs/packages/container/platform-apis-postgresql/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[] | startswith("v"))] | sort_by(.created_at) | .[-1].metadata.container.tags[] | select(startswith("v"))' \
            | head -n 1)

          POSTGRESQL_FN_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/orgs/entigolabs/packages/container/platform-apis-postgresql-fn/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[] | startswith("v"))] | sort_by(.created_at) | .[-1].metadata.container.tags[] | select(startswith("v"))' \
            | head -n 1)

          REPOSITORY_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/orgs/entigolabs/packages/container/platform-apis-repository/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[] | startswith("v"))] | sort_by(.created_at) | .[-1].metadata.container.tags[] | select(startswith("v"))' \
            | head -n 1)

          REPOSITORY_FN_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/orgs/entigolabs/packages/container/platform-apis-repository-fn/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[] | startswith("v"))] | sort_by(.created_at) | .[-1].metadata.container.tags[] | select(startswith("v"))' \
            | head -n 1)

          ZONE_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/orgs/entigolabs/packages/container/platform-apis-zone/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[] | startswith("v"))] | sort_by(.created_at) | .[-1].metadata.container.tags[] | select(startswith("v"))' \
            | head -n 1)

          WEBAPP_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/orgs/entigolabs/packages/container/platform-apis-webapp/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[] | startswith("v"))] | sort_by(.created_at) | .[-1].metadata.container.tags[] | select(startswith("v"))' \
            | head -n 1)

          WEBACCESS_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/orgs/entigolabs/packages/container/platform-apis-webaccess/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[] | startswith("v"))] | sort_by(.created_at) | .[-1].metadata.container.tags[] | select(startswith("v"))' \
            | head -n 1)

          CRONJOB_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/orgs/entigolabs/packages/container/platform-apis-cronjob/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[] | startswith("v"))] | sort_by(.created_at) | .[-1].metadata.container.tags[] | select(startswith("v"))' \
            | head -n 1)

          # Validate tags were fetched
          if [ -z "$POSTGRESQL_TAG" ] || [ "$POSTGRESQL_TAG" = "null" ]; then
            echo "Failed to fetch postgresql tag"
            exit 1
          fi
          if [ -z "$POSTGRESQL_FN_TAG" ] || [ "$POSTGRESQL_FN_TAG" = "null" ]; then
            echo "Failed to fetch postgresql-fn tag"
            exit 1
          fi

          if [ -z "$REPOSITORY_TAG" ] || [ "$REPOSITORY_TAG" = "null" ]; then
            echo "Failed to fetch repository tag"
            exit 1
          fi
          if [ -z "$REPOSITORY_FN_TAG" ] || [ "$REPOSITORY_FN_TAG" = "null" ]; then
            echo "Failed to fetch repository-fn tag"
            exit 1
          fi

          if [ -z "$ZONE_TAG" ] || [ "$ZONE_TAG" = "null" ]; then
            echo "Failed to fetch zone tag"
            exit 1
          fi

          if [ -z "$WEBAPP_TAG" ] || [ "$WEBAPP_TAG" = "null" ]; then
            echo "Failed to fetch webapp tag"
            exit 1
          fi

          if [ -z "$WEBACCESS_TAG" ] || [ "$WEBACCESS_TAG" = "null" ]; then
            echo "Failed to fetch webaccess tag"
            exit 1
          fi

          if [ -z "$CRONJOB_TAG" ] || [ "$CRONJOB_TAG" = "null" ]; then
            echo "Failed to fetch cronjob tag"
            exit 1
          fi

          echo "Updating tags..."
          yq -i '.postgresql.package.tag = "$POSTGRESQL_TAG"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.postgresql.function.tag = "$POSTGRESQL_FN_TAG"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.repository.package.tag = "$REPOSITORY_TAG"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.repository.function.tag = "$REPOSITORY_FN_TAG"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.zone.package.tag = "$ZONE_TAG"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.webapp.package.tag = "$WEBAPP_TAG"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.webaccess.package.tag = "$WEBACCESS_TAG"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.cronjob.package.tag = "$CRONJOB_TAG"' ${{ env.CHART_PATH }}/values.yaml
          echo "After update:"
          cat ${{ env.CHART_PATH }}/values.yaml

          echo "Updated values.yaml with latest image tags"
      - name: Update Chart Version
        run: |
          CURRENT_VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          MAJOR_MINOR=$(echo $CURRENT_VERSION | cut -d. -f1,2)
          NEW_VERSION="${MAJOR_MINOR}.${{ github.run_number }}"
          sed -i "s/^version:.*/version: $NEW_VERSION/" ${{ env.CHART_PATH }}/Chart.yaml
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Updated version to $NEW_VERSION"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package Helm Chart
        run: helm package ${{ env.CHART_PATH }}
      - name: Push Helm Chart to GHCR
        run: |
          helm push ${{ env.CHART_NAME }}-${{ env.NEW_VERSION }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}
