name: Build Helm

on:
  workflow_call:
    inputs:
      release_type:
        description: 'Release type: stable or rc'
        required: true
        type: string
      pr_number:
        description: 'PR number (required for rc releases)'
        required: false
        type: string
        default: ''
      run_number:
        description: 'Workflow run number'
        required: false
        type: string
        default: ''
      run_attempt:
        description: 'Workflow run attempt'
        required: false
        type: string
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test Helm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Helm Tests
        env:
          GITHUB_EVENT_NUMBER: ${{ github.event.number }}
        run: ./run-tests.sh helm

  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build Helm
    permissions:
      contents: read
      packages: write
    env:
      CHART_PATH: helm
      CHART_NAME: platform-apis
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch latest stable version from GHCR
          LATEST_TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${{ env.CHART_NAME }}/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[]? | test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(.created_at) | .[-1].metadata.container.tags[]? // empty | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
            | head -n 1 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            # No existing version, start at 0.1.1
            NEXT_PATCH=1
          else
            # Extract patch version and increment
            CURRENT_PATCH=$(echo "$LATEST_TAG" | sed 's/0\.1\.//')
            NEXT_PATCH=$((CURRENT_PATCH + 1))
          fi

          if [ "${{ inputs.release_type }}" == "rc" ]; then
            VERSION="0.1.${NEXT_PATCH}-rc.${{ inputs.pr_number }}.${{ inputs.run_number }}.${{ inputs.run_attempt }}"
            # For PR: match RC tags for this PR, or stable tags
            echo "JQ_FILTER_RC=test(\"-rc\\\\.${{ inputs.pr_number }}\\\\.\")" >> $GITHUB_ENV
            echo "JQ_FILTER_STABLE=test(\"^v[0-9]+\\\\.[0-9]+\\\\.[0-9]+$\")" >> $GITHUB_ENV
            echo "IS_PR=true" >> $GITHUB_ENV
          else
            VERSION="0.1.${NEXT_PATCH}"
            echo "JQ_FILTER_STABLE=test(\"^v[0-9]+\\\\.[0-9]+\\\\.[0-9]+$\")" >> $GITHUB_ENV
            echo "IS_PR=false" >> $GITHUB_ENV
          fi

          echo "Latest tag: $LATEST_TAG"
          echo "New version: $VERSION"
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update Dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -A PACKAGES=(
            ["artifact"]="platform-apis-artifact-fn"
            ["cronjob"]="platform-apis-cronjob"
            ["database"]="platform-apis-database-fn"
            ["kafka"]="platform-apis-kafka"
            ["networking"]="platform-apis-networking-fn"
            ["postgresql"]="platform-apis-postgresql"
            ["repository"]="platform-apis-repository"
            ["s3bucket"]="platform-apis-s3bucket"
            ["tenancy"]="platform-apis-tenancy-fn"
            ["valkey"]="platform-apis-valkey"
            ["webaccess"]="platform-apis-webaccess"
            ["webapp"]="platform-apis-webapp"
            ["workload"]="platform-apis-workload-fn"
            ["zone"]="platform-apis-zone"
          )

          for KEY in "${!PACKAGES[@]}"; do
            PKG_NAME="${PACKAGES[$KEY]}"
            echo "Fetching tag for $PKG_NAME..."

            # Try RC version first (for PR), then fall back to stable
            TAG=""
            if [ "$IS_PR" == "true" ]; then
              TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/$PKG_NAME/versions" \
                | jq -r "[.[] | select(.metadata.container.tags[]? | $JQ_FILTER_RC)] | sort_by(.created_at) | .[-1].metadata.container.tags[]? // empty | select($JQ_FILTER_RC)" \
                | head -n 1 2>/dev/null || echo "")
            fi

            # Fall back to stable if no RC found
            if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
              TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/$PKG_NAME/versions" \
                | jq -r "[.[] | select(.metadata.container.tags[]? | $JQ_FILTER_STABLE)] | sort_by(.created_at) | .[-1].metadata.container.tags[]? // empty | select($JQ_FILTER_STABLE)" \
                | head -n 1)
            fi

            if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
              echo "Error: Could not find a matching tag for $PKG_NAME"
              exit 1
            fi

            echo "Found tag: $TAG"

            if [[ "$PKG_NAME" == *"-fn" ]]; then
              YQ_PATH=".$KEY.function.tag"
            else
              YQ_PATH=".$KEY.package.tag"
            fi

            yq -i "$YQ_PATH = \"$TAG\"" ${{ env.CHART_PATH }}/values.yaml
          done

          echo "Updated values.yaml:"
          cat ${{ env.CHART_PATH }}/values.yaml

      - name: Update Chart Version
        run: |
          sed -i "s/^version:.*/version: ${{ env.NEW_VERSION }}/" ${{ env.CHART_PATH }}/Chart.yaml

      - name: Remove Test Files
        run: rm -f ${{ env.CHART_PATH }}/run_tests.sh

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm Chart
        run: helm package ${{ env.CHART_PATH }}

      - name: Push Helm Chart to GHCR
        run: |
          helm push ${{ env.CHART_NAME }}-${{ env.NEW_VERSION }}.tgz oci://ghcr.io/${{ github.repository_owner }}
