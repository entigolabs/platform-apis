name: Build Helm

on:
  workflow_call:
    inputs:
      release_type:
        description: stable or rc
        required: true
        type: string
      pr_number:
        description: PR number (for rc releases)
        required: false
        type: string
        default: ''
      run_number:
        description: Workflow run number
        required: false
        type: string
        default: ''
      run_attempt:
        description: Workflow run attempt
        required: false
        type: string
        default: ''
    outputs:
      version:
        description: The helm chart version that was built
        value: ${{ jobs.build.outputs.version }}

env:
  CHART_PATH: helm
  CHART_NAME: platform-apis

jobs:
  test:
    name: Test Helm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run tests
        env:
          GITHUB_EVENT_NUMBER: ${{ github.event.number }}
        run: ./run-tests.sh helm

  build:
    name: Build Helm
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_NAME="${{ env.CHART_NAME }}"

          # Get major.minor from Chart.yaml
          CHART_VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          MAJOR_MINOR=$(echo "$CHART_VERSION" | cut -d. -f1,2)

          # Fetch with pagination (up to 100 results) and extract stable version tags
          LATEST_TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${PKG_NAME}/versions?per_page=100" \
            | jq -r '
              [.[] | .metadata.container.tags[]? | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))]
              | map(split(".") | map(tonumber))
              | sort_by(.[0], .[1], .[2])
              | .[-1]
              | if . then map(tostring) | join(".") else empty end
            ' 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            NEXT_PATCH=1
          elif [[ "$LATEST_TAG" == ${MAJOR_MINOR}.* ]]; then
            # Latest tag matches current major.minor, increment patch
            CURRENT_PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            NEXT_PATCH=$((CURRENT_PATCH + 1))
          else
            # Major.minor changed, start fresh at patch 1
            NEXT_PATCH=1
          fi

          if [ "${{ inputs.release_type }}" == "rc" ]; then
            VERSION="${MAJOR_MINOR}.${NEXT_PATCH}-rc.${{ inputs.pr_number }}.${{ inputs.run_number }}.${{ inputs.run_attempt }}"
          else
            VERSION="${MAJOR_MINOR}.${NEXT_PATCH}"
          fi

          echo "Latest: $LATEST_TAG -> New: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set version filters
        id: filters
        run: |
          if [ "${{ inputs.release_type }}" == "rc" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "rc_filter=test(\"-rc\\\\.${{ inputs.pr_number }}\\\\.\")" >> $GITHUB_OUTPUT
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
          fi
          echo "stable_filter=test(\"^v[0-9]+\\\\.[0-9]+\\\\.[0-9]+$\")" >> $GITHUB_OUTPUT

      - name: Update dependency versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PR: ${{ steps.filters.outputs.is_pr }}
          JQ_FILTER_RC: ${{ steps.filters.outputs.rc_filter }}
          JQ_FILTER_STABLE: ${{ steps.filters.outputs.stable_filter }}
        run: |
          declare -A PACKAGES=(
            ["artifact"]="platform-apis-artifact-fn"
            ["cronjob"]="platform-apis-cronjob"
            ["database"]="platform-apis-database-fn"
            ["kafka"]="platform-apis-kafka"
            ["networking"]="platform-apis-networking-fn"
            ["postgresql"]="platform-apis-postgresql"
            ["repository"]="platform-apis-repository"
            ["storage"]="platform-apis-storage-fn"
            ["s3bucket"]="platform-apis-s3bucket"
            ["tenancy"]="platform-apis-tenancy-fn"
            ["valkey"]="platform-apis-valkey"
            ["webaccess"]="platform-apis-webaccess"
            ["webapp"]="platform-apis-webapp"
            ["workload"]="platform-apis-workload-fn"
            ["zone"]="platform-apis-zone"
          )

          for KEY in "${!PACKAGES[@]}"; do
            PKG_NAME="${PACKAGES[$KEY]}"
            echo "Fetching tag for $PKG_NAME..."

            # Fetch all versions with pagination
            VERSIONS_JSON=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/$PKG_NAME/versions?per_page=100")

            TAG=""
            if [ "$IS_PR" == "true" ]; then
              # Find latest RC tag for this PR, sorted by base version and RC components (pr.run.attempt)
              TAG=$(echo "$VERSIONS_JSON" \
                | jq -r "[.[] | .metadata.container.tags[]? | select($JQ_FILTER_RC)] | sort_by((split(\"-rc.\")[0] | ltrimstr(\"v\") | split(\".\") | map(tonumber)), (split(\"-rc.\")[1] | split(\".\") | map(tonumber))) | .[-1] // empty" \
                2>/dev/null || echo "")
            fi

            if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
              # Find latest stable tag, sorted by semantic version
              TAG=$(echo "$VERSIONS_JSON" \
                | jq -r "[.[] | .metadata.container.tags[]? | select($JQ_FILTER_STABLE)] | sort_by(ltrimstr(\"v\") | split(\".\") | map(tonumber)) | .[-1] // empty" \
                2>/dev/null || echo "")
            fi

            if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
              echo "Error: Could not find tag for $PKG_NAME"
              exit 1
            fi

            echo "Found tag: $TAG"

            if [[ "$PKG_NAME" == *"-fn" ]]; then
              yq -i ".$KEY.function.tag = \"$TAG\"" ${{ env.CHART_PATH }}/values.yaml
            else
              yq -i ".$KEY.package.tag = \"$TAG\"" ${{ env.CHART_PATH }}/values.yaml
            fi
          done

          echo "Updated values.yaml:"
          cat ${{ env.CHART_PATH }}/values.yaml

      - name: Update chart version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" ${{ env.CHART_PATH }}/Chart.yaml

      - name: Remove test files
        run: rm -f ${{ env.CHART_PATH }}/run_tests.sh

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          helm package ${{ env.CHART_PATH }}
          helm push ${{ env.CHART_NAME }}-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}