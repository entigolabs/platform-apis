name: Build Helm

on:
  workflow_call:
    inputs:
      release_type:
        description: stable or rc
        required: true
        type: string
      pr_number:
        description: PR number (for rc releases)
        required: false
        type: string
        default: ''
      run_number:
        description: Workflow run number
        required: false
        type: string
        default: ''
      run_attempt:
        description: Workflow run attempt
        required: false
        type: string
        default: ''
    outputs:
      version:
        description: The helm chart version that was built
        value: ${{ jobs.build.outputs.version }}

env:
  CHART_PATH: helm
  CHART_NAME: platform-apis

jobs:
  build:
    name: Build Helm
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        uses: ./.github/actions/calculate-version
        with:
          pkg_name: "${{ env.CHART_NAME }}"
          release_type: ${{ inputs.release_type }}
          pr_number: ${{ inputs.pr_number }}
          run_number: ${{ inputs.run_number }}
          run_attempt: ${{ inputs.run_attempt }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update chart and dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" ${{ env.CHART_PATH }}/Chart.yaml
          
          declare -A PACKAGES=(
            ["artifact"]="platform-apis-artifact-fn"
            ["cronjob"]="platform-apis-cronjob"
            ["database"]="platform-apis-database-fn"
            ["kafka"]="platform-apis-kafka"
            ["networking"]="platform-apis-networking-fn"
            ["postgresql"]="platform-apis-postgresql"
            ["repository"]="platform-apis-repository"
            ["storage"]="platform-apis-storage-fn"
            ["s3bucket"]="platform-apis-s3bucket"
            ["tenancy"]="platform-apis-tenancy-fn"
            ["valkey"]="platform-apis-valkey"
            ["webaccess"]="platform-apis-webaccess"
            ["webapp"]="platform-apis-webapp"
            ["workload"]="platform-apis-workload-fn"
            ["zone"]="platform-apis-zone"
          )
          
          fetch_tag() {
            local pkg=$1
            local json=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/$pkg/versions?per_page=100")
            
            local tag=""
            if [ "${{ inputs.release_type }}" == "rc" ]; then
              tag=$(echo "$json" | jq -r --arg pr "${{ inputs.pr_number }}" '
                [.[] | .metadata.container.tags[]? | select(test("-rc\\." + $pr + "\\."))]
                | sort_by(ltrimstr("v") | split("-rc.") | [(.[0] | split(".") | map(tonumber)), (.[1] | split(".") | map(tonumber))] | flatten)
                | .[-1] // empty
              ' 2>/dev/null)
            fi
          
            if [ -z "$tag" ]; then
              tag=$(echo "$json" | jq -r '
                [.[] | .metadata.container.tags[]? | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))]
                | sort_by(ltrimstr("v") | split(".") | map(tonumber))
                | .[-1] // empty
              ' 2>/dev/null)
            fi
            echo "$tag"
          }

          for KEY in "${!PACKAGES[@]}"; do
            PKG_NAME="${PACKAGES[$KEY]}"
            TAG=$(fetch_tag "$PKG_NAME")

            if [ -z "$TAG" ]; then
              echo "Error: Could not find valid tag for $PKG_NAME" >&2
              exit 1
            fi
            echo "Updated $PKG_NAME -> $TAG"

            if [[ "$PKG_NAME" == *"-fn" ]]; then
              yq -i ".$KEY.function.tag = \"$TAG\"" ${{ env.CHART_PATH }}/values.yaml
            else
              yq -i ".$KEY.package.tag = \"$TAG\"" ${{ env.CHART_PATH }}/values.yaml
            fi
          done

      - name: Remove test files
        run: rm -f ${{ env.CHART_PATH }}/run_tests.sh

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          helm package ${{ env.CHART_PATH }}
          helm push ${{ env.CHART_NAME }}-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}