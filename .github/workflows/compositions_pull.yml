name: PR compositions

on:
  pull_request:
    branches:
      - main
    paths:
      - 'compositions/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-composition-changes.yml

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/test-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}

  build:
    needs: [detect-changes, test]
    uses: ./.github/workflows/build-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}
    secrets: inherit

  helm:
    needs: [detect-changes, build]
    uses: ./.github/workflows/build-helm.yml
    secrets: inherit