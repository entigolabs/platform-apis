name: Build Compositions

on:
  workflow_call:
    inputs:
      compositions:
        description: JSON array of compositions to build
        required: true
        type: string
      release_type:
        description: stable or rc
        required: true
        type: string
      pr_number:
        description: PR number (for rc releases)
        required: false
        type: string
        default: ''
      run_number:
        description: Workflow run number
        required: false
        type: string
        default: ''
      run_attempt:
        description: Workflow run attempt
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build ${{ matrix.composition }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        composition: ${{ fromJson(inputs.compositions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Crossplane CLI
        uses: ./.github/actions/setup-crossplane
        with:
          install_path: /usr/local/bin

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove test and example files
        run: rm -rf compositions/${{ matrix.composition }}/test compositions/${{ matrix.composition }}/examples

      - name: Calculate version
        id: version
        uses: ./.github/actions/calculate-version
        with:
          package_name: platform-apis-${{ matrix.composition }}
          release_type: ${{ inputs.release_type }}
          pr_number: ${{ inputs.pr_number }}
          run_number: ${{ inputs.run_number }}
          run_attempt: ${{ inputs.run_attempt }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push package
        working-directory: compositions/${{ matrix.composition }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PKG_NAME: platform-apis-${{ matrix.composition }}
        run: |
          crossplane xpkg build --package-root=. --package-file=${PKG_NAME}.xpkg
          crossplane xpkg push -f ${PKG_NAME}.xpkg ghcr.io/${{ github.repository_owner }}/${PKG_NAME}:${VERSION}