name: Build compositions

on:
  workflow_call:
    inputs:
      compositions:
        description: 'JSON array of compositions to build'
        required: true
        type: string
      release_type:
        description: 'Release type: stable or rc'
        required: true
        type: string
      pr_number:
        description: 'PR number (required for rc releases)'
        required: false
        type: string
        default: ''
      run_number:
        description: 'Workflow run number'
        required: false
        type: string
        default: ''
      run_attempt:
        description: 'Workflow run attempt'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        composition: ${{ fromJson(inputs.compositions) }}
    name: Build ${{ matrix.composition }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
          sudo mv crossplane /usr/local/bin

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove Test and Examples
        run: rm -rf compositions/${{ matrix.composition }}/test compositions/${{ matrix.composition }}/examples

      - name: Calculate Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_NAME="platform-apis-${{ matrix.composition }}"

          # Fetch latest stable version from GHCR
          LATEST_TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${PKG_NAME}/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[]? | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(.created_at) | .[-1].metadata.container.tags[]? // empty | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
            | head -n 1 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            # No existing version, start at v0.1.1
            NEXT_PATCH=1
          else
            # Extract patch version and increment
            CURRENT_PATCH=$(echo "$LATEST_TAG" | sed 's/v0\.1\.//')
            NEXT_PATCH=$((CURRENT_PATCH + 1))
          fi

          if [ "${{ inputs.release_type }}" == "rc" ]; then
            VERSION="v0.1.${NEXT_PATCH}-rc.${{ inputs.pr_number }}.${{ inputs.run_number }}.${{ inputs.run_attempt }}"
          else
            VERSION="v0.1.${NEXT_PATCH}"
          fi

          echo "Latest tag: $LATEST_TAG"
          echo "New version: $VERSION"
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build & Push Package
        working-directory: compositions/${{ matrix.composition }}
        run: |
          PACKAGE_NAME="platform-apis-${{ matrix.composition }}"

          crossplane xpkg build \
            --package-root=. \
            --package-file=${PACKAGE_NAME}.xpkg

          crossplane xpkg push \
            -f ${PACKAGE_NAME}.xpkg \
            ghcr.io/${{ github.repository_owner }}/${PACKAGE_NAME}:${{ env.PACKAGE_VERSION }}
