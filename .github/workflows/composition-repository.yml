name: Build Repository Composition

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'compositions/repository/**'
  pull_request:
    paths:
      - 'compositions/repository/**'
    
jobs:
  build:
    uses: ./.github/workflows/builder-composition.yml
    with:
      path: compositions/repository
      name: entigo-repository
    secrets: inherit
