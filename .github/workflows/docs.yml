name: Platform Docs

on:
  push:
    paths:
      - 'docs/**'
    branches:
      - main
  pull_request:
    paths:
      - 'docs/**'
    branches:
      - main
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  CHART_PATH: docs/helm
  CHART_NAME: entigo-docs
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Helm Lint
        run: helm lint ${{ env.CHART_PATH }}
      - name: Helm Template
        run: |
          mkdir -p out
          helm template test-release ${{ env.CHART_PATH }} > out/manifest.yaml
      - name: Install kube-score
        run: |
          wget https://github.com/zegl/kube-score/releases/download/v1.19.0/kube-score_1.19.0_linux_amd64 -O kube-score
          chmod +x kube-score
          sudo mv kube-score /usr/local/bin/
      - name: Run kube-score
        run: |
          kube-score score out/manifest.yaml \
            --ignore-test container-image-pull-policy \
            --ignore-test container-security-context-user-group-id \
            --ignore-test statefulset-has-servicename \
            --output-format ci
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Calculate Version
        id: version
        run: |
          CURRENT_VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          MAJOR_MINOR=$(echo $CURRENT_VERSION | cut -d. -f1,2)
          NEW_VERSION="${MAJOR_MINOR}.${{ github.run_number }}"
          echo "BUILD_VERSION=$NEW_VERSION" >> $GITHUB_ENV
      - name: Install crdoc & generate API documentation
        run: |
          mkdir docs/temp
          cd docs/temp
          pwd
          sh ../config/install-crdoc.sh
          sh ../config/generate-crds.sh
          cd -
          rm -rf temp
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.CHART_NAME }}
          tags: type=raw,value=v${{ env.BUILD_VERSION }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docs
          file: docs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MARKETING_URL=${{ vars.MARKETING_URL }}
          secrets: |
            STRAPI_URL=${{ secrets.STRAPI_URL }}
            STRAPI_API_TOKEN=${{ secrets.STRAPI_API_TOKEN }}
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GHCR (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      - name: Update Chart Version
        run: |
          yq -i ".version = \"${{ env.BUILD_VERSION }}\"" ${{ env.CHART_PATH }}/Chart.yaml
          yq -i ".appVersion = \"v${{ env.BUILD_VERSION }}\"" ${{ env.CHART_PATH }}/Chart.yaml
          yq -i ".container.image.tag = \"v${{ env.BUILD_VERSION }}\"" ${{ env.CHART_PATH }}/values.yaml
      - name: Package Helm Chart
        run: helm package ${{ env.CHART_PATH }}
      - name: Push Helm Chart to GHCR
        run: |
          helm push ${{ env.CHART_NAME }}-${{ env.BUILD_VERSION }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}