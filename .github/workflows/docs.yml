name: Platform Docs

on:
  push:
    paths:
      - 'docs/**'
    branches:
      - main
  pull_request:
    paths:
      - 'docs/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install crdoc & generate API documentation
        run: |
          mkdir docs/temp
          cd docs/temp
          pwd
          sh ../config/install-crdoc.sh
          sh ../config/generate-crds.sh
          cd -
          rm -rf temp
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/entigo-docs
          tags: |
            type=raw,value=v1.${{ github.run_number }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MARKETING_URL=${{ vars.MARKETING_URL }}
          secrets: |
            STRAPI_URL=${{ secrets.STRAPI_URL }}
            STRAPI_API_TOKEN=${{ secrets.STRAPI_API_TOKEN }}