name: Create Release

on:
  workflow_call:
    inputs:
      version:
        description: Release version (without v prefix)
        required: true
        type: string

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components since last release
        id: changes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          echo "notes<<EOF" >> $GITHUB_OUTPUT

          if [ -z "$PREV_TAG" ]; then
            echo "Initial release" >> $GITHUB_OUTPUT
          else
            CHANGED_FILES=$(git diff --name-only "$PREV_TAG" HEAD)
          
            echo "## Changed components" >> $GITHUB_OUTPUT

            FUNCTIONS=$(echo "$CHANGED_FILES" | grep '^functions/' | grep -v '^functions/common/' | cut -d'/' -f2 | sort -u || true)
            if [ -n "$FUNCTIONS" ]; then
              echo "**Functions:** ${FUNCTIONS}" >> $GITHUB_OUTPUT
            fi

            COMPOSITIONS=$(echo "$CHANGED_FILES" | grep '^compositions/' | cut -d'/' -f2 | sort -u || true)
            if [ -n "$COMPOSITIONS" ]; then
              echo "**Compositions:** ${COMPOSITIONS}" >> $GITHUB_OUTPUT
            fi

            if echo "$CHANGED_FILES" | grep -q '^helm/'; then
              echo "**Helm chart** updated" >> $GITHUB_OUTPUT
            fi
          fi

          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          NOTES: ${{ steps.changes.outputs.notes }}
        run: |
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes \
            --notes "$NOTES" \
            --target "${{ github.sha }}" \
            --latest=true
