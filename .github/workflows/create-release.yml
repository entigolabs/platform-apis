name: Create Release

on:
  workflow_call:
    inputs:
      version:
        description: Release version (without v prefix)
        required: true
        type: string

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components since last release
        id: changes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$PREV_TAG" ]; then
            NOTES="Initial release"
          else
            CHANGED_FILES=$(git diff --name-only "$PREV_TAG" HEAD)

            FUNCTIONS=$(echo "$CHANGED_FILES" | grep '^functions/' | grep -v '^functions/common/' | cut -d'/' -f2 | sort -u | grep -v '^$' || true)
            COMPOSITIONS=$(echo "$CHANGED_FILES" | grep '^compositions/' | cut -d'/' -f2 | sort -u | grep -v '^$' || true)
            HELM=$(echo "$CHANGED_FILES" | grep -c '^helm/' || true)

            NOTES="## Changed components"
            if [ -n "$FUNCTIONS" ]; then
              NOTES="${NOTES}"$'\n'"**Functions:** $(echo "$FUNCTIONS" | tr '\n' ' ' | sed 's/ $//')"
            fi
            if [ -n "$COMPOSITIONS" ]; then
              NOTES="${NOTES}"$'\n'"**Compositions:** $(echo "$COMPOSITIONS" | tr '\n' ' ' | sed 's/ $//')"
            fi
            if [ "$HELM" -gt 0 ]; then
              NOTES="${NOTES}"$'\n'"**Helm chart** updated"
            fi
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          NOTES: ${{ steps.changes.outputs.notes }}
        run: |
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes \
            --notes "$NOTES" \
            --target "${{ github.sha }}" \
            --latest=true
