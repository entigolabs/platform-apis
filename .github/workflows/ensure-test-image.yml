name: Ensure test image

# Checks if test runner image exists in Docker Hub. Builds and pushes it only if missing.

on:
  workflow_call:

env:
  IMAGE_NAME: entigolabs/platform-apis-test-runner:latest

jobs:
  ensure:
    runs-on: ubuntu-latest
    steps:
      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect ${{ env.IMAGE_NAME }} > /dev/null 2>&1; then
            echo "Image exists in Docker Hub"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "Image does not exist in Docker Hub - will build"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.needs_build == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Test Runner
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: test/build/Dockerfile.test
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max