name: Build Webaccess Composition

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'compositions/webaccess/**'
  pull_request:
    paths:
      - 'compositions/webaccess/**'
    
jobs:
  build:
    uses: ./.github/workflows/builder-composition.yml
    with:
      path: compositions/webaccess
      name: platform-apis-webaccess
    secrets: inherit
