name: Main CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'compositions/**'
      - 'test/**'
      - 'helm/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    uses: ./.github/workflows/detect-changes.yml

  test-functions:
    name: Test Functions
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_function_changes == 'true'
    uses: ./.github/workflows/test-functions.yml
    with:
      functions: ${{ needs.detect-changes.outputs.functions }}

  test-compositions:
    name: Test Compositions
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_composition_changes == 'true'
    uses: ./.github/workflows/test-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}

  test-helm:
    name: Test Helm
    needs: [detect-changes]
    if: needs.detect-changes.outputs.helm_changed == 'true'
    uses: ./.github/workflows/test-helm.yml

  build-functions:
    name: Build Functions
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_function_changes == 'true'
    uses: ./.github/workflows/build-functions.yml
    with:
      functions: ${{ needs.detect-changes.outputs.functions }}
      release_type: stable
    secrets: inherit

  build-compositions:
    name: Build Compositions
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_composition_changes == 'true'
    uses: ./.github/workflows/build-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}
      release_type: stable
    secrets: inherit

  build-testhelm:
    name: Build Test Helm
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_testhelm_changes == 'true'
    uses: ./.github/workflows/build-testhelm.yml
    with:
      testhelm: ${{ needs.detect-changes.outputs.testhelm }}
      release_type: stable
      pr_number: ${{ github.event.number }}
      run_number: ${{ github.run_number }}
      run_attempt: ${{ github.run_attempt }}
    secrets: inherit

  build-helm:
    name: Lint and Build Helm
    needs: [detect-changes, test-helm, build-functions, build-compositions]
    if: |
      always() &&
      !cancelled() &&
      (needs.test-helm.result == 'success' || needs.test-helm.result == 'skipped') &&
      (needs.build-functions.result == 'success' || needs.build-functions.result == 'skipped') &&
      (needs.build-compositions.result == 'success' || needs.build-compositions.result == 'skipped')
    uses: ./.github/workflows/build-helm.yml
    with:
      release_type: stable
    secrets: inherit

  prepare-infralib-branch:
    name: Prepare Infralib Branch
    needs: build-helm
    if: always() && needs.build-helm.result == 'success'
    uses: ./.github/workflows/prepare-infralib-branch.yml
    with:
      helm_version: ${{ needs.build-helm.outputs.version }}
    secrets: inherit

  run-infralib-tests:
    name: Run Infralib Tests
    needs: [ build-helm, prepare-infralib-branch, build-testhelm, test-functions, test-compositions ]
    if: |
      always() &&
      needs.prepare-infralib-branch.result == 'success' &&
      (needs.build-testhelm.result == 'success' || needs.build-testhelm.result == 'skipped') &&
      (needs.test-functions.result == 'success' || needs.test-functions.result == 'skipped') &&
      (needs.test-compositions.result == 'success' || needs.test-compositions.result == 'skipped')
    uses: ./.github/workflows/run-infralib-tests.yml
    with:
      branch_name: ${{ needs.prepare-infralib-branch.outputs.branch_name }}
      helm_version: ${{ needs.build-helm.outputs.version }}
    secrets: inherit

  cleanup-infralib-test-files:
    name: Remove Test Files from Infralib Branch
    needs: [build-helm, prepare-infralib-branch, run-infralib-tests]
    if: always() && needs.run-infralib-tests.result == 'success'
    runs-on: ubuntu-latest
    env:
      INFRALIB_REPO: entigolabs/entigo-infralib
      INFRALIB_MODULE_PATH: modules/k8s/platform-apis
    steps:
      - name: Checkout infralib branch
        uses: actions/checkout@v4
        with:
          repository: entigolabs/entigo-infralib
          token: ${{ secrets.INFRALIB_PAT }}
          ref: ${{ needs.prepare-infralib-branch.outputs.branch_name }}

      - name: Remove test files and push
        env:
          BRANCH: ${{ needs.prepare-infralib-branch.outputs.branch_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git rm -f "$INFRALIB_MODULE_PATH/test/"*_test.go || true
          git rm -rf "$INFRALIB_MODULE_PATH/test/templates/" || true

          printf 'package test\n\nimport (\n\t"testing"\n\t"github.com/entigolabs/entigo-infralib-common/k8s"\n)\n\nfunc TestK8sPlatformApisAWSBiz(t *testing.T) {\n\ttestK8sPlatformApis(t, "aws", "biz")\n}\n\nfunc TestK8sPlatformApisAWSPri(t *testing.T) {\n\ttestK8sPlatformApis(t, "aws", "pri")\n}\n\nfunc testK8sPlatformApis(t *testing.T, cloudName string, envName string) {\n\tt.Parallel()\n\t_, _ = k8s.CheckKubectlConnection(t, cloudName, envName)\n}\n' \
            > "$INFRALIB_MODULE_PATH/test/k8s_unit_basic_test.go"
          git add "$INFRALIB_MODULE_PATH/test/k8s_unit_basic_test.go"

          git commit -m "Replace test files with mock before PR"
          git push origin "$BRANCH"

  create-release:
    name: Create GitHub Release
    needs: [build-helm, prepare-infralib-branch, run-infralib-tests]
    if: always() && needs.build-helm.result == 'success'
    uses: ./.github/workflows/create-release.yml
    with:
      version: ${{ needs.build-helm.outputs.version }}
    secrets: inherit

  create-infralib-pr:
    name: Create Infralib PR
    needs: [build-helm, prepare-infralib-branch, run-infralib-tests, cleanup-infralib-test-files]
    if: always() && needs.cleanup-infralib-test-files.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      pr_url: ${{ steps.create-pr.outputs.pr_url }}
    env:
      INFRALIB_REPO: entigolabs/entigo-infralib
    steps:
      - name: Create PR in entigo-infralib
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.INFRALIB_PAT }}
          VERSION: ${{ needs.build-helm.outputs.version }}
        run: |
          PR_URL=$(gh pr create \
            --repo "$INFRALIB_REPO" \
            --base main \
            --head "platform-apis-${VERSION}" \
            --title "Update k8s/platform-apis to ${VERSION}" \
            --body "Automated PR for platform-apis ${VERSION} stable release.")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

  notify:
    name: Slack Notification
    needs: [detect-changes, test-functions, test-compositions, test-helm, build-functions, build-compositions, build-helm, create-release, prepare-infralib-branch, run-infralib-tests, cleanup-infralib-test-files, create-infralib-pr]
    if: always() && !cancelled() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack message
        id: msg
        env:
          R_DETECT: ${{ needs.detect-changes.result }}
          R_ENSURE: ${{ needs.ensure-test-image.result }}
          R_TEST_FN: ${{ needs.test-functions.result }}
          R_TEST_COMP: ${{ needs.test-compositions.result }}
          R_TEST_HELM: ${{ needs.test-helm.result }}
          R_BUILD_FN: ${{ needs.build-functions.result }}
          R_BUILD_COMP: ${{ needs.build-compositions.result }}
          R_BUILD_HELM: ${{ needs.build-helm.result }}
          R_RELEASE: ${{ needs.create-release.result }}
          R_INFRALIB: ${{ needs.prepare-infralib-branch.result }}
          R_TESTS: ${{ needs.run-infralib-tests.result }}
          R_CLEANUP: ${{ needs.cleanup-infralib-test-files.result }}
          R_INFRALIB_PR: ${{ needs.create-infralib-pr.result }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FAILED=""
          add_failed() { [ "$2" = "failure" ] && FAILED="${FAILED:+$FAILED, }$1" || true; }
          add_failed "Detect Changes" "$R_DETECT"
          add_failed "Ensure Test Image" "$R_ENSURE"
          add_failed "Test Functions" "$R_TEST_FN"
          add_failed "Test Compositions" "$R_TEST_COMP"
          add_failed "Test Helm" "$R_TEST_HELM"
          add_failed "Build Functions" "$R_BUILD_FN"
          add_failed "Build Compositions" "$R_BUILD_COMP"
          add_failed "Build Helm" "$R_BUILD_HELM"
          add_failed "Create Release" "$R_RELEASE"
          add_failed "Prepare Infralib Branch" "$R_INFRALIB"
          add_failed "Run Infralib Tests" "$R_TESTS"
          add_failed "Cleanup Test Files" "$R_CLEANUP"
          add_failed "Create Infralib PR" "$R_INFRALIB_PR"

          STEP_DETAILS=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name as $job | (.steps // [] | .[] | select(.conclusion == "failure") | "• " + $job + " → " + .name)] | join("\n")' 2>/dev/null || true)

          {
            echo "message<<SLACKMSG"
            echo "*Failed:* ${FAILED}"
            if [ -n "$STEP_DETAILS" ]; then
              echo "*Failed steps:*"
              echo "${STEP_DETAILS}"
            fi
            echo "*Run:* <${RUN_URL}|View details>"
            echo "SLACKMSG"
          } >> "$GITHUB_OUTPUT"

      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: danger
          SLACK_TITLE: "Main CI: Failed"
          SLACK_MESSAGE: ${{ steps.msg.outputs.message }}
          SLACK_USERNAME: GitHub Actions
          SLACK_ICON_EMOJI: ':github:'
          MSG_MINIMAL: true
