name: Main CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'compositions/**'
      - 'test/**'
      - 'helm/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    uses: ./.github/workflows/detect-changes.yml

  ensure-test-image:
    name: Ensure Test Image
    needs: detect-changes
    uses: ./.github/workflows/ensure-test-image.yml
    with:
      force_rebuild: ${{ needs.detect-changes.outputs.test_image_changed == 'true' }}
    secrets: inherit

  test-functions:
    name: Test Functions
    needs: [detect-changes, ensure-test-image]
    if: needs.detect-changes.outputs.has_function_changes == 'true'
    uses: ./.github/workflows/test-functions.yml
    with:
      functions: ${{ needs.detect-changes.outputs.functions }}

  test-compositions:
    name: Test Compositions
    needs: [detect-changes, ensure-test-image]
    if: needs.detect-changes.outputs.has_composition_changes == 'true'
    uses: ./.github/workflows/test-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}

  test-helm:
    name: Test Helm
    needs: [detect-changes, ensure-test-image]
    if: needs.detect-changes.outputs.helm_changed == 'true'
    uses: ./.github/workflows/test-helm.yml

  build-functions:
    name: Build Functions
    needs: [detect-changes, ensure-test-image]
    if: needs.detect-changes.outputs.has_function_changes == 'true'
    uses: ./.github/workflows/build-functions.yml
    with:
      functions: ${{ needs.detect-changes.outputs.functions }}
      release_type: stable
    secrets: inherit

  build-compositions:
    name: Build Compositions
    needs: [detect-changes, ensure-test-image]
    if: needs.detect-changes.outputs.has_composition_changes == 'true'
    uses: ./.github/workflows/build-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}
      release_type: stable
    secrets: inherit

  build-helm:
    name: Lint and Build Helm
    needs: [detect-changes, test-functions, test-compositions, test-helm, build-functions, build-compositions]
    if: |
      always() &&
      !cancelled() &&
      (needs.test-functions.result == 'success' || needs.test-functions.result == 'skipped') &&
      (needs.test-compositions.result == 'success' || needs.test-compositions.result == 'skipped') &&
      (needs.test-helm.result == 'success' || needs.test-helm.result == 'skipped') &&
      (
        needs.build-functions.result == 'success' ||
        needs.build-compositions.result == 'success' ||
        (needs.detect-changes.outputs.helm_changed == 'true' && needs.build-functions.result == 'skipped' && needs.build-compositions.result == 'skipped')
      )
    uses: ./.github/workflows/build-helm.yml
    with:
      release_type: stable
    secrets: inherit

  create-release:
    name: Create GitHub Release
    needs: build-helm
    if: always() && needs.build-helm.result == 'success'
    uses: ./.github/workflows/create-release.yml
    with:
      version: ${{ needs.build-helm.outputs.version }}
    secrets: inherit

  prepare-infralib-branch:
    name: Prepare Infralib Branch
    needs: build-helm
    if: always() && needs.build-helm.result == 'success'
    uses: ./.github/workflows/prepare-infralib-branch.yml
    with:
      helm_version: ${{ needs.build-helm.outputs.version }}
    secrets: inherit

  create-infralib-pr:
    name: Create Infralib PR
    needs: [build-helm, prepare-infralib-branch]
    if: always() && needs.prepare-infralib-branch.result == 'success'
    runs-on: ubuntu-latest
    env:
      INFRALIB_REPO: entigolabs/entigo-infralib
    steps:
      - name: Create PR in entigo-infralib
        env:
          GH_TOKEN: ${{ secrets.INFRALIB_PAT }}
          VERSION: ${{ needs.build-helm.outputs.version }}
        run: |
          gh pr create \
            --repo "$INFRALIB_REPO" \
            --base main \
            --head "platform-apis-${VERSION}" \
            --title "Update k8s/platform-apis to ${VERSION}" \
            --body "Automated PR for platform-apis ${VERSION} stable release."