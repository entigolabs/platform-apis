name: Build Functions

on:
  workflow_call:
    inputs:
      functions:
        description: JSON array of functions to build
        required: true
        type: string
      release_type:
        description: 'stable or rc'
        required: true
        type: string
      pr_number:
        description: PR number (for rc releases)
        required: false
        type: string
        default: ''
      run_number:
        description: Workflow run number
        required: false
        type: string
        default: ''
      run_attempt:
        description: Workflow run attempt
        required: false
        type: string
        default: ''

env:
  GO_VERSION: '1.25'
  DOCKER_BUILDX_VERSION: 'v0.26.1'

jobs:
  build:
    name: Build ${{ matrix.function }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(inputs.functions) }}
        arch: [amd64, arm64]
    defaults:
      run:
        working-directory: functions/${{ matrix.function }}
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Remove test files
        run: rm -f *_test.go run_tests.sh

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: functions/
          file: functions/${{ matrix.function }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: image
          build-args: GO_VERSION=${{ env.GO_VERSION }}
          outputs: type=docker,dest=functions/${{ matrix.function }}/runtime-${{ matrix.arch }}.tar

      - name: Setup Crossplane CLI
        uses: ./.github/actions/setup-crossplane

      - name: Build package
        run: ./crossplane xpkg build --package-file=${{ matrix.arch }}.xpkg --package-root=package/ --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.function }}-${{ matrix.arch }}
          path: functions/${{ matrix.function }}/*.xpkg
          if-no-files-found: error
          retention-days: 1

  push:
    name: Push ${{ matrix.function }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(inputs.functions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: .github

      - name: Download amd64 package
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.function }}-amd64
          path: .

      - name: Download arm64 package
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.function }}-arm64
          path: .

      - name: Setup Crossplane CLI
        uses: ./.github/actions/setup-crossplane

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        uses: ./.github/actions/calculate-version
        with:
          package_name: platform-apis-${{ matrix.function }}-fn
          release_type: ${{ inputs.release_type }}
          pr_number: ${{ inputs.pr_number }}
          run_number: ${{ inputs.run_number }}
          run_attempt: ${{ inputs.run_attempt }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          XPKG="ghcr.io/${{ github.repository_owner }}/platform-apis-${{ matrix.function }}-fn"
          ./crossplane --verbose xpkg push --package-files $(echo *.xpkg | tr ' ' ,) ${XPKG,,}:${VERSION}