name: Build functions

on:
  workflow_call:
    inputs:
      functions:
        description: 'JSON array of functions to build'
        required: true
        type: string
      release_type:
        description: 'Release type: stable or rc'
        required: true
        type: string
      pr_number:
        description: 'PR number (required for rc releases)'
        required: false
        type: string
        default: ''
      run_number:
        description: 'Workflow run number'
        required: false
        type: string
        default: ''
      run_attempt:
        description: 'Workflow run attempt'
        required: false
        type: string
        default: ''

env:
  GO_VERSION: '1.25'
  DOCKER_BUILDX_VERSION: 'v0.26.1'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(inputs.functions) }}
        arch: [amd64, arm64]
    name: Build ${{ matrix.function }} (${{ matrix.arch }})
    defaults:
      run:
        working-directory: functions/${{ matrix.function }}
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Remove Test Files
        run: rm -f *_test.go run_tests.sh

      - name: Build Runtime
        uses: docker/build-push-action@v6
        with:
          context: functions/
          file: functions/${{ matrix.function }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: image
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
          outputs: type=docker,dest=functions/${{ matrix.function }}/runtime-${{ matrix.arch }}.tar

      - name: Setup Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh

      - name: Build Package
        run: ./crossplane xpkg build --package-file=${{ matrix.arch }}.xpkg --package-root=package/ --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.function }}-${{ matrix.arch }}
          path: functions/${{ matrix.function }}/*.xpkg
          if-no-files-found: error
          retention-days: 1

  push:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(inputs.functions) }}
    name: Push ${{ matrix.function }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: README.md

      - name: Download amd64 Package
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.function }}-amd64
          path: .

      - name: Download arm64 Package
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.function }}-arm64
          path: .

      - name: Setup Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_NAME="platform-apis-${{ matrix.function }}-fn"

          # Fetch latest stable version from GHCR
          LATEST_TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${PKG_NAME}/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[]? | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(.created_at) | .[-1].metadata.container.tags[]? // empty | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
            | head -n 1 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            # No existing version, start at v0.1.1
            NEXT_PATCH=1
          else
            # Extract patch version and increment
            CURRENT_PATCH=$(echo "$LATEST_TAG" | sed 's/v0\.1\.//')
            NEXT_PATCH=$((CURRENT_PATCH + 1))
          fi

          if [ "${{ inputs.release_type }}" == "rc" ]; then
            VERSION="v0.1.${NEXT_PATCH}-rc.${{ inputs.pr_number }}.${{ inputs.run_number }}.${{ inputs.run_attempt }}"
          else
            VERSION="v0.1.${NEXT_PATCH}"
          fi

          echo "Latest tag: $LATEST_TAG"
          echo "New version: $VERSION"
          echo "XPKG_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Push Multi-Platform Package
        run: |
          XPKG="ghcr.io/${{ github.repository_owner }}/platform-apis-${{ matrix.function }}-fn"
          ./crossplane --verbose xpkg push --package-files $(echo *.xpkg|tr ' ' ,) ${XPKG,,}:${{ env.XPKG_VERSION }}