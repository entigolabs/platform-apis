name: Build Functions

on:
  workflow_call:
    inputs:
      functions:
        description: JSON array of functions to build
        required: true
        type: string
      release_type:
        description: 'stable or rc'
        required: true
        type: string
      pr_number:
        description: PR number (for rc releases)
        required: false
        type: string
        default: ''
      run_number:
        description: Workflow run number
        required: false
        type: string
        default: ''
      run_attempt:
        description: Workflow run attempt
        required: false
        type: string
        default: ''

env:
  GO_VERSION: '1.25'
  DOCKER_BUILDX_VERSION: 'v0.26.1'

jobs:
  build:
    name: Build ${{ matrix.function }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(inputs.functions) }}
        arch: [amd64, arm64]
    defaults:
      run:
        working-directory: functions/${{ matrix.function }}
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Remove test files
        run: rm -f *_test.go run_tests.sh

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: functions/
          file: functions/${{ matrix.function }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: image
          build-args: GO_VERSION=${{ env.GO_VERSION }}
          outputs: type=docker,dest=functions/${{ matrix.function }}/runtime-${{ matrix.arch }}.tar

      - name: Setup Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh

      - name: Build package
        run: ./crossplane xpkg build --package-file=${{ matrix.arch }}.xpkg --package-root=package/ --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.function }}-${{ matrix.arch }}
          path: functions/${{ matrix.function }}/*.xpkg
          if-no-files-found: error
          retention-days: 1

  push:
    name: Push ${{ matrix.function }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(inputs.functions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: .github

      - name: Download amd64 package
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.function }}-amd64
          path: .

      - name: Download arm64 package
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.function }}-arm64
          path: .

      - name: Setup Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_NAME="platform-apis-${{ matrix.function }}-fn"

          # Fetch with pagination and extract stable version tags, sorted by semantic version
          LATEST_TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${PKG_NAME}/versions?per_page=100" \
            | jq -r '
              [.[] | .metadata.container.tags[]? | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))]
              | map(ltrimstr("v") | split(".") | map(tonumber))
              | sort_by(.[0], .[1], .[2])
              | .[-1]
              | if . then "v" + (map(tostring) | join(".")) else empty end
            ' 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            NEXT_PATCH=1
          else
            CURRENT_PATCH=$(echo "$LATEST_TAG" | sed 's/v0\.1\.//')
            NEXT_PATCH=$((CURRENT_PATCH + 1))
          fi

          if [ "${{ inputs.release_type }}" == "rc" ]; then
            VERSION="v0.1.${NEXT_PATCH}-rc.${{ inputs.pr_number }}.${{ inputs.run_number }}.${{ inputs.run_attempt }}"
          else
            VERSION="v0.1.${NEXT_PATCH}"
          fi

          echo "Latest: $LATEST_TAG -> New: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Push package
        run: |
          XPKG="ghcr.io/${{ github.repository_owner }}/platform-apis-${{ matrix.function }}-fn"
          ./crossplane --verbose xpkg push --package-files $(echo *.xpkg | tr ' ' ,) ${XPKG,,}:${{ steps.version.outputs.version }}