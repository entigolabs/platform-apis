name: Build Functions

on:
  workflow_call:
    inputs:
      functions:
        description: JSON array of functions to build
        required: true
        type: string
      release_type:
        description: 'stable or rc'
        required: true
        type: string
      pr_number:
        description: PR number (for rc releases)
        required: false
        type: string
        default: ''
      run_number:
        description: Workflow run number
        required: false
        type: string
        default: ''
      run_attempt:
        description: Workflow run attempt
        required: false
        type: string
        default: ''

env:
  GO_VERSION: '1.25'
  DOCKER_BUILDX_VERSION: 'v0.26.1'

jobs:
  build:
    name: Build ${{ matrix.function }}
    runs-on: ubuntu-latest-8-cores
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(inputs.functions) }}
    defaults:
      run:
        working-directory: functions/${{ matrix.function }}
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Remove test files
        run: rm -f *_test.go run_tests.sh

      - name: Create per-arch builders
        run: |
          docker buildx create --name builder-amd64 --use=false
          docker buildx create --name builder-arm64 --use=false

      - name: Build runtime images
        run: |
          docker buildx build \
            --builder builder-amd64 \
            --platform linux/amd64 \
            --cache-from type=gha,scope=${{ matrix.function }}-amd64 \
            --cache-to type=gha,mode=max,scope=${{ matrix.function }}-amd64 \
            --target image \
            --build-arg GO_VERSION=${{ env.GO_VERSION }} \
            --output type=docker,dest=${{ matrix.function }}/runtime-amd64.tar \
            -f ${{ matrix.function }}/Dockerfile \
            . &

          docker buildx build \
            --builder builder-arm64 \
            --platform linux/arm64 \
            --cache-from type=gha,scope=${{ matrix.function }}-arm64 \
            --cache-to type=gha,mode=max,scope=${{ matrix.function }}-arm64 \
            --target image \
            --build-arg GO_VERSION=${{ env.GO_VERSION }} \
            --output type=docker,dest=${{ matrix.function }}/runtime-arm64.tar \
            -f ${{ matrix.function }}/Dockerfile \
            . &

          wait
        working-directory: functions/

      - name: Setup Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh

      - name: Build packages
        run: |
          ./crossplane xpkg build --package-file=amd64.xpkg --package-root=package/ --embed-runtime-image-tarball=runtime-amd64.tar
          ./crossplane xpkg build --package-file=arm64.xpkg --package-root=package/ --embed-runtime-image-tarball=runtime-arm64.tar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_NAME="platform-apis-${{ matrix.function }}-fn"

          # Get major.minor from Chart.yaml
          CHART_VERSION=$(grep '^version:' ${{ github.workspace }}/helm/Chart.yaml | awk '{print $2}')
          MAJOR_MINOR=$(echo "$CHART_VERSION" | cut -d. -f1,2)

          # Fetch with pagination and extract stable version tags, sorted by semantic version
          LATEST_TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${PKG_NAME}/versions?per_page=100" \
            | jq -r '
              [.[] | .metadata.container.tags[]? | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))]
              | map(ltrimstr("v") | split(".") | map(tonumber))
              | sort_by(.[0], .[1], .[2])
              | .[-1]
              | if . then "v" + (map(tostring) | join(".")) else empty end
            ' 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            NEXT_PATCH=1
          elif [[ "$LATEST_TAG" == v${MAJOR_MINOR}.* ]]; then
            # Latest tag matches current major.minor, increment patch
            CURRENT_PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            NEXT_PATCH=$((CURRENT_PATCH + 1))
          else
            # Major.minor changed, start fresh at patch 1
            NEXT_PATCH=1
          fi

          if [ "${{ inputs.release_type }}" == "rc" ]; then
            VERSION="v${MAJOR_MINOR}.${NEXT_PATCH}-rc.${{ inputs.pr_number }}.${{ inputs.run_number }}.${{ inputs.run_attempt }}"
          else
            VERSION="v${MAJOR_MINOR}.${NEXT_PATCH}"
          fi

          echo "Latest: $LATEST_TAG -> New: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Push package
        run: |
          XPKG="ghcr.io/${{ github.repository_owner }}/platform-apis-${{ matrix.function }}-fn"
          ./crossplane --verbose xpkg push --package-files amd64.xpkg,arm64.xpkg ${XPKG,,}:${{ steps.version.outputs.version }}
