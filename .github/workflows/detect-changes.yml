# Detects changes in code and splits them into categories to trigger right jobs.

name: Detect changes

on:
  workflow_call:
    outputs:
      functions:
        description: 'JSON array of changed functions'
        value: ${{ jobs.detect.outputs.functions }}
      has_function_changes:
        description: 'Whether any functions changed'
        value: ${{ jobs.detect.outputs.has_function_changes }}
      compositions:
        description: 'JSON array of changed compositions'
        value: ${{ jobs.detect.outputs.compositions }}
      has_composition_changes:
        description: 'Whether any compositions changed'
        value: ${{ jobs.detect.outputs.has_composition_changes }}
      testhelm:
        description: 'JSON array of testhelm charts to build (derived from affected suites)'
        value: ${{ jobs.detect.outputs.testhelm }}
      has_testhelm_changes:
        description: 'Whether any testhelm changed'
        value: ${{ jobs.detect.outputs.has_testhelm_changes }}
      helm_changed:
        description: 'Whether helm folder changed'
        value: ${{ jobs.detect.outputs.helm_changed }}
      any_changes:
        description: 'Whether any relevant files changed'
        value: ${{ jobs.detect.outputs.any_changes }}
      affected_suites:
        description: 'JSON array of test suites to run (e.g. ["zone","postgresql"])'
        value: ${{ jobs.detect.outputs.affected_suites }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.force-all.outputs.functions || steps.changes.outputs.functions }}
      has_function_changes: ${{ steps.force-all.outputs.has_function_changes || steps.changes.outputs.has_function_changes }}
      compositions: ${{ steps.force-all.outputs.compositions || steps.changes.outputs.compositions }}
      has_composition_changes: ${{ steps.force-all.outputs.has_composition_changes || steps.changes.outputs.has_composition_changes }}
      testhelm: ${{ steps.force-all.outputs.testhelm || steps.changes.outputs.testhelm }}
      has_testhelm_changes: ${{ steps.force-all.outputs.has_testhelm_changes || steps.changes.outputs.has_testhelm_changes }}
      helm_changed: ${{ steps.force-all.outputs.helm_changed || steps.changes.outputs.helm_changed }}
      any_changes: ${{ steps.force-all.outputs.any_changes || steps.changes.outputs.any_changes }}
      affected_suites: ${{ steps.force-all.outputs.affected_suites || steps.changes.outputs.affected_suites }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Force test and build all
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: force-all
        run: |
          get_dirs() {
            ls -d $1*/ 2>/dev/null | xargs -I{} basename {} | grep -vE '^(common|kafka|examples)$' | jq -R -s -c 'split("\n") | map(select(length > 0))' || echo "[]"
          }

          echo "functions=$(get_dirs 'functions/')" >> $GITHUB_OUTPUT
          echo "has_function_changes=true" >> $GITHUB_OUTPUT

          echo "compositions=$(get_dirs 'compositions/')" >> $GITHUB_OUTPUT
          echo "has_composition_changes=true" >> $GITHUB_OUTPUT

          echo "testhelm=$(get_dirs 'test/tests/helm/')" >> $GITHUB_OUTPUT
          echo "has_testhelm_changes=true" >> $GITHUB_OUTPUT

          echo "helm_changed=true" >> $GITHUB_OUTPUT
          echo "any_changes=true" >> $GITHUB_OUTPUT

          # TODO: remove kafka from exclusion list when fully developed
          ALL_COMPS=$(ls -d compositions/*/ 2>/dev/null | xargs -n1 basename | grep -vE '^(common|kafka)$' || true)
          AFFECTED_SUITES_JSON=$(echo "$ALL_COMPS" | tr ' ' '\n' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "affected_suites=$AFFECTED_SUITES_JSON" >> $GITHUB_OUTPUT

      - name: Get changed files
        if: github.event_name != 'workflow_dispatch' && !(github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          sha: ${{ github.event.pull_request.head.sha }}
          json: true
          escape_json: false

      - name: Detect changes
        if: github.event_name != 'workflow_dispatch' && !(github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: changes
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          COMMON_LIB_CHANGED=false
          HELM_GLOBAL_CHANGED=false
          CHANGED_FUNCTIONS=""
          CHANGED_COMPS=""
          
          # Parse changed files directly from the JSON array
          for FILE in $(echo "$CHANGED_FILES" | jq -r '.[]'); do
            if [[ "$FILE" == functions/common/* ]]; then
              COMMON_LIB_CHANGED=true
            elif [[ "$FILE" == functions/* ]]; then
              dir=$(echo "$FILE" | cut -d'/' -f2)
              if [ -n "$dir" ]; then
                CHANGED_FUNCTIONS="$CHANGED_FUNCTIONS $dir"
              fi
            elif [[ "$FILE" == compositions/* ]]; then
              dir=$(echo "$FILE" | cut -d'/' -f2)
              if [ -n "$dir" ] && [ "$dir" != "examples" ] && [ "$dir" != "kafka" ]; then
                CHANGED_COMPS="$CHANGED_COMPS $dir"
              fi
            elif [[ "$FILE" == helm/Chart.yaml || "$FILE" == helm/values.yaml ]]; then
              HELM_GLOBAL_CHANGED=true
            elif [[ "$FILE" == helm/templates/*.yaml ]]; then
              name=$(basename "$FILE" .yaml)
              if [ -d "functions/$name" ]; then
                CHANGED_FUNCTIONS="$CHANGED_FUNCTIONS $name"
              elif [ -d "compositions/$name" ]; then
                if [ "$name" != "kafka" ]; then
                  CHANGED_COMPS="$CHANGED_COMPS $name"
                fi
              elif [[ "$name" == "providers" || "$name" == "functions" ]]; then
                HELM_GLOBAL_CHANGED=true
              fi
            elif [[ "$FILE" == test/tests/helm/platform-apis-test-* ]]; then
              chart_name=$(echo "$FILE" | cut -d'/' -f4)
              if [[ "$chart_name" == "platform-apis-test-zones" || "$chart_name" == "platform-apis-test-app" || "$chart_name" == "platform-apis-test-a-apps" || "$chart_name" == "platform-apis-test-b-apps" ]]; then
                 CHANGED_COMPS="$CHANGED_COMPS zone"
              else
                 comp_name=${chart_name#platform-apis-test-}
                 # TODO: remove kafka if-else when fully developed
                 if [ "$comp_name" != "kafka" ]; then
                   CHANGED_COMPS="$CHANGED_COMPS $comp_name"
                 fi
              fi
            fi
          done

          CHANGED_FUNCTIONS=$(echo "$CHANGED_FUNCTIONS" | tr ' ' '\n' | sort -u | xargs)
          CHANGED_COMPS=$(echo "$CHANGED_COMPS" | tr ' ' '\n' | sort -u | xargs)

          if [ -n "$CHANGED_FUNCTIONS" ]; then
            for comp in $(ls -d compositions/*/ 2>/dev/null | xargs -n1 basename | grep -vE '^(common|kafka|examples)$' || true); do
                for func in $CHANGED_FUNCTIONS; do
                    if grep -q "name: platform-apis-${func}-fn" "compositions/$comp" -r 2>/dev/null; then
                        CHANGED_COMPS="$CHANGED_COMPS $comp"
                        break
                    fi
                done
            done
          fi

          CHANGED_COMPS=$(echo "$CHANGED_COMPS" | tr ' ' '\n' | sort -u | xargs)

          ALL_COMPS=$(ls -d compositions/*/ 2>/dev/null | xargs -n1 basename | grep -vE '^(common|kafka|examples)$' || true)

          AFFECTED_SUITES_LIST=""
          TESTHELM_LIST="platform-apis-test-zones"

          if [ "$COMMON_LIB_CHANGED" == true ] || [ "$HELM_GLOBAL_CHANGED" == true ]; then
            AFFECTED_SUITES_LIST=$(echo "$ALL_COMPS" | tr ' ' '\n' | sort -u | xargs)
            for comp in $ALL_COMPS; do
              if [ "$comp" == "zone" ]; then
                 TESTHELM_LIST="$TESTHELM_LIST platform-apis-test-app platform-apis-test-a-apps platform-apis-test-b-apps"
              else
                 TESTHELM_LIST="$TESTHELM_LIST platform-apis-test-$comp"
              fi
            done
          else
            for comp in $CHANGED_COMPS; do
              AFFECTED_SUITES_LIST="$AFFECTED_SUITES_LIST $comp"
              if [ "$comp" == "zone" ]; then
                 TESTHELM_LIST="$TESTHELM_LIST platform-apis-test-app platform-apis-test-a-apps platform-apis-test-b-apps"
              else
                 TESTHELM_LIST="$TESTHELM_LIST platform-apis-test-$comp"
              fi
            done
          fi

          FUNCTIONS_JSON=$(echo "$CHANGED_FUNCTIONS" | tr ' ' '\n' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))' || echo "[]")
          COMPS_JSON=$(echo "$CHANGED_COMPS" | tr ' ' '\n' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))' || echo "[]")
          AFFECTED_SUITES_JSON=$(echo "$AFFECTED_SUITES_LIST" | tr ' ' '\n' | sort -u | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))' || echo "[]")
          TESTHELM_JSON=$(echo "$TESTHELM_LIST" | tr ' ' '\n' | sort -u | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))' || echo "[]")

          [ "$FUNCTIONS_JSON" != "[]" ] && HAS_FUNC_CHANGES=true || HAS_FUNC_CHANGES=false
          [ "$COMPS_JSON" != "[]" ] && HAS_COMP_CHANGES=true || HAS_COMP_CHANGES=false
          
          ANY_CHANGES=false
          if echo "$CHANGED_FILES" | jq -e 'length > 0' > /dev/null; then
            ANY_CHANGES=true
          fi
          
          HELM_CHANGED=false
          if echo "$CHANGED_FILES" | grep -q '"helm/'; then
            HELM_CHANGED=true
          fi

          echo "functions=$FUNCTIONS_JSON" >> $GITHUB_OUTPUT
          echo "has_function_changes=$HAS_FUNC_CHANGES" >> $GITHUB_OUTPUT
          echo "compositions=$COMPS_JSON" >> $GITHUB_OUTPUT
          echo "has_composition_changes=$HAS_COMP_CHANGES" >> $GITHUB_OUTPUT
          echo "testhelm=$TESTHELM_JSON" >> $GITHUB_OUTPUT
          echo "has_testhelm_changes=true" >> $GITHUB_OUTPUT
          echo "helm_changed=$HELM_CHANGED" >> $GITHUB_OUTPUT
          echo "any_changes=$ANY_CHANGES" >> $GITHUB_OUTPUT
          echo "affected_suites=$AFFECTED_SUITES_JSON" >> $GITHUB_OUTPUT
