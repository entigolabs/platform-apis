name: Detect changes

on:
  workflow_call:
    outputs:
      functions:
        description: 'JSON array of changed functions'
        value: ${{ jobs.detect.outputs.functions }}
      has_function_changes:
        description: 'Whether any functions changed'
        value: ${{ jobs.detect.outputs.has_function_changes }}
      compositions:
        description: 'JSON array of changed compositions'
        value: ${{ jobs.detect.outputs.compositions }}
      has_composition_changes:
        description: 'Whether any compositions changed'
        value: ${{ jobs.detect.outputs.has_composition_changes }}
      test_image_changed:
        description: 'Whether test image sources changed'
        value: ${{ jobs.detect.outputs.test_image_changed }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.changes.outputs.functions }}
      has_function_changes: ${{ steps.changes.outputs.has_function_changes }}
      compositions: ${{ steps.changes.outputs.compositions }}
      has_composition_changes: ${{ steps.changes.outputs.has_composition_changes }}
      test_image_changed: ${{ steps.changes.outputs.test_image_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          sha: ${{ github.event.pull_request.head.sha }}

      - name: Detect changes
        id: changes
        run: |
          ALL_FILES="${{ steps.changed-files.outputs.all_changed_files }}"

          # Functions: if common changed, test all; otherwise only changed ones
          if echo "$ALL_FILES" | tr ' ' '\n' | grep -q '^functions/common/'; then
            echo "Common folder changed - will test all functions"
            FUNCTIONS='["artifact","database","networking","tenancy","workload"]'
          else
            FUNCTIONS=$(echo "$ALL_FILES" | tr ' ' '\n' | grep '^functions/' | grep -v '^functions/common/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "Changed functions: $FUNCTIONS"
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT

          if [ "$FUNCTIONS" == "[]" ]; then
            echo "has_function_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_function_changes=true" >> $GITHUB_OUTPUT
          fi

          # Compositions (excluding examples)
          COMPOSITIONS=$(echo "$ALL_FILES" | tr ' ' '\n' | grep '^compositions/' | grep -v '/examples/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Changed compositions: $COMPOSITIONS"
          echo "compositions=$COMPOSITIONS" >> $GITHUB_OUTPUT

          if [ "$COMPOSITIONS" == "[]" ]; then
            echo "has_composition_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_composition_changes=true" >> $GITHUB_OUTPUT
          fi

          # Test image sources (test/ folder)
          if echo "$ALL_FILES" | tr ' ' '\n' | grep -qE '^test/'; then
            echo "test_image_changed=true" >> $GITHUB_OUTPUT
            echo "Test image sources changed"
          else
            echo "test_image_changed=false" >> $GITHUB_OUTPUT
          fi
