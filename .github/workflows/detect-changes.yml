name: Detect changes

# Detects changes in code and splits them into categories to trigger right jobs.

on:
  workflow_call:
    outputs:
      functions:
        description: 'JSON array of changed functions'
        value: ${{ jobs.detect.outputs.functions }}
      has_function_changes:
        description: 'Whether any functions changed'
        value: ${{ jobs.detect.outputs.has_function_changes }}
      compositions:
        description: 'JSON array of changed compositions'
        value: ${{ jobs.detect.outputs.compositions }}
      has_composition_changes:
        description: 'Whether any compositions changed'
        value: ${{ jobs.detect.outputs.has_composition_changes }}
      testhelm:
        description: 'JSON array of changed testhelm'
        value: ${{ jobs.detect.outputs.testhelm }}
      has_testhelm_changes:
        description: 'Whether any testhelm changed'
        value: ${{ jobs.detect.outputs.has_testhelm_changes }}
      helm_changed:
        description: 'Whether helm folder changed'
        value: ${{ jobs.detect.outputs.helm_changed }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.force-all.outputs.functions || steps.changes.outputs.functions }}
      has_function_changes: ${{ steps.force-all.outputs.has_function_changes || steps.changes.outputs.has_function_changes }}
      compositions: ${{ steps.force-all.outputs.compositions || steps.changes.outputs.compositions }}
      has_composition_changes: ${{ steps.force-all.outputs.has_composition_changes || steps.changes.outputs.has_composition_changes }}
      testhelm: ${{ steps.force-all.outputs.testhelm || steps.changes.outputs.testhelm }}
      has_testhelm_changes: ${{ steps.force-all.outputs.has_testhelm_changes || steps.changes.outputs.has_testhelm_changes }}
      helm_changed: ${{ steps.force-all.outputs.helm_changed || steps.changes.outputs.helm_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Force test and build all
        if: github.event_name == 'workflow_dispatch'
        id: force-all
        run: |
          FUNCTIONS=$(ls -d functions/*/ | xargs -I{} basename {} | grep -v '^common$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "has_function_changes=true" >> $GITHUB_OUTPUT
          echo "All functions: $FUNCTIONS"

          COMPOSITIONS=$(ls -d compositions/*/ | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "compositions=$COMPOSITIONS" >> $GITHUB_OUTPUT
          echo "has_composition_changes=true" >> $GITHUB_OUTPUT
          echo "All compositions: $COMPOSITIONS"

          TESTHELM=$(ls -d test/tests/helm/*/ | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "testhelm=$TESTHELM" >> $GITHUB_OUTPUT
          echo "has_testhelm_changes=true" >> $GITHUB_OUTPUT
          echo "All compositions: $TESTHELM"

          echo "helm_changed=true" >> $GITHUB_OUTPUT

      - name: Get changed files
        if: github.event_name != 'workflow_dispatch'
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          sha: ${{ github.event.pull_request.head.sha }}

      - name: Detect changes
        if: github.event_name != 'workflow_dispatch'
        id: changes
        run: |
          ALL_FILES="${{ steps.changed-files.outputs.all_changed_files }}"

          # Functions: if common changed, test all; otherwise only changed ones
          if echo "$ALL_FILES" | tr ' ' '\n' | grep -q '^functions/common/'; then
            echo "Common folder changed - will test all functions"
            FUNCTIONS='["artifact","database","networking","queue","storage","tenancy","workload"]'
          else
            FUNCTIONS=$(echo "$ALL_FILES" | tr ' ' '\n' | grep '^functions/' | grep -v '^functions/common/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "Changed functions: $FUNCTIONS"
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT

          if [ "$FUNCTIONS" == "[]" ]; then
            echo "has_function_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_function_changes=true" >> $GITHUB_OUTPUT
          fi

          # Compositions (excluding examples)
          COMPOSITIONS=$(echo "$ALL_FILES" | tr ' ' '\n' | grep '^compositions/' | grep -v '/examples/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Changed compositions: $COMPOSITIONS"
          echo "compositions=$COMPOSITIONS" >> $GITHUB_OUTPUT

          if [ "$COMPOSITIONS" == "[]" ]; then
            echo "has_composition_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_composition_changes=true" >> $GITHUB_OUTPUT
          fi

          # Test Helm Charts
          TESTHELM=$(echo "$ALL_FILES" | tr ' ' '\n' | grep '^test/tests/helm/' | cut -d'/' -f4 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Changed testhelm: $TESTHELM"
          echo "testhelm=$TESTHELM" >> $GITHUB_OUTPUT

          if [ "$TESTHELM" == "[]" ]; then
            echo "has_testhelm_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_testhelm_changes=true" >> $GITHUB_OUTPUT
          fi

          # Helm folder
          if echo "$ALL_FILES" | tr ' ' '\n' | grep -qE '^helm/'; then
            echo "helm_changed=true" >> $GITHUB_OUTPUT
            echo "Helm folder changed"
          else
            echo "helm_changed=false" >> $GITHUB_OUTPUT
          fi
