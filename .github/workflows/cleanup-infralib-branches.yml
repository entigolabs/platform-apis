name: Cleanup Infralib Branches

on:
  pull_request:
    types: [closed]

env:
  INFRALIB_REPO: entigolabs/entigo-infralib

jobs:
  cleanup:
    name: Delete Test Branches
    runs-on: ubuntu-latest
    steps:
      - name: Delete test branches
        env:
          GH_TOKEN: ${{ secrets.INFRALIB_PAT }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          echo "Cleaning up branches for PR #${PR_NUMBER}"

          # List all branches across all pages, then filter for this PR
          # gh api --paginate follows Link headers automatically
          BRANCHES=$(gh api --paginate \
            "repos/${{ env.INFRALIB_REPO }}/branches?per_page=100" \
            -q '.[].name' \
            | grep -E "platform-apis-.*-rc\.${PR_NUMBER}\." || true)

          if [ -z "$BRANCHES" ]; then
            echo "No branches found for PR #${PR_NUMBER}"
            exit 0
          fi

          echo "Found branches to delete:"
          echo "$BRANCHES"

          FAILED=0
          for BRANCH in $BRANCHES; do
            echo "Deleting branch: $BRANCH"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ env.INFRALIB_REPO }}/git/refs/heads/${BRANCH}")
            if [ "$HTTP_CODE" == "204" ]; then
              echo "Deleted: $BRANCH"
            else
              echo "ERROR: failed to delete $BRANCH (HTTP $HTTP_CODE)"
              FAILED=1
            fi
          done

          [ "$FAILED" -eq 0 ] && echo "Cleanup complete" || exit 1