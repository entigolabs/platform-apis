name: Reusable builder for Crossplane composition packages

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      name:
        required: true
        type: string

jobs:
  static-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Test Image
        run: |
          PR_IMAGE="${{ secrets.DOCKER_USERNAME }}/platform-apis-test-runner:pr-${{ github.event.number }}"
          LATEST_IMAGE="${{ secrets.DOCKER_USERNAME }}/platform-apis-test-runner:latest"
          
          echo "Attempting to pull PR image: $PR_IMAGE"
          
          if docker pull "$PR_IMAGE"; then
             echo "Using PR image."
             echo "IMAGE_NAME=$PR_IMAGE" >> $GITHUB_ENV
          else
             echo "PR image not found. Falling back to 'latest'..."
          
             docker pull "$LATEST_IMAGE"
             echo "IMAGE_NAME=$LATEST_IMAGE" >> $GITHUB_ENV
          fi

      - name: Run Static Tests
        env:
          SKIP_BUILD: "true"
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run : ./run-tests.sh ${{ inputs.path }}

  build:
    needs: static-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup the Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
          sudo mv crossplane /usr/local/bin

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove Test and Examples Directories
        run: rm -rf ${{ inputs.path }}/test ${{ inputs.path }}/examples

      - name: Calculate Package Version
        run: |
          VERSION="v0.1.${{ github.run_number }}"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            VERSION="${VERSION}-rc.${{ github.event.number }}"
          fi
            
          echo "Calculated Version: $VERSION"
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          
      - name: Build & Publish Package
        working-directory: ${{ inputs.path }}
        run: | 
          crossplane xpkg build \
            --package-root=. \
            --package-file=${{ inputs.name }}.xpkg 

          crossplane xpkg push \
            -f ${{ inputs.name }}.xpkg \
            ghcr.io/${{ github.repository_owner }}/${{ inputs.name }}:${{ env.PACKAGE_VERSION }}
