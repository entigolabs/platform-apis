name: Prepare Infralib Test Branch

on:
  workflow_call:
    inputs:
      helm_version:
        description: "Helm chart version to use"
        required: true
        type: string
    outputs:
      branch_name:
        description: "The name of the created branch"
        value: ${{ jobs.prepare.outputs.branch_name }}

env:
  CHART_NAME: platform-apis
  INFRALIB_REPO: entigolabs/entigo-infralib
  INFRALIB_MODULE_PATH: modules/k8s/platform-apis

jobs:
  prepare:
    name: Create Branch
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.branch.outputs.name }}
    steps:
      - name: Checkout platform-apis (Source)
        uses: actions/checkout@v4
        with:
          path: platform-apis
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Checkout entigo-infralib (Target)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRALIB_REPO }}
          token: ${{ secrets.INFRALIB_PAT }}
          path: infralib

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git and Create Branch
        id: branch
        working-directory: infralib
        env:
          VERSION: ${{ inputs.helm_version }}
        run: |
          BRANCH_NAME="${CHART_NAME}-${VERSION}"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH_NAME"

      - name: Update Chart and Dependencies
        working-directory: infralib
        env:
          VERSION: ${{ inputs.helm_version }}
        run: |
          CHART_FILE="${{ env.INFRALIB_MODULE_PATH }}/Chart.yaml"
          yq -i '
            .version = env(VERSION) | 
            .appVersion = env(VERSION) | 
            (.dependencies[] | select(.name == "platform-apis")).version = env(VERSION)
          ' "$CHART_FILE"

          helm dependency update ${{ env.INFRALIB_MODULE_PATH }}

      - name: Sync Test Files
        run: |
          TARGET="infralib/${{ env.INFRALIB_MODULE_PATH }}/test"
          SOURCE="platform-apis/test/tests"

          rm -f $TARGET/*_test.go
          mkdir -p $TARGET/templates/
          cp $SOURCE/*_test.go $TARGET/
          cp $SOURCE/config/*.yaml $TARGET/
          cp $SOURCE/templates/* $TARGET/templates/

      - name: Commit and Push
        working-directory: infralib
        run: |
          git add .
          git commit -m "Update ${CHART_NAME} to ${VERSION} for testing"
          git push --force origin "$BRANCH_NAME"