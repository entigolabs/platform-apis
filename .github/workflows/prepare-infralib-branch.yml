name: Prepare Infralib Test Branch

on:
  workflow_call:
    inputs:
      helm_version:
        description: "Helm chart version to use"
        required: true
        type: string
      testhelm_version:
        description: "Test helm package version to pin in templates (empty = keep wildcard)"
        required: false
        type: string
        default: ''
      affected_suites:
        description: 'JSON array of test suites to run (e.g. ["zone","postgresql"])'
        required: false
        type: string
        default: '["zone","a-apps","b-apps","cronjob","postgresql","repository","s3bucket","valkey","webaccess","webapp"]'
      built_testhelm:
        description: 'JSON array of testhelm chart names actually built this run (used to pin versions only for built charts)'
        required: false
        type: string
        default: '["platform-apis-test-zones","platform-apis-test-app","platform-apis-test-a-apps","platform-apis-test-b-apps","platform-apis-test-cronjob","platform-apis-test-postgresql","platform-apis-test-repository","platform-apis-test-s3bucket","platform-apis-test-valkey","platform-apis-test-webaccess","platform-apis-test-webapp"]'
    outputs:
      branch_name:
        description: "The name of the created branch"
        value: ${{ jobs.prepare.outputs.branch_name }}

env:
  CHART_NAME: platform-apis
  INFRALIB_REPO: entigolabs/entigo-infralib
  INFRALIB_MODULE_PATH: modules/k8s/platform-apis

jobs:
  prepare:
    name: Create Branch
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.branch.outputs.name }}
    steps:
      - name: Checkout platform-apis (Source)
        uses: actions/checkout@v4
        with:
          path: platform-apis
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Checkout entigo-infralib (Target)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRALIB_REPO }}
          token: ${{ secrets.INFRALIB_PAT }}
          path: infralib

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git and Create Branch
        id: branch
        working-directory: infralib
        env:
          VERSION: ${{ inputs.helm_version }}
        run: |
          BRANCH_NAME="${CHART_NAME}-${VERSION}"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH_NAME"

      - name: Update Chart and Dependencies
        working-directory: infralib
        env:
          VERSION: ${{ inputs.helm_version }}
        run: |
          CHART_FILE="${{ env.INFRALIB_MODULE_PATH }}/Chart.yaml"
          yq -i '
            .version = env(VERSION) | 
            .appVersion = env(VERSION) | 
            (.dependencies[] | select(.name == "platform-apis")).version = env(VERSION)
          ' "$CHART_FILE"

          helm dependency update ${{ env.INFRALIB_MODULE_PATH }}

      - name: Sync Test Files
        env:
          AFFECTED_SUITES: ${{ inputs.affected_suites }}
        run: |
          TARGET="infralib/${{ env.INFRALIB_MODULE_PATH }}/test"
          SOURCE="platform-apis/test/tests"

          rm -f "$TARGET"/*_test.go
          rm -rf "$TARGET/testconfig/"
          rm -rf "$TARGET/templates/"
          mkdir -p "$TARGET/templates/"

          cp "$SOURCE"/*_test.go "$TARGET/"
          cp "$SOURCE"/config/*.yaml "$TARGET/"

          cp "$SOURCE/templates/zone_test_application.yaml" "$TARGET/templates/"

          if echo "$AFFECTED_SUITES" | jq -e '. | index("zone")' > /dev/null; then
             cp "$SOURCE/templates/a_test_application.yaml" "$TARGET/templates/" 2>/dev/null || true
             cp "$SOURCE/templates/b_test_application.yaml" "$TARGET/templates/" 2>/dev/null || true
          fi

          for suite in $(echo "$AFFECTED_SUITES" | jq -r '.[]'); do
             if [ "$suite" != "zone" ]; then
                if [ -f "$SOURCE/templates/${suite}_test_application.yaml" ]; then
                  cp "$SOURCE/templates/${suite}_test_application.yaml" "$TARGET/templates/"
                fi
             fi
          done

          mkdir -p "$TARGET/testconfig"
          {
            echo "suites:"
            echo "$AFFECTED_SUITES" | jq -r '.[] | "  - " + .'
          } > "$TARGET/testconfig/suites.yaml"

      - name: Pin testhelm version in templates
        if: inputs.testhelm_version != ''
        env:
          VERSION: ${{ inputs.testhelm_version }}
          BUILT_TESTHELM: ${{ inputs.built_testhelm }}
        run: |
          TARGET="infralib/${{ env.INFRALIB_MODULE_PATH }}/test/templates"

          # Zone template is always pinned since zones testhelm is always rebuilt.
          if [ -f "$TARGET/zone_test_application.yaml" ]; then
            sed -i "s|targetRevision: '\*\.\*\.\*-0'|targetRevision: '${VERSION}'|g" "$TARGET/zone_test_application.yaml" || true
          fi

          # Pin the version only in templates whose testhelm chart was actually built this run.
          # Charts not built keep the wildcard targetRevision so ArgoCD resolves the latest release.
          for chart in $(echo "$BUILT_TESTHELM" | jq -r '.[]'); do
            template=""
            if [ "$chart" == "platform-apis-test-a-apps" ]; then
               template="a_test_application.yaml"
            elif [ "$chart" == "platform-apis-test-b-apps" ]; then
               template="b_test_application.yaml"
            elif [ "$chart" == "platform-apis-test-app" ]; then
               template=""
            elif [ "$chart" != "platform-apis-test-zones" ]; then
               suite="${chart#platform-apis-test-}"
               template="${suite}_test_application.yaml"
            fi
          
            if [ -n "$template" ] && [ -f "$TARGET/$template" ]; then
              sed -i "s|targetRevision: '\*\.\*\.\*-0'|targetRevision: '${VERSION}'|g" "$TARGET/$template"
            fi
          done

      - name: Commit and Push
        working-directory: infralib
        run: |
          git add .
          git commit -m "Update ${CHART_NAME} to ${VERSION} for testing"
          git push --force origin "$BRANCH_NAME"