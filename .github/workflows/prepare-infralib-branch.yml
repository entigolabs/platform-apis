name: Prepare Infralib Test Branch

on:
  workflow_call:
    inputs:
      helm_version:
        description: "Helm chart version to use"
        required: true
        type: string
      testhelm_version:
        description: "Test helm package version to pin in templates (empty = keep wildcard)"
        required: false
        type: string
        default: ''
      affected_suites:
        description: 'JSON array of test suites to run (e.g. ["zone","postgresql"])'
        required: false
        type: string
        default: '["zone","a-apps","b-apps","postgresql"]'
    outputs:
      branch_name:
        description: "The name of the created branch"
        value: ${{ jobs.prepare.outputs.branch_name }}

env:
  CHART_NAME: platform-apis
  INFRALIB_REPO: entigolabs/entigo-infralib
  INFRALIB_MODULE_PATH: modules/k8s/platform-apis

jobs:
  prepare:
    name: Create Branch
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.branch.outputs.name }}
    steps:
      - name: Checkout platform-apis (Source)
        uses: actions/checkout@v4
        with:
          path: platform-apis
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Checkout entigo-infralib (Target)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRALIB_REPO }}
          token: ${{ secrets.INFRALIB_PAT }}
          path: infralib

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git and Create Branch
        id: branch
        working-directory: infralib
        env:
          VERSION: ${{ inputs.helm_version }}
        run: |
          BRANCH_NAME="${CHART_NAME}-${VERSION}"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH_NAME"

      - name: Update Chart and Dependencies
        working-directory: infralib
        env:
          VERSION: ${{ inputs.helm_version }}
        run: |
          CHART_FILE="${{ env.INFRALIB_MODULE_PATH }}/Chart.yaml"
          yq -i '
            .version = env(VERSION) | 
            .appVersion = env(VERSION) | 
            (.dependencies[] | select(.name == "platform-apis")).version = env(VERSION)
          ' "$CHART_FILE"

          helm dependency update ${{ env.INFRALIB_MODULE_PATH }}

      - name: Sync Test Files
        env:
          AFFECTED_SUITES: ${{ inputs.affected_suites }}
        run: |
          TARGET="infralib/${{ env.INFRALIB_MODULE_PATH }}/test"
          SOURCE="platform-apis/test/tests"

          rm -f "$TARGET"/*_test.go
          # Clean templates to prevent stale files from previous runs persisting.
          rm -rf "$TARGET/templates/"
          mkdir -p "$TARGET/templates/"

          cp "$SOURCE"/*_test.go "$TARGET/"
          cp "$SOURCE"/config/*.yaml "$TARGET/"

          # Zone template is always deployed — it is base infrastructure for all suites.
          cp "$SOURCE/templates/zone_test_application.yaml" "$TARGET/templates/"

          # Copy only the templates for suites that are actually being tested.
          for suite in $(echo "$AFFECTED_SUITES" | jq -r '.[]'); do
            case "$suite" in
              a-apps)     cp "$SOURCE/templates/a_test_application.yaml"          "$TARGET/templates/" ;;
              b-apps)     cp "$SOURCE/templates/b_test_application.yaml"          "$TARGET/templates/" ;;
              postgresql) cp "$SOURCE/templates/postgresql_test_application.yaml" "$TARGET/templates/" ;;
            esac
          done

          # Write suites.yaml into a dedicated testconfig/ subdirectory.
          # Keeping it out of the test root prevents the infralib agent framework from
          # treating it as a cloud agent config (as it does with aws_biz.yaml etc.).
          # Keeping it out of templates/ makes clear it is not an ArgoCD application template.
          mkdir -p "$TARGET/testconfig"
          {
            echo "suites:"
            echo "$AFFECTED_SUITES" | jq -r '.[] | "  - " + .'
          } > "$TARGET/testconfig/suites.yaml"

      - name: Pin testhelm version in templates
        if: inputs.testhelm_version != ''
        env:
          VERSION: ${{ inputs.testhelm_version }}
          AFFECTED_SUITES: ${{ inputs.affected_suites }}
        run: |
          TARGET="infralib/${{ env.INFRALIB_MODULE_PATH }}/test/templates"

          # Zone template is always pinned since zones testhelm is always rebuilt.
          sed -i "s|targetRevision: '\*\.\*\.\*-0'|targetRevision: '${VERSION}'|g" "$TARGET/zone_test_application.yaml"

          # Pin the version only in templates whose testhelm chart was actually built.
          # Charts not built in this run keep the wildcard targetRevision.
          declare -A SUITE_TEMPLATE=(
            [a-apps]="a_test_application.yaml"
            [b-apps]="b_test_application.yaml"
            [postgresql]="postgresql_test_application.yaml"
          )
          for suite in $(echo "$AFFECTED_SUITES" | jq -r '.[]'); do
            template="${SUITE_TEMPLATE[$suite]}"
            [ -n "$template" ] && [ -f "$TARGET/$template" ] || continue
            sed -i "s|targetRevision: '\*\.\*\.\*-0'|targetRevision: '${VERSION}'|g" "$TARGET/$template"
          done

      - name: Commit and Push
        working-directory: infralib
        run: |
          git add .
          git commit -m "Update ${CHART_NAME} to ${VERSION} for testing"
          git push --force origin "$BRANCH_NAME"