name: Execute Infralib Tests

on:
  workflow_call:
    inputs:
      branch_name:
        description: "Infralib branch to test"
        required: true
        type: string
      helm_version:
        description: "Helm version (for reporting only)"
        required: true
        type: string

env:
  INFRALIB_REPO: entigolabs/entigo-infralib
  INFRALIB_MODULE_PATH: modules/k8s/platform-apis

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    concurrency:
      group: infralib-e2e-tests
      cancel-in-progress: false
    steps:
      - name: Checkout entigo-infralib
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRALIB_REPO }}
          token: ${{ secrets.INFRALIB_PAT }}
          ref: ${{ inputs.branch_name }}
          path: infralib

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Test Script
        id: tests
        working-directory: infralib/${{ env.INFRALIB_MODULE_PATH }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set +e
          trap 'kill $(pgrep -P $$) 2>/dev/null; exit 1' TERM INT
          ./test.sh 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          trap - TERM INT
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          VERSION: ${{ inputs.helm_version }}
          BRANCH: ${{ inputs.branch_name }}
          EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let output = fs.readFileSync('infralib/${{ env.INFRALIB_MODULE_PATH }}/test-output.txt', 'utf8');
            const status = process.env.EXIT_CODE === '0' ? 'Passed' : 'Failed';
            const header = `## Infralib E2E Results\n\n**Helm Version:** \`${process.env.VERSION}\`\n**Branch:** \`${process.env.BRANCH}\`\n**Status:** ${status}\n\n<details><summary>Output</summary>\n\n\`\`\`\n`;
            const footer = `\n\`\`\`\n</details>`;
            const maxBody = 65536;
            const maxOutput = maxBody - header.length - footer.length - 100;
            if (output.length > maxOutput) {
              output = '...(truncated, showing last lines)\n' + output.slice(-maxOutput);
            }
            const body = header + output + footer;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1