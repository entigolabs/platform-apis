name: Run Infralib Tests

on:
  workflow_call:
    inputs:
      helm_version:
        description: Helm chart version to test
        required: true
        type: string

env:
  CHART_NAME: platform-apis
  INFRALIB_REPO: entigolabs/entigo-infralib
  INFRALIB_MODULE_PATH: modules/k8s/platform-apis

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    concurrency:
      group: infralib-e2e-tests
      cancel-in-progress: false
    steps:
      - name: Checkout platform-apis
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: platform-apis

      - name: Checkout entigo-infralib
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRALIB_REPO }}
          token: ${{ secrets.INFRALIB_PAT }}
          path: infralib

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create test branch
        id: branch
        working-directory: infralib
        env:
          VERSION: ${{ inputs.helm_version }}
        run: |
          BRANCH_NAME="${CHART_NAME}-${VERSION}"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"

          # Update Chart.yaml with new version using yq
          CHART_FILE="${{ env.INFRALIB_MODULE_PATH }}/Chart.yaml"
          yq -i ".version = \"${VERSION}\"" "$CHART_FILE"
          yq -i ".appVersion = \"${VERSION}\"" "$CHART_FILE"
          yq -i "(.dependencies[] | select(.name == \"platform-apis\")).version = \"${VERSION}\"" "$CHART_FILE"

          # Run helm dependency update
          helm dependency update ${{ env.INFRALIB_MODULE_PATH }}

          # Update test file
          cp ../platform-apis/test/tests/k8s_unit_basic_test.go ${{ env.INFRALIB_MODULE_PATH }}/test/
          mkdir -p ${{ env.INFRALIB_MODULE_PATH }}/test/templates/
          cp ../platform-apis/test/tests/templates/* ${{ env.INFRALIB_MODULE_PATH }}/test/templates/
          

          git add .
          git commit -m "Update ${CHART_NAME} to ${VERSION} for testing"
          git push --force origin "$BRANCH_NAME"

          echo "Created branch: $BRANCH_NAME"

      - name: Run tests
        id: tests
        working-directory: infralib/${{ env.INFRALIB_MODULE_PATH }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set +e
          ./test.sh 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          {
            echo 'output<<EOF'
            cat test-output.txt
            echo 'EOF'
          } >> $GITHUB_OUTPUT

          exit $EXIT_CODE
        continue-on-error: true

      - name: Create job summary
        env:
          VERSION: ${{ inputs.helm_version }}
          BRANCH: ${{ steps.branch.outputs.name }}
          EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
          OUTPUT: ${{ steps.tests.outputs.output }}
        run: |
          {
            echo "## Platform APIs E2E Test Results"
            echo ""
            echo "**Helm Version:** \`${VERSION}\`"
            echo "**Infralib Branch:** \`${BRANCH}\`"
            echo ""
            if [ "$EXIT_CODE" == "0" ]; then
              echo "### Tests Passed"
            else
              echo "### Tests Failed"
            fi
            echo ""
            echo "<details>"
            echo "<summary>Test Output</summary>"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          VERSION: ${{ inputs.helm_version }}
          BRANCH: ${{ steps.branch.outputs.name }}
          EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
          OUTPUT: ${{ steps.tests.outputs.output }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = process.env.EXIT_CODE === '0' ? 'Passed' : 'Failed';
            const body = `## Platform APIs E2E Test Results

            **Helm Version:** \`${process.env.VERSION}\`
            **Infralib Branch:** [\`${process.env.BRANCH}\`](https://github.com/${{ env.INFRALIB_REPO }}/tree/${process.env.BRANCH})
            **Status:** ${status}

            <details>
            <summary>Test Output</summary>

            \`\`\`
            ${process.env.OUTPUT}
            \`\`\`
            </details>
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1