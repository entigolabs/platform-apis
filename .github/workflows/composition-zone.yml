name: Build Zone Composition

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'compositions/zone/**'
  pull_request:
    paths:
      - 'compositions/zone/**'
    
jobs:
  build:
    uses: ./.github/workflows/builder-composition.yml
    with:
      path: compositions/zone
      name: platform-apis-zone
    secrets: inherit
