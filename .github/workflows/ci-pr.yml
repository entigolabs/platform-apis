name: PR CI Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'functions/**'
      - 'compositions/**'
      - 'test/**'
      - 'helm/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    uses: ./.github/workflows/detect-changes.yml

  test-functions:
    name: Test Functions
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_function_changes == 'true'
    uses: ./.github/workflows/test-functions.yml
    with:
      functions: ${{ needs.detect-changes.outputs.functions }}

  test-compositions:
    name: Test Compositions
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_composition_changes == 'true'
    uses: ./.github/workflows/test-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}

  test-helm:
    name: Test Helm
    needs: [detect-changes]
    if: needs.detect-changes.outputs.helm_changed == 'true'
    uses: ./.github/workflows/test-helm.yml

  build-functions:
    name: Build Functions
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_function_changes == 'true'
    uses: ./.github/workflows/build-functions.yml
    with:
      functions: ${{ needs.detect-changes.outputs.functions }}
      release_type: rc
      pr_number: ${{ github.event.number }}
      run_number: ${{ github.run_number }}
      run_attempt: ${{ github.run_attempt }}
    secrets: inherit

  build-compositions:
    name: Build Compositions
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_composition_changes == 'true'
    uses: ./.github/workflows/build-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}
      release_type: rc
      pr_number: ${{ github.event.number }}
      run_number: ${{ github.run_number }}
      run_attempt: ${{ github.run_attempt }}
    secrets: inherit

  build-testhelm:
    name: Build Test Helm
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has_testhelm_changes == 'true'
    uses: ./.github/workflows/build-testhelm.yml
    with:
      testhelm: ${{ needs.detect-changes.outputs.testhelm }}
      release_type: rc
      pr_number: ${{ github.event.number }}
      run_number: ${{ github.run_number }}
      run_attempt: ${{ github.run_attempt }}
    secrets: inherit

  build-helm:
    name: Lint and Build Helm
    needs: [detect-changes, test-helm, build-functions, build-compositions]
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/build-helm.yml
    with:
      release_type: rc
      pr_number: ${{ github.event.number }}
      run_number: ${{ github.run_number }}
      run_attempt: ${{ github.run_attempt }}
    secrets: inherit

  prepare-infralib-branch:
    name: Prepare Infralib Branch
    needs: build-helm
    if: ${{ needs.build-helm.result == 'success' }}
    uses: ./.github/workflows/prepare-infralib-branch.yml
    with:
      helm_version: ${{ needs.build-helm.outputs.version }}
    secrets: inherit

  run-infralib-tests:
    name: Run Infralib Tests
    needs: [ build-helm, prepare-infralib-branch, build-testhelm, test-functions, test-compositions ]
    if: ${{ !failure() && !cancelled() && needs.prepare-infralib-branch.result == 'success' }}
    uses: ./.github/workflows/run-infralib-tests.yml
    with:
      branch_name: ${{ needs.prepare-infralib-branch.outputs.branch_name }}
      helm_version: ${{ needs.build-helm.outputs.version }}
    secrets: inherit

  notify:
    name: Slack Notification
    needs: [detect-changes, test-functions, test-compositions, test-helm, build-functions, build-compositions, build-helm, prepare-infralib-branch, run-infralib-tests, build-testhelm]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack message
        id: msg
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FAILED=$(echo "$NEEDS_JSON" | jq -r 'to_entries | map(select(.value.result == "failure") | .key) | join(", ")')

          STEP_DETAILS=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name as $job | (.steps // [] | .[] | select(.conclusion == "failure") | "• " + $job + " → " + .name)] | join("\n")' 2>/dev/null || true)

          {
            echo "message<<SLACKMSG"
            echo "*PR:* <${PR_URL}|#${PR_NUMBER} - ${PR_TITLE}> by ${PR_AUTHOR}"
            echo "*Failed Jobs:* ${FAILED}"
            if [ -n "$STEP_DETAILS" ]; then
              echo "*Failed Steps:*"
              echo "${STEP_DETAILS}"
            fi
            echo "*Run:* <${RUN_URL}|View details>"
            echo "SLACKMSG"
          } >> "$GITHUB_OUTPUT"

      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: danger
          SLACK_TITLE: "PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}"
          SLACK_MESSAGE: ${{ steps.msg.outputs.message }}
          SLACK_USERNAME: GitHub Actions
          SLACK_ICON_EMOJI: ':github:'
          MSG_MINIMAL: true
