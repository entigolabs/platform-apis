name: Pull Request CI Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'compositions/**'
      - 'test/**'
      - 'helm/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Detects changes in functions, compositions, test common folder, helm
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  # Step 2: Checks if test runner image exists in docker hub, and it is updated. If image is missing or old, pushes image.
  ensure-test-image:
    needs: detect-changes
    uses: ./.github/workflows/ensure-test-image.yml
    with:
      force_rebuild: ${{ needs.detect-changes.outputs.test_image_changed == 'true' }}
    secrets: inherit

  # Step 3: Tests changed functions.
  test-functions:
    needs: [detect-changes, ensure-test-image]
    if: needs.detect-changes.outputs.has_function_changes == 'true'
    uses: ./.github/workflows/test-functions.yml
    with:
      functions: ${{ needs.detect-changes.outputs.functions }}

  # Step 4: Tests compositions after successful functions tests (if functions were changed also), or after skipped functions test (if no changes in functions detected).
  test-compositions:
    needs: [detect-changes, ensure-test-image, test-functions]
    if: |
      always() &&
      needs.detect-changes.outputs.has_composition_changes == 'true' &&
      (needs.test-functions.result == 'success' || needs.test-functions.result == 'skipped')
    uses: ./.github/workflows/test-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}

  # Step 5: Builds packages for functions (if tests passed)
  build-functions:
    needs: [detect-changes, test-functions, test-compositions]
    if: |
      always() &&
      needs.detect-changes.outputs.has_function_changes == 'true' &&
      needs.test-functions.result == 'success' &&
      (needs.test-compositions.result == 'success' || needs.test-compositions.result == 'skipped')
    uses: ./.github/workflows/build-functions.yml
    with:
      functions: ${{ needs.detect-changes.outputs.functions }}
      release_type: rc
      pr_number: ${{ github.event.number }}
      run_number: ${{ github.run_number }}
      run_attempt: ${{ github.run_attempt }}
    secrets: inherit

  # Step 6: Builds packages for compositions (if tests passed)
  build-compositions:
    needs: [detect-changes, test-functions, test-compositions]
    if: |
      always() &&
      needs.detect-changes.outputs.has_composition_changes == 'true' &&
      needs.test-compositions.result == 'success' &&
      (needs.test-functions.result == 'success' || needs.test-functions.result == 'skipped')
    uses: ./.github/workflows/build-compositions.yml
    with:
      compositions: ${{ needs.detect-changes.outputs.compositions }}
      release_type: rc
      pr_number: ${{ github.event.number }}
      run_number: ${{ github.run_number }}
      run_attempt: ${{ github.run_attempt }}
    secrets: inherit

  # Step 7: Tests and builds helm (if any packages built or changes detected in helm itself)
  helm:
    needs: [detect-changes, build-functions, build-compositions]
    if: |
      always() &&
      !cancelled() &&
      (
        needs.build-functions.result == 'success' ||
        needs.build-compositions.result == 'success' ||
        needs.detect-changes.outputs.helm_changed == 'true'
      )
    uses: ./.github/workflows/build-helm.yml
    with:
      release_type: rc
      pr_number: ${{ github.event.number }}
      run_number: ${{ github.run_number }}
      run_attempt: ${{ github.run_attempt }}
    secrets: inherit

  # Step 8: Create test branch in entigo-infralib with updated platform-apis package
  create-infralib-test-branch:
    needs: helm
    if: always() && needs.helm.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform-apis
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: platform-apis-repo

      - name: Checkout entigo-infralib
        uses: actions/checkout@v4
        with:
          repository: entigolabs/entigo-infralib
          token: ${{ secrets.INFRALIB_PAT }}
          path: entigo-infralib

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Helm Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch latest stable version from GHCR
          LATEST_TAG=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/platform-apis/versions" \
            | jq -r '[.[] | select(.metadata.container.tags[]? | test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(.created_at) | .[-1].metadata.container.tags[]? // empty | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
            | head -n 1 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            NEXT_PATCH=1
          else
            CURRENT_PATCH=$(echo "$LATEST_TAG" | sed 's/0\.1\.//')
            NEXT_PATCH=$((CURRENT_PATCH + 1))
          fi

          VERSION="0.1.${NEXT_PATCH}-rc.${{ github.event.number }}.${{ github.run_number }}.${{ github.run_attempt }}"
          echo "HELM_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Helm version: $VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and extract Helm chart
        run: |
          mkdir -p helm-chart
          helm pull oci://ghcr.io/${{ github.repository_owner }}/platform-apis --version ${{ env.HELM_VERSION }} --untar --destination ./helm-chart

      - name: Create test branch and update files
        working-directory: entigo-infralib
        run: |
          BRANCH_NAME="platform-apis-${{ env.HELM_VERSION }}-test"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create new branch
          git checkout -b "$BRANCH_NAME"

          # Replace helm chart
          rm -rf modules/k8s/platform-apis/charts/*
          cp -r ../helm-chart/platform-apis/* modules/k8s/platform-apis/charts/

          # Replace test file
          cp ../platform-apis-repo/test/e2e-tests/k8s_unit_basic_test.go modules/k8s/platform-apis/test/

          # Commit and push
          git add .
          git commit -m "Update platform-apis to ${{ env.HELM_VERSION }} for testing"
          git push origin "$BRANCH_NAME"

          echo "Created branch: $BRANCH_NAME"
