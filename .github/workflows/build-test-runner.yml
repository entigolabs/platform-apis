name: Build Test Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'test/build/**'
      - 'functions/**/go.mod'
      - 'functions/**/go.sum'
      - 'test/common/go.mod'
      - 'test/common/go.sum'
      - 'compositions/go.mod'
      - 'compositions/go.sum'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: test/build/Dockerfile.test
          platforms: linux/amd64,linux/arm64
          push: true
          tags: entigolabs/platform-apis-test-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max