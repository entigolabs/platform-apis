apiVersion: database.entigo.com/v1alpha1
kind: PostgreSQLDatabase
metadata:
  name: database-example
spec:
  owner: owner
  encoding: "UTF8"
  lcCType: "et_EE.UTF-8"
  lcCollate: "et_EE.UTF-8"
  dbTemplate: template0
  instanceRef:
    name: postgresql-example
  extensions:
    - name: postgis
    - name: postgis_topology
      schema: topology
    - name: uuid-ossp
