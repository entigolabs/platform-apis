---
apiVersion: rds.aws.m.upbound.io/v1beta1
kind: SubnetGroup
metadata:
  annotations:
    crossplane.io/external-name: database
  name: database
  namespace: crossplane-aws
spec:
  deletionPolicy: Orphan
  forProvider:
    description: Subnet group for PostgreSQL instance
    region: eu-north-1
    subnetIdRefs:
      - name: dbsubnet-0
      - name: dbsubnet-1
    subnetIds:
      - subnet-0
      - subnet-1
  managementPolicies:
    - Observe
  providerConfigRef:
    name: crossplane-aws
status:
  atProvider:
    arn: arn:aws:rds:eu-north-1:012345678901:subgrp:test-subnetgroup
    state: Complete
    subnets:
      - subnetID: subnet-0
        subnetStatus: Active
      - subnetID: subnet-1
        subnetStatus: Active
    vpcId: vpc
  conditions:
    - lastTransitionTime: "2025-01-01T00:00:00Z"
      reason: ReconcileSuccess
      status: "True"
      type: Synced
    - lastTransitionTime: "2025-01-01T00:00:00Z"
      reason: Available
      status: "True"
      type: Ready
