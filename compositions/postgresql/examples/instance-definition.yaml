examples:
  - title: Basic PostgreSQL Instance
    description: Minimal configuration example
    code: |
      apiVersion: database.entigo.com/v1alpha1
      kind: PostgreSQLInstance
      metadata:
        name: basic-db
      spec:
        allocatedStorage: 20
        engineVersion: "13.4"
        instanceType: db.t3.medium

  - title: Advanced PostgreSQL Instance
    description: High availability and backups enabled
    code: |
      apiVersion: database.entigo.com/v1alpha1
      kind: PostgreSQLInstance
      metadata:
        name: advanced-db
      spec:
        allocatedStorage: 100
        engineVersion: "13.4"
        instanceType: db.m5.large
        multiAZ: true
        backupWindow: "00:00-01:00"