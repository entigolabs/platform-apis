apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: postgresqldatabases.database.entigo.com
spec:
  compositeTypeRef:
    apiVersion: database.entigo.com/v1alpha1
    kind: PostgreSQLDatabase
  mode: Pipeline
  pipeline:
  - step: grant-owner-to-dbadmin
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
          kind: ExtraResources
          requirements:
            postgresql-user:
              apiVersion: database.entigo.com/v1alpha1
              kind: PostgreSQLUser
              matchName: {{ .observed.composite.resource.spec.owner }}
              namespace: {{ .observed.composite.resource.metadata.namespace }}
          {{- $grantExists := hasKey .observed.resources "grant-owner-to-dbadmin" -}}
          {{- $users := getExtraResources . "postgresql-user" -}}
          {{- $userReady := false -}}
          {{- if $users -}}
          {{- $user := mustFirst $users -}}
          {{- range $user.resource.status.conditions -}}
          {{- if and (eq .type "Ready") (eq .status "True") -}}{{- $userReady = true -}}{{- end -}}
          {{- end -}}
          {{- end -}}
          {{- if or $grantExists $userReady }}
          ---
          apiVersion: postgresql.sql.m.crossplane.io/v1alpha1
          kind: Grant
          metadata:
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: grant-owner-to-dbadmin
            name: {{ .observed.composite.resource.metadata.name }}-grant-owner-to-dbadmin
            namespace: {{ .observed.composite.resource.metadata.namespace }}
          spec:
            forProvider:
              role: "dbadmin"
              memberOf: "{{ .observed.composite.resource.spec.owner }}"
            providerConfigRef:
              kind: ProviderConfig
              name: {{ .observed.composite.resource.spec.instanceRef.name }}-providerconfig
          {{- end }}
  - step: database
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $encoding := .observed.composite.resource.spec.encoding -}}
          {{- $lcCType := .observed.composite.resource.spec.lcCType -}}
          {{- $lcCollate := .observed.composite.resource.spec.lcCollate -}}
          {{- $dbTemplate := .observed.composite.resource.spec.dbTemplate -}}
          ---
          apiVersion: postgresql.sql.m.crossplane.io/v1alpha1
          kind: Database
          metadata:
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: postgresql-database
            name: {{ .observed.composite.resource.metadata.name }}
            namespace: {{ .observed.composite.resource.metadata.namespace }}
          spec:
            forProvider:
              owner: {{ .observed.composite.resource.spec.owner }}
            {{- if $encoding }}
              encoding: {{ $encoding }}
            {{- end }}
            {{- if $lcCType }}
              lcCType: {{ $lcCType }}
            {{- end }}
            {{- if $lcCollate }}
              lcCollate: {{ $lcCollate }}
            {{- end }}
            {{- if $dbTemplate }}
              template: {{ $dbTemplate }}
            {{- end }}
            providerConfigRef:
              kind: ProviderConfig
              name: {{ .observed.composite.resource.spec.instanceRef.name }}-providerconfig
  - step: extensions
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $extConfig := default dict .observed.composite.resource.spec.extensionConfig -}}
          {{- range $index, $extName := .observed.composite.resource.spec.extensions }}
          {{- $extCfg := index $extConfig $extName -}}
          {{- $extSchema := "" -}}
          {{- if $extCfg -}}{{- $extSchema = $extCfg.schema -}}{{- end }}
          ---
          apiVersion: postgresql.sql.m.crossplane.io/v1alpha1
          kind: Extension
          metadata:
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: extension-{{ $extName | replace "_" "-" }}-{{ $index }}
            name: {{ $.observed.composite.resource.metadata.name }}-{{ $extName | replace "_" "-" }}
            namespace: {{ $.observed.composite.resource.metadata.namespace }}
          spec:
            forProvider:
              extension: {{ $extName }}
              database: {{ $.observed.composite.resource.metadata.name }}
            {{- if $extSchema }}
              schema: {{ $extSchema }}
            {{- end }}
            providerConfigRef:
              kind: ProviderConfig
              name: {{ $.observed.composite.resource.spec.instanceRef.name }}-providerconfig
          {{- end }}
  - step: protect-instance-until-database-deleted
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          ---
          apiVersion: protection.crossplane.io/v1beta1
          kind: Usage
          metadata:
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: instance-protection
            name: {{ .observed.composite.resource.metadata.name }}-instance-protection
            namespace: {{ .observed.composite.resource.metadata.namespace }}
          spec:
            replayDeletion: true
            of:
              apiVersion: database.entigo.com/v1alpha1
              kind: PostgreSQLInstance
              resourceRef:
                name: {{ .observed.composite.resource.spec.instanceRef.name }}
            by:
              apiVersion: database.entigo.com/v1alpha1
              kind: PostgreSQLDatabase
              resourceRef:
                name: {{ .observed.composite.resource.metadata.name }}
  - step: protect-grant-until-database-deleted
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          ---
          apiVersion: protection.crossplane.io/v1beta1
          kind: Usage
          metadata:
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: grant-usage
            name: {{ .observed.composite.resource.metadata.name }}-grant-usage
            namespace: {{ .observed.composite.resource.metadata.namespace }}
          spec:
            replayDeletion: true
            of:
              apiVersion: postgresql.sql.m.crossplane.io/v1alpha1
              kind: Grant
              resourceRef:
                name: {{ .observed.composite.resource.metadata.name }}-grant-owner-to-dbadmin
            by:
              apiVersion: postgresql.sql.m.crossplane.io/v1alpha1
              kind: Database
              resourceRef:
                name: {{ .observed.composite.resource.metadata.name }}
  - step: automatically-detect-ready-composed-resources
    functionRef:
      name: function-auto-ready
  - step: sequence-creation
    functionRef:
      name: function-sequencer
    input:
      apiVersion: sequencer.fn.crossplane.io/v1beta1
      kind: Input
      rules:
        - sequence:
          - grant-owner-to-dbadmin
          - postgresql-database
          - extension-.*
          - grant-usage
          - instance-protection