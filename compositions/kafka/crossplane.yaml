apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: entigo-kafka-composition
  annotations:
    # Set the annotations defining the maintainer, source, license, and description of your Configuration
    meta.crossplane.io/maintainer: Tanel Saar <tanel.saar@entigo.com>
    meta.crossplane.io/source: github.com/entigolabs/platform-apis
    # Set the license of your Configuration
    meta.crossplane.io/license: AGPL
    meta.crossplane.io/description: |
      Manage AWS MSK Kafka Topic's, Users their ACL's through Kubernetes.
    meta.crossplane.io/readme: |
      ...
spec:
  packagePullPolicy: IfNotPresent
  skipDependencyResolution: true
  crossplane:
    version: ">=v2.0.0"
  dependsOn:
    - provider: xpkg.upbound.io/crossplane-contrib/function-go-templating
      version: ">=v0.11.0"
    - provider: xpkg.upbound.io/crossplane-contrib/function-auto-ready
      version: ">=v0.5.0"
    - provider: xpkg.upbound.io/crossplane-contrib/function-sequencer
      version: ">=v0.3.0"
    - provider: xpkg.upbound.io/crossplane-contrib/provider-kafka
      version: ">=v0.5.0"
    - provider: xpkg.upbound.io/upbound/provider-aws-kafka
      version: ">=v2.0.2"
    - provider: xpkg.upbound.io/upbound/provider-aws-secretsmanager
      version: ">=v2.0.2"
