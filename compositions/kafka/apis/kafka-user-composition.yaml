apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: kafka-user
spec:
  compositeTypeRef:
    apiVersion: kafka.entigo.com/v1alpha1
    kind: KafkaUser
  mode: Pipeline
  pipeline:
    - step: create-base-secrets
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $clusterName := .observed.composite.resource.spec.clusterName -}}
            {{- $username := .observed.composite.resource.metadata.name -}}
            {{- $namespace := .observed.composite.resource.metadata.namespace -}}
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              msk-observer:
                apiVersion: kafka.entigo.com/v1alpha1
                kind: MSK
                matchName: {{ $clusterName }}-observed
            {{- $secretResourceName := printf "k8s-secret-%s" $username -}}
            {{- $observedSecret := getComposedResource . $secretResourceName -}}
            {{- $password := "" -}}
            {{- if $observedSecret -}}
              {{- $secretData := dig "data" "secretString" "" $observedSecret -}}
              {{- if $secretData -}}
                {{- $password = $secretData | b64dec | fromJson | dig "password" "" -}}
              {{- end -}}
            {{- end -}}
            {{- if not $password -}}
              {{- $password = randAlphaNum 32 -}}
            {{- end -}}
            {{- $bootstrapServers := "" -}}
            {{- $mskObservers := getExtraResources . "msk-observer" -}}
            {{- if $mskObservers -}}
              {{- $mskObserver := mustFirst $mskObservers -}}
              {{- $bootstrapServers = $mskObserver.resource.status.brokersscram | default "" -}}
            {{- end }}
            ---
            apiVersion: v1
            kind: Secret
            metadata:
              name: {{ $clusterName }}-{{ $username }}-k8s
              namespace: {{ $namespace }}
              labels:
                msk-cluster: {{ $clusterName }}
                kafka-user: {{ $username }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $secretResourceName }}
                gotemplating.fn.crossplane.io/ready: "True"
            type: Opaque
            stringData:
              secretString: '{"username":"{{ $username }}","password":"{{ $password }}","bootstrap_servers":"{{ $bootstrapServers }}"}'
            {{- if $observedSecret }}
            ---
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              environmentConfig:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-kafka
              kms-key:
                apiVersion: kms.aws.upbound.io/v1beta1
                kind: Key
                matchName: config
            {{- $envConfig := mustFirst (getExtraResources . "environmentConfig") }}
            {{- $awsProviderConfigRef := $envConfig.resource.data.awsProvider }}
            {{- $kmskeys := getExtraResources . "kms-key" -}}
            {{- $mskObservers := getExtraResources . "msk-observer" -}}
            {{- if and $kmskeys $mskObservers -}}
              {{- $kmskey := mustFirst $kmskeys -}}
              {{- $kmsKeyId := $kmskey.resource.status.atProvider.keyId -}}
              {{- $mskObserver := mustFirst $mskObservers -}}
              {{- $region := $mskObserver.resource.status.region }}
            ---
            apiVersion: secretsmanager.aws.upbound.io/v1beta1
            kind: Secret
            metadata:
              name: {{ $clusterName }}-{{ $username }}
              labels:
                msk-cluster: {{ $clusterName }}
                kafka-user: {{ $username }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: aws-secret-{{ $username }}
            spec:
              forProvider:
                name: AmazonMSK_{{ $clusterName }}-{{ $username }}
                description: "SCRAM credentials for Kafka user {{ $username }}"
                region: {{ $region }}
                kmsKeyId: {{ $kmsKeyId }}
                recoveryWindowInDays: 0
                tags:
                  KafkaCluster: {{ $clusterName }}
                  KafkaUser: {{ $username }}
              providerConfigRef:
                name: {{ $awsProviderConfigRef }}
            {{- end -}}
            {{- end -}}
    - step: create-secret-versions
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $clusterName := .observed.composite.resource.spec.clusterName -}}
            {{- $username := .observed.composite.resource.metadata.name -}}
            {{- $namespace := .observed.composite.resource.metadata.namespace -}}
            ---
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              environmentConfig:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-kafka
              msk-observer:
                apiVersion: kafka.entigo.com/v1alpha1
                kind: MSK
                matchName: {{ $clusterName }}-observed
            {{- $mskObservers := getExtraResources . "msk-observer" -}}
            {{- $envConfig := mustFirst (getExtraResources . "environmentConfig") }}
            {{- $awsProviderConfigRef := $envConfig.resource.data.awsProvider }}
            {{- if $mskObservers -}}
            {{- $mskObserver := mustFirst $mskObservers -}}
            {{- $region := $mskObserver.resource.status.region }}
            ---
            apiVersion: secretsmanager.aws.upbound.io/v1beta1
            kind: SecretVersion
            metadata:
              name: {{ $clusterName }}-{{ $username }}-version
              labels:
                msk-cluster: {{ $clusterName }}
                kafka-user: {{ $username }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: secret-version-{{ $username }}
            spec:
              managementPolicies: ["Observe", "Create", "Delete"]
              forProvider:
                region: {{ $region }}
                secretIdSelector:
                  matchLabels:
                    msk-cluster: {{ $clusterName }}
                    kafka-user: {{ $username }}
                secretStringSecretRef:
                  name: {{ $clusterName }}-{{ $username }}-k8s
                  namespace: {{ $namespace }}
                  key: secretString
              providerConfigRef:
                name: {{ $awsProviderConfigRef }}
            {{- end }}

    - step: create-secret-policies
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $clusterName := .observed.composite.resource.spec.clusterName -}}
            {{- $username := .observed.composite.resource.metadata.name -}}
            {{- $namespace := .observed.composite.resource.metadata.namespace -}}
            ---
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              environmentConfig:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-kafka
              msk-observer:
                apiVersion: kafka.entigo.com/v1alpha1
                kind: MSK
                matchName: {{ $clusterName }}-observed
            {{- $mskObservers := getExtraResources . "msk-observer" -}}
            {{- $envConfig := mustFirst (getExtraResources . "environmentConfig") }}
            {{- $awsProviderConfigRef := $envConfig.resource.data.awsProvider }}
            {{- if $mskObservers -}}
            {{- $mskObserver := mustFirst $mskObservers -}}
            {{- $region := $mskObserver.resource.status.region }}
            ---
            apiVersion: secretsmanager.aws.upbound.io/v1beta1
            kind: SecretPolicy
            metadata:
              name: {{ $clusterName }}-{{ $username }}-policy
              labels:
                msk-cluster: {{ $clusterName }}
                kafka-user: {{ $username }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: secret-policy-{{ $username }}
            spec:
              forProvider:
                region: {{ $region }}
                secretArnSelector:
                  matchLabels:
                    msk-cluster: {{ $clusterName }}
                    kafka-user: {{ $username }}
                policy: |
                  {
                    "Version": "2012-10-17",
                    "Statement": [{
                      "Sid": "AWSKafkaResourcePolicy",
                      "Effect": "Allow",
                      "Principal": {"Service": "kafka.amazonaws.com"},
                      "Action": "secretsmanager:GetSecretValue",
                      "Resource": "*"
                    }]
                  }
              providerConfigRef:
                name: {{ $awsProviderConfigRef }}
            {{- end }}
    - step: create-scram-association
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $clusterName := .observed.composite.resource.spec.clusterName -}}
            {{- $username := .observed.composite.resource.metadata.name -}}
            ---
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              environmentConfig:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-kafka
              msk-observer:
                apiVersion: kafka.entigo.com/v1alpha1
                kind: MSK
                matchName: {{ $clusterName }}-observed
            {{- $mskObservers := getExtraResources . "msk-observer" -}}
            {{- $envConfig := mustFirst (getExtraResources . "environmentConfig") }}
            {{- $awsProviderConfigRef := $envConfig.resource.data.awsProvider }}
            {{- if $mskObservers -}}
            {{- $mskObserver := mustFirst $mskObservers -}}
            {{- $clusterArn := $mskObserver.resource.status.arn -}}
            {{- $region := $mskObserver.resource.status.region }}
            ---
            apiVersion: kafka.aws.upbound.io/v1beta1
            kind: SingleScramSecretAssociation
            metadata:
              name: {{ $clusterName }}-{{ $username }}-scram
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: secret-scram-association-{{ $username }}
            spec:
              forProvider:
                region: {{ $region }}
                clusterArn: {{ $clusterArn }}
                secretArnRef:
                  name: {{ $clusterName }}-{{ $username }}
              providerConfigRef:
                name: {{ $awsProviderConfigRef }}
            {{- end }}
    - step: consumer-group-acls
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- if .observed.composite.resource.spec.consumerGroups -}}
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              msk-observer:
                apiVersion: kafka.entigo.com/v1alpha1
                kind: MSK
                matchName: {{ .observed.composite.resource.spec.clusterName }}-observed
            {{- $mskObservers := getExtraResources . "msk-observer" -}}
            {{- if $mskObservers -}}
            {{- $mskObserver := mustFirst $mskObservers -}}
            {{- $kafkaProviderConfig := $mskObserver.resource.status.providerConfig -}}
            {{- $username := .observed.composite.resource.metadata.name -}}
            {{- $namespace := .observed.composite.resource.metadata.namespace -}}
            {{- range $index, $consumerGroup := .observed.composite.resource.spec.consumerGroups }}
            ---
            apiVersion: acl.kafka.m.crossplane.io/v1alpha1
            kind: AccessControlList
            metadata:
              name: {{ $username }}-{{ lower $consumerGroup }}-cg
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: acl-cg-{{ $username }}-{{ $consumerGroup }}
            spec:
              forProvider:
                resourceType: "Group"
                resourceName: {{ $consumerGroup | quote }}
                resourcePatternTypeFilter: "Literal"
                resourcePrincipal: {{ printf "User:%s" $username | quote }}
                resourceHost: "*"
                resourceOperation: "Read"
                resourcePermissionType: "Allow"
              providerConfigRef:
                name: {{ $kafkaProviderConfig }}
            {{- end }}
            {{- end }}
            {{- end }}
    - step: create-topic-acls
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- if .observed.composite.resource.spec.acls -}}
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              msk-observer:
                apiVersion: kafka.entigo.com/v1alpha1
                kind: MSK
                matchName: {{ .observed.composite.resource.spec.clusterName }}-observed
            {{- $mskObservers := getExtraResources . "msk-observer" -}}
            {{- if $mskObservers -}}
            {{- $mskObserver := mustFirst $mskObservers -}}
            {{- $kafkaProviderConfig := $mskObserver.resource.status.providerConfig -}}
            {{- $username := .observed.composite.resource.metadata.name -}}
            {{- $namespace := .observed.composite.resource.metadata.namespace -}}
            {{- range $index, $acl := .observed.composite.resource.spec.acls }}
            ---
            apiVersion: acl.kafka.m.crossplane.io/v1alpha1
            kind: AccessControlList
            metadata:
              name: {{ $acl.topic }}-{{ $username }}-{{ lower $acl.operation }}
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: acl-topic-{{ $acl.topic }}-{{ $username }}-{{ lower $acl.operation }}
            spec:
              forProvider:
                resourceType: "Topic"
                resourceName: {{ $acl.topic | quote }}
                resourcePatternTypeFilter: "Literal"
                resourcePrincipal: {{ printf "User:%s" $username | quote }}
                resourceHost: "*"
                resourceOperation: {{ $acl.operation | quote }}
                resourcePermissionType: "Allow"
              providerConfigRef:
                name: {{ $kafkaProviderConfig }}
            {{- end }}
            {{- end }}
            {{- end }}

    - step: detect-readiness
      functionRef:
        name: function-auto-ready
        
    - step: sequence-creation
      functionRef:
        name: function-sequencer
      input:
        apiVersion: sequencer.fn.crossplane.io/v1beta1
        kind: Input
        rules:
          - sequence:
            - k8s-secret-.*
            - aws-secret-.*
            - secret-version-.*
            - secret-policy-.*
            - secret-scram-association-.*
            - acl-.*
