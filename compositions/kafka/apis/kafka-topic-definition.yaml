apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: topics.kafka.entigo.com
spec:
  scope: Namespaced
  group: kafka.entigo.com
  names:
    kind: Topic
    plural: topics
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                partitions:
                  type: integer
                  default: 3
                  minimum: 1
                  description: "Number of partitions"
                replicationFactor:
                  type: integer
                  default: 3
                  minimum: 1
                  description: "Replication factor"
                config:
                  type: object
                  additionalProperties:
                    type: string
                  description: "Topic-level configuration"
                clusterName:
                  type: string
                  description: "Name of the MSK cluster name"
              required:
                - clusterName
