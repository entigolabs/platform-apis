apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: kafka-topic
spec:
  compositeTypeRef:
    apiVersion: kafka.entigo.com/v1alpha1
    kind: XTopic
  mode: Pipeline
  pipeline:
    - step: create-kafka-topics
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $topicName := .observed.composite.resource.spec.claimRef.name -}}
            {{- $partitions := .observed.composite.resource.spec.partitions | default 3 -}}
            {{- $replicationFactor := .observed.composite.resource.spec.replicationFactor | default 3 -}}
            {{- $config := .observed.composite.resource.spec.config -}}
            {{- $clusterName := .observed.composite.resource.spec.clusterName -}}
            ---
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              msk-observer:
                apiVersion: kafka.entigo.com/v1alpha1
                kind: MSK
                matchName: {{ $clusterName }}-observed
            {{- $mskObservers := getExtraResources . "msk-observer" -}}
            {{- if $mskObservers -}}
            {{- $mskObserver := mustFirst $mskObservers -}}
            {{- $kafkaProviderConfig := $mskObserver.resource.status.providerConfig }}
            ---
            apiVersion: topic.kafka.crossplane.io/v1alpha1
            kind: Topic
            metadata:
              name: {{ $topicName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: topic-{{ $topicName }}
            spec:
              forProvider:
                partitions: {{ $partitions }}
                replicationFactor: {{ $replicationFactor }}
                {{- if $config }}
                config:
                  {{- range $key, $value := $config }}
                  {{ $key }}: {{ $value | quote }}
                  {{- end }}
                {{- end }}
              providerConfigRef:
                name: {{ $kafkaProviderConfig }}
            {{- end }}
    - step: create-kafka-acls
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              msk-observer:
                apiVersion: kafka.entigo.com/v1alpha1
                kind: MSK
                matchName: {{ .observed.composite.resource.spec.clusterName }}-observed
            {{- $mskObservers := getExtraResources . "msk-observer" -}}
            {{- if $mskObservers -}}
            {{- $mskObserver := mustFirst $mskObservers -}}
            {{- $kafkaProviderConfig := $mskObserver.resource.status.providerConfig -}}
            {{- $topicName := .observed.composite.resource.spec.claimRef.name -}}
            {{- if .observed.composite.resource.spec.acls }}
            {{- range $index, $acl := .observed.composite.resource.spec.acls }}
            {{- $username := trimPrefix "User:" $acl.principal }}
            ---
            apiVersion: acl.kafka.crossplane.io/v1alpha1
            kind: AccessControlList
            metadata:
              name: {{ $topicName }}-{{ $username }}-{{ lower $acl.operation }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: acl-{{ $topicName }}-{{ $username }}-{{ lower $acl.operation }}
            spec:
              forProvider:
                resourceType: "Topic"
                resourceName: {{ $topicName | quote }}
                resourcePatternTypeFilter: "Literal"
                resourcePrincipal: {{ printf "User:%s" $acl.principal | quote }}
                resourceHost: "*"
                resourceOperation: {{ $acl.operation | quote }}
                resourcePermissionType: "Allow"
              providerConfigRef:
                name: {{ $kafkaProviderConfig }}
            {{- end }}
            {{- end }}
            {{- end }}

    - step: detect-readiness
      functionRef:
        name: function-auto-ready
        
    - step: sequence-creation
      functionRef:
        name: function-sequencer
      input:
        apiVersion: sequencer.fn.crossplane.io/v1beta1
        kind: Input
        rules:
          - sequence:
            - topic-.*
            - acl-.*
