apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: s3buckets.storage.entigo.com
spec:
  scope: Namespaced
  group: storage.entigo.com
  names:
    kind: S3Bucket
    plural: s3buckets
    shortNames:
      - s3
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                enableVersioning:
                  description: Enable versioning for the S3 bucket
                  type: boolean
                  default: false
                createServiceAccount:
                  description: Create Kubernetes ServiceAccount for IRSA
                  type: boolean
                  default: true
                serviceAccountName:
                  description: Kubernetes ServiceAccount name for IRSA. Defaults to metadata.name
                  type: string
                  default: ""
            status:
              type: object
              properties:
                region:
                  type: string
                s3Uri:
                  type: string
                s3Url:
                  type: string
                kmsKeyAlias:
                  type: string
                kmsKeyId:
                  type: string
                bucketKeyEnabled:
                  type: boolean
                encryptionType:
                  type: string
                versioningEnabled:
                  type: boolean
                blockPublicAclsEnabled:
                  type: boolean
                blockPublicPolicyEnabled:
                  type: boolean
                ignorePublicAclsEnabled:
                  type: boolean
                restrictPublicBucketsEnabled:
                  type: boolean
                aclStatus:
                  type: string
                objectOwnership:
                  type: string
                serviceAccountName:
                  type: string
