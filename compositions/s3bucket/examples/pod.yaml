# Example 1
apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
      envFrom:
        - secretRef:
            name: example-bucket-credentials

---
# Example 2
apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
      env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: example-bucket-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: example-bucket-credentials
              key: AWS_SECRET_ACCESS_KEY
        - name: BUCKET_REGION
          valueFrom:
            secretKeyRef:
              name: example-bucket-credentials
              key: BUCKET_REGION
        - name: BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: example-bucket-credentials
              key: BUCKET_NAME
        - name: BUCKET_ARN
          valueFrom:
            secretKeyRef:
              name: example-bucket-credentials
              key: BUCKET_ARN

---
# Example 3
apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: credentials
          mountPath: /etc/credentials
          readOnly: true
  volumes:
    - name: credentials
      secret:
        secretName: example-bucket-credentials
        items:
          - key: credentials.json
            path: credentials.json
