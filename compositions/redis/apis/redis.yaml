apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: redisinstances.database.entigo.com
spec:
  scope: Namespaced
  group: database.entigo.com
  names:
    kind: RedisInstance
    plural: redisinstances
    shortNames:
      - redis
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                engine:
                  type: string
                  description: |
                    Cache engine type. Valkey is recommended as the default open-source Redis-compatible engine.
                    For engine compatibility, see: https://docs.aws.amazon.com/AmazonElastiCache/latest/dg/supported-engine-versions.html
                  enum:
                    - redis
                    - valkey
                  default: valkey
                engineVersion:
                  type: string
                  description: |
                    Cache engine version. ElastiCache automatically uses the latest patch version.
                    For supported versions, see: https://docs.aws.amazon.com/AmazonElastiCache/latest/dg/supported-engine-versions.html
                  default: "8.2"
                nodeType:
                  type: string
                  description: |
                    ElastiCache node type determines memory, compute, and network capacity.
                    For a list of available node types, see: https://docs.aws.amazon.com/AmazonElastiCache/latest/dg/CacheNodes.SupportedTypes.html
                  default: cache.t4g.small
                numCacheClusters:
                  type: integer
                  description: |
                    Number of cache clusters in the replication group (1 primary + replicas).
                    Minimum 2 required for automatic failover. Maximum 6 (1 primary + 5 replicas).
                  default: 2
                  minimum: 1
                  maximum: 6
                autoMinorVersionUpgrade:
                  type: boolean
                  description: |
                    Indicates that minor engine upgrades will be applied automatically during the maintenance window.
                  default: true
                maintenanceWindow:
                  type: string
                  description: |
                    Weekly time range during which system maintenance can occur (in UTC).
                    Format: ddd:hh24:mi-ddd:hh24:mi. Example: "sun:05:00-sun:06:00"
                    Must be at least 60 minutes.
                  default: "sun:05:00-sun:06:00"
                snapshotWindow:
                  type: string
                  description: |
                    Daily time range (in UTC) during which ElastiCache begins taking daily snapshots.
                    Format: hh24:mi-hh24:mi. Example: "03:00-05:00"
                    Must not overlap with maintenance_window.
                  default: "03:00-05:00"
                snapshotRetentionLimit:
                  type: integer
                  description: |
                    Number of days for which ElastiCache retains automatic snapshots before deleting them.
                    Set to 0 to disable automated backups.
                  default: 7
                  minimum: 0
                  maximum: 35
                parameterGroupName:
                  type: string
                  description: |
                    Name of the parameter group to associate with this replication group.
                    If not specified, the default parameter group for the engine version is used.
              required:
                - engineVersion
                - nodeType
            status:
              type: object
              properties:
                arn:
                  type: string
                  description: ARN of the replication group
                automaticFailoverEnabled:
                  type: boolean
                  description: Indicates automatic failover is enabled
                primaryEndpoint:
                  type: object
                  description: Primary endpoint for the replication group
                  properties:
                    address:
                      type: string
                    port:
                      type: number
                  required:
                    - address
                    - port
                readerEndpoint:
                  type: object
                  description: Reader endpoint for the replication group
                  properties:
                    address:
                      type: string
                    port:
                      type: number
                  required:
                    - address
                    - port
                status:
                  type: string
                  description: Current state of the replication group
                snapshotWindow:
                  type: string
                  description: Daily time range for snapshots
                snapshotRetentionLimit:
                  type: integer
                  description: Number of days snapshots are retained
                maintenanceWindow:
                  type: string
                  description: Weekly maintenance window
                engineVersion:
                  type: string
                  description: Current engine version
          required:
            - spec
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: redisinstances.database.entigo.com
spec:
  compositeTypeRef:
    apiVersion: database.entigo.com/v1alpha1
    kind: RedisInstance
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              environmentConfig:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-database
              kmsDataKeyAlias:
                apiVersion: kms.aws.upbound.io/v1beta1
                kind: Alias
                matchName: data
            ---
            {{- $envConfig := mustFirst (getExtraResources . "environmentConfig") }}
            {{- $kmsDataKeyAlias := mustFirst (getExtraResources . "kmsDataKeyAlias") }}

            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $namespace := .observed.composite.resource.metadata.namespace }}
            {{- $params := .observed.composite.resource.spec.parameters }}

            # Get config from environment
            {{- $providerConfigRef := $envConfig.resource.data.awsProvider }}
            {{- $region := $envConfig.resource.data.region }}
            {{- $subnetGroupName := $envConfig.resource.data.cacheSubnetGroupName }}
            {{- $securityGroupIds := $envConfig.resource.data.cacheSecurityGroupIds }}
            {{- $kmsKeyId := $kmsDataKeyAlias.resource.status.atProvider.targetKeyArn }}

            # Apply user parameters with defaults
            {{- $engine := default "valkey" $params.engine }}
            {{- $engineVersion := default "8.2" $params.engineVersion }}
            {{- $nodeType := default "cache.t4g.micro" $params.nodeType }}
            {{- $port := default 6379 $params.port }}
            {{- $numCacheClusters := default 2 $params.numCacheClusters }}

            ---
            apiVersion: elasticache.aws.m.upbound.io/v1beta2
            kind: ReplicationGroup
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: replication-group
                crossplane.io/external-name: {{ $name }}
              name: {{ $name }}
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
              forProvider:
                region: {{ $region }}
                description: "Valkey/Redis instance {{ $name }}"
                engine: {{ $engine }}
                engineVersion: {{ $engineVersion | quote }}
                nodeType: {{ $nodeType }}
                port: {{ $port }}
                numCacheClusters: {{ $numCacheClusters }}
                automaticFailoverEnabled: true
                multiAzEnabled: true
                applyImmediately: true
                autoMinorVersionUpgrade: true
                atRestEncryptionEnabled: true
                transitEncryptionEnabled: true
                kmsKeyId: {{ $kmsKeyId }}
                subnetGroupName: {{ $subnetGroupName }}
                securityGroupIds:
                {{- range $securityGroupIds }}
                  - {{ . | quote }}
                {{- end }}
                tags:
                  {{- range $key, $value := $envConfig.resource.data.tags }}
                  {{ $key }}: {{ $value | quote }}
                  {{- end }}
              writeConnectionSecretToRef:
                name: {{ $name }}
                namespace: {{ $namespace }}

    - step: detect-readiness
      functionRef:
        name: function-auto-ready
