apiVersion: tenancy.entigo.com/v1alpha1
kind: Zone
metadata:
  annotations:
    example.com/role-group-reference: aaa-bbb-ccc-eee-rrr 
  name: testzone
spec:
  namespaces:
    - name: abfe  # when no pool is explicitly specified, default pool is used.
    - name: abbe
      pool: spot
  pools: 
    - name: default
      requirements:
        - key: instance-type
          values:
            - t3.large
            - t3.medium
        - key: max-size
          value: 3
    - name: spot
      requirements:
        - key: zone
          values:
            - eu-north-1a
        - key: instance-type
          values: 
            - t3.medium
        - key: capacity-type
          value: SPOT
        - key: min-size
          value: 2
        - key: max-size
          value: 3
