---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: zones.tenancy.entigo.com
spec:
  compositeTypeRef:
    apiVersion: tenancy.entigo.com/v1alpha1
    kind: Zone
  mode: Pipeline
  pipeline:
    - step: create-namespace
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.metadata.name -}}

            {{ range $index, $namespace := .observed.composite.resource.spec.namespaces }}
            ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: {{ $namespace.name }}
              labels:
                tenancy.entigo.com/zone: {{ $name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: namespace-{{ $namespace.name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: {{ $namespace.name }}-zone
              namespace: {{ $namespace.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: netpol-{{ $name }}-{{ $namespace.name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            spec:
              podSelector: {}
              policyTypes:
              - Ingress
              ingress:
              # Allow all traffic from pods in the same zone
              - from:
                - namespaceSelector:
                    matchLabels:
                      tenancy.entigo.com/zone: {{ $name }}
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: {{ $namespace.name }}-all
              namespace: {{ $namespace.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rbacrole-all-{{ $name }}-{{ $namespace.name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            rules:
            - apiGroups: ["*"]
              resources: ["*"]
              verbs: ["*"]
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: {{ $namespace.name }}-read
              namespace: {{ $namespace.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rbacrole-read-{{ $name }}-{{ $namespace.name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            rules:
            - apiGroups: ["*"]
              resources: ["*"]
              verbs: ["get", "watch", "list"]
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: {{ $namespace.name }}-contributor
              namespace: {{ $namespace.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rb-contributor-{{ $name }}-{{ $namespace.name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $namespace.name }}-all
            subjects:
            - kind: Group
              name: contributor
              apiGroup: rbac.authorization.k8s.io
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: {{ $namespace.name }}-maintainer
              namespace: {{ $namespace.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rb-maintainer-{{ $name }}-{{ $namespace.name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $namespace.name }}-all
            subjects:
            - kind: Group
              name: maintainer
              apiGroup: rbac.authorization.k8s.io
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: {{ $namespace.name }}-observer
              namespace: {{ $namespace.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rb-observer-{{ $name }}-{{ $namespace.name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: {{ $namespace.name }}-read
            subjects:
            - kind: Group
              name: observer
              apiGroup: rbac.authorization.k8s.io
            ---
            {{- $poolName := "default" }}
            {{- if $namespace.pool }}
              {{- $poolName = $namespace.pool }}
            {{- else }}
              {{- $poolName = (index $.observed.composite.resource.spec.pools 0).name }}
            {{- end }}
            apiVersion: policies.kyverno.io/v1alpha1
            kind: MutatingPolicy
            metadata:
              name: {{ $name }}-{{ $namespace.name }}-add-nodeselector
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: kyverno-mutate-{{ $name }}-{{ $namespace.name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            spec:
              matchConstraints:
                namespaceSelector:
                  matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                    - {{ $namespace.name }}
                resourceRules:
                - apiGroups: [""]
                  apiVersions: ["v1"]
                  operations: ["CREATE"]
                  resources: ["pods"]

              mutations:
              - patchType: JSONPatch
                jsonPatch:
                  expression: |
                    !has(object.spec.nodeSelector) || size(object.spec.nodeSelector) == 0 ?
                    [
                      JSONPatch{
                        op: "add",
                        path: "/spec/nodeSelector",
                        value: {"tenancy.entigo.com/zone-pool": "{{ $name }}-{{ $poolName }}"}
                      }
                    ] : []

            ---
            apiVersion: policies.kyverno.io/v1alpha1
            kind: ValidatingPolicy
            metadata:
              name: {{ $name }}-{{ $namespace.name }}-validate-nodeselector
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: kyverno-validate-{{ $name }}-{{ $namespace.name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            spec:
              matchConstraints:
                namespaceSelector:
                  matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                    - "{{ $namespace.name }}"
                resourceRules:
                - apiGroups: [""]
                  apiVersions: ["v1"]
                  operations: ["CREATE", "UPDATE"]
                  resources: ["pods"]
              validations:
              - expression: |
                  has(object.spec.nodeSelector) &&
                  "tenancy.entigo.com/zone-pool" in object.spec.nodeSelector &&
                  object.spec.nodeSelector["tenancy.entigo.com/zone-pool"] in [{{ range $i, $pool := $.observed.composite.resource.spec.pools }}{{ if $i }}, {{ end }}"{{ $name }}-{{ $pool.name }}"{{ end }}]
                message: "Pod nodeSelector must use a valid nodeSelector label value for tenancy.entigo.com/zone-pool. Valid pools: {{ range $i, $pool := $.observed.composite.resource.spec.pools }}{{ if $i }}, {{ end }}{{ $name }}-{{ $pool.name }}{{ end }}"
            {{ end }}
    - step: create-launch-template
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            # Get required resources
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              zoneEnvironment:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-zone
              vpc:
                apiVersion: ec2.aws.upbound.io/v1beta1
                kind: VPC
                matchName: vpc
              kmsAlias:
                apiVersion: kms.aws.upbound.io/v1beta1
                kind: Alias
                matchName: data
              nodeSecurityGroup:
                apiVersion: ec2.aws.upbound.io/v1beta1
                kind: SecurityGroup
                matchName: eks-node
              awsProviderConfig:
                apiVersion: aws.upbound.io/v1beta1
                kind: ProviderConfig
            ---
            {{- $envConfig := mustFirst (getExtraResources . "zoneEnvironment") }}
            {{- $vpc := mustFirst (getExtraResources . "vpc") }}
            {{- $kmsAlias := mustFirst (getExtraResources . "kmsAlias") }}
            {{- $nodeSecurityGroup := mustFirst (getExtraResources . "nodeSecurityGroup") }}
            {{- $awsProviderConfig := mustFirst (getExtraResources . "awsProviderConfig") }}

            {{ range $index, $pool := .observed.composite.resource.spec.pools }}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: LaunchTemplate
            metadata:
              name: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
              labels:
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: launchtemplate-{{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
                tenancy.entigo.com/zone-pool: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
            spec:
              deletionPolicy: Delete
              forProvider:
                name: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
                userData: ""
                description: "{{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}"
                region: {{ $vpc.resource.status.atProvider.region }}
                disableApiStop: false
                disableApiTermination: false
                updateDefaultVersion: true
                metadataOptions:
                - httpEndpoint: enabled
                  httpProtocolIpv6: ""
                  httpPutResponseHopLimit: 1
                  httpTokens: required
                  instanceMetadataTags: ""
                vpcSecurityGroupIdRefs:
                - name: {{ $nodeSecurityGroup.resource.metadata.name }}
                tags:
                  tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
                  tenancy.entigo.com/zone-pool: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
                  {{- range $key, $value := $envConfig.resource.data.tags }}
                  {{ $key }}: {{ $value | quote }}
                  {{- end }}
                tagSpecifications:
                - resourceType: instance
                  tags:
                    Name: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
                    tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
                    tenancy.entigo.com/zone-pool: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
                    {{- range $key, $value := $envConfig.resource.data.tags }}
                    {{ $key }}: {{ $value | quote }}
                    {{- end }}
                - resourceType: volume
                  tags:
                    Name: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}-root
                    tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
                    tenancy.entigo.com/zone-pool: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
                    {{- range $key, $value := $envConfig.resource.data.tags }}
                    {{ $key }}: {{ $value | quote }}
                    {{- end }}
              initProvider:
                blockDeviceMappings:
                - deviceName: /dev/xvda
                  ebs:
                  - deleteOnTermination: "true"
                    volumeSize: 50
                    throughput: 0
                    volumeInitializationRate: 0
                    snapshotId: ""
                    iops: 0
                    volumeType: gp3
                    encrypted: "true"
                    kmsKeyId: {{ $kmsAlias.resource.status.atProvider.arn }}
                  noDevice: ""
                  virtualName: ""
              managementPolicies:
              - "*"
              providerConfigRef:
                name: {{ $awsProviderConfig.resource.metadata.name }}
            {{ end }}
    - step: create-node-pools
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            # Get required resources
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              zoneEnvironment:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-zone
              vpc:
                apiVersion: ec2.aws.upbound.io/v1beta1
                kind: VPC
                matchName: vpc
              awsProviderConfig:
                apiVersion: aws.upbound.io/v1beta1
                kind: ProviderConfig
              eks:
                apiVersion: eks.aws.upbound.io/v1beta1
                kind: Cluster
                matchName: eks
              computeSubnets:
                apiVersion: ec2.aws.upbound.io/v1beta1
                kind: Subnet
                matchLabels:
                  subnet-type: compute
              launchTemplates:
                apiVersion: ec2.aws.upbound.io/v1beta1
                kind: LaunchTemplate
                matchLabels:
                  tenancy.entigo.com/zone: {{ .observed.composite.resource.metadata.name }}
            ---
            {{- $name := .observed.composite.resource.metadata.name -}}
            {{- $envConfig := mustFirst (getExtraResources . "zoneEnvironment") }}
            {{- $vpc := mustFirst (getExtraResources . "vpc") }}
            {{- $awsProviderConfig := mustFirst (getExtraResources . "awsProviderConfig") }}
            {{- $eks := mustFirst (getExtraResources . "eks") }}
            {{- $computeSubnets := getExtraResources . "computeSubnets" }}
            {{- $launchTemplates := getExtraResources . "launchTemplates" }}
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: Role
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: role-{{ $name }}
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
              name: {{ $name }}
            spec:
              managementPolicies: ["*"]
              forProvider:
                assumeRolePolicy: |
                  {
                    "Version": "2012-10-17",
                    "Statement": [
                      {
                        "Effect": "Allow",
                        "Principal": {
                          "Service": "ec2.amazonaws.com"
                        },
                        "Action": "sts:AssumeRole"
                      }
                    ]
                  }
                tags:
                  tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
                  {{- range $key, $value := $envConfig.resource.data.tags }}
                  {{ $key }}: {{ $value | quote }}
                  {{- end }}
              providerConfigRef:
                name: {{ $awsProviderConfig.resource.metadata.name }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: RolePolicyAttachment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rpa-wn-{{ $name }}
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
              name: {{ $name }}-wn
            spec:
              forProvider:
                policyArn: arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
                roleRef:
                  name: {{ $name }}
              providerConfigRef:
                name: {{ $awsProviderConfig.resource.metadata.name }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: RolePolicyAttachment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rpa-ecr-ro-{{ $name }}
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
              name: {{ $name }}-ecr-ro
            spec:
              forProvider:
                policyArn: arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
                roleRef:
                  name: {{ $name }}
              providerConfigRef:
                name: {{ $awsProviderConfig.resource.metadata.name }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: RolePolicyAttachment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rpa-ssm-{{ $name }}
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
              name: {{ $name }}-ssm
            spec:
              forProvider:
                policyArn: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
                roleRef:
                  name: {{ $name }}
              providerConfigRef:
                name: {{ $awsProviderConfig.resource.metadata.name }}
            ---
            apiVersion: iam.aws.upbound.io/v1beta1
            kind: RolePolicyAttachment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rpa-ecr-proxy-{{ $name }}
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
              name: {{ $name }}-ecr-proxy
            spec:
              forProvider:
                policyArnRef:
                  name: ecr-proxy
                roleRef:
                  name: {{ $name }}
              providerConfigRef:
                name: {{ $awsProviderConfig.resource.metadata.name }}
            ---
            apiVersion: eks.aws.upbound.io/v1beta1
            kind: AccessEntry
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ae-{{ $name }}
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
              name: {{ $name }}
            spec:
              forProvider:
                clusterNameRef:
                  name: {{ $eks.resource.metadata.name }}
                principalArnFromRoleRef:
                  name: {{ $name }}
                type: EC2_LINUX
                region: {{ $vpc.resource.status.atProvider.region }}
              providerConfigRef:
                name: {{ $awsProviderConfig.resource.metadata.name }}

            {{ range $index, $pool := .observed.composite.resource.spec.pools }}
            ---
            {{- $launchTemplate := (dict) }}
            {{- range $launchTemplates }}
              {{- if eq .resource.metadata.name (printf "%s-%s" $.observed.composite.resource.metadata.name $pool.name) }}
                {{- $launchTemplate = . }}
              {{- end }}
            {{- end }}
            {{- $instanceTypes := list }}
            {{- range $pool.requirements }}
              {{- if eq .key "instance-type" }}
                {{- $instanceTypes = .values }}
              {{- end }}
            {{- end }}
            {{- $instanceTypesHash := $instanceTypes | join "-" | sha256sum | trunc 8 }}
            apiVersion: eks.aws.upbound.io/v1beta1
            kind: NodeGroup
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nodepool-{{ $pool.name }}-{{ $instanceTypesHash }}
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
                tenancy.entigo.com/zone-pool: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
              name: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}-{{ $instanceTypesHash }}
            spec:
              managementPolicies: ["*"]
              initProvider: {}
              forProvider:
                launchTemplate:
                - name: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
                  {{- if and $launchTemplate (hasKey $launchTemplate "resource") }}
                  {{- if hasKey $launchTemplate.resource.status.atProvider "latestVersion" }}
                  version: "{{ $launchTemplate.resource.status.atProvider.latestVersion }}"
                  {{- end }}
                  {{- end }}
                clusterNameRef:
                  name: {{ $eks.resource.metadata.name }}
                region: {{ $vpc.resource.status.atProvider.region }}
                updateConfig:
                - maxUnavailable: 1
                {{ range $pool.requirements }}
                {{ if eq .key "instance-type" }}
                instanceTypes:
                {{ range .values }}
                    - {{ . }}
                {{ end }}
                {{ end }}
                {{ end }}

                {{- $zoneFilter := list }}
                {{- range $pool.requirements }}
                  {{- if eq .key "zone" }}
                    {{- $zoneFilter = .values }}
                  {{- end }}
                {{- end }}

                subnetIdRefs:
                  {{- if gt (len $zoneFilter) 0 }}
                    {{- range $computeSubnets }}
                      {{- if has .resource.status.atProvider.availabilityZone $zoneFilter }}
                  - name: {{ .resource.metadata.name }}
                      {{- end }}
                    {{- end }}
                  {{- else }}
                    {{- range $computeSubnets }}
                  - name: {{ .resource.metadata.name }}
                    {{- end }}
                  {{- end }}

                labels:
                  tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
                  tenancy.entigo.com/zone-pool: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
                nodeRoleArnRef:
                  name: {{ $name }}
                tags:
                  tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
                  tenancy.entigo.com/zone-pool: {{ $.observed.composite.resource.metadata.name }}-{{ $pool.name }}
                  {{- range $key, $value := $envConfig.resource.data.tags }}
                  {{ $key }}: {{ $value | quote }}
                  {{- end }}
                {{- $capacityType := "ON_DEMAND" }}
                {{- $minSize := 1 }}
                {{- $maxSize := -1 }}
                {{ range $pool.requirements }}
                  {{ if eq .key "capacity-type" }}
                    {{ $capacityType = .value }}
                  {{ end }}
                  {{ if eq .key "min-size" }}
                    {{ $minSize = .value }}
                  {{ end }}
                  {{ if eq .key "max-size" }}
                    {{ $maxSize = .value }}
                  {{ end }}
                {{ end }}
                {{ if eq $maxSize -1 }}
                  {{- $maxSize = $minSize }}
                {{ end }}
                capacityType: {{ $capacityType }}

                scalingConfig:
                - maxSize: {{ $maxSize }}
                  minSize: {{ $minSize }}
              initProvider:
                scalingConfig:
                - desiredSize: {{ $minSize }}
              providerConfigRef:
                name: {{ $awsProviderConfig.resource.metadata.name }}
            {{ end }}

    # create an ArgoCD project and associate namespaces with that project
    - step: create-argocd-project
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              zoneEnvironment:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-zone
              vpc:
                apiVersion: ec2.aws.upbound.io/v1beta1
                kind: VPC
                matchName: vpc
            {{- $name := .observed.composite.resource.metadata.name -}}
            {{- $envConfig := mustFirst (getExtraResources . "zoneEnvironment") }}
            {{- $vpc := mustFirst (getExtraResources . "vpc") }}
            {{- $clusterPermissions := .observed.composite.resource.spec.clusterPermissions }}
            ---
            apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: {{ $name }}
              namespace: {{ $envConfig.resource.data.argoCDNamespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: appproject-{{ $name }}
                gotemplating.fn.crossplane.io/ready: "True"
                tenancy.entigo.com/zone: {{ $.observed.composite.resource.metadata.name }}
            spec:
              description: {{ "Security zone for isolated team deployment" }}
              destinations:
              {{ range $index, $namespace := .observed.composite.resource.spec.namespaces }}
              - namespace: {{ $namespace.name }}
                server: https://kubernetes.default.svc
              {{ end }}
              sourceRepos:
              - '*'
              sourceNamespaces:
              {{ range $index, $namespace := .observed.composite.resource.spec.namespaces }}
              - {{ $namespace.name }}
              {{ end }}
              {{- if $clusterPermissions }}
              clusterResourceWhitelist:
              - group: '*'
                kind: '*'
              clusterResourceBlacklist: []
              {{ else }}
              clusterResourceBlacklist:
              - group: '*'
                kind: '*'
              clusterResourceWhitelist: []
              {{ end }}
              namespaceResourceBlacklist:
              - group: '*.m.upbound.io'
                kind: '*'
              roles:
              - name: maintainer
                description: Maintainer permissions
                {{- $maintainerGroups := list -}}
                {{- if hasKey $envConfig.resource.data.appProject "maintainerGroups" -}}
                  {{- $maintainerGroups = $envConfig.resource.data.appProject.maintainerGroups -}}
                {{- end }}
                {{- if $maintainerGroups }}
                groups:
                {{- range $maintainerGroups }}
                - {{ . }}
                  {{- end }}
                {{- else }}
                groups: []
                {{- end }}
                policies:
                - p, proj:{{ $name }}:maintainer, applications, *, {{ $name }}/*, allow
                - p, proj:{{ $name }}:maintainer, repositories, *, {{ $name }}/*, allow
                - p, proj:{{ $name }}:maintainer, applicationsets, *, {{ $name }}/*, allow
                - p, proj:{{ $name }}:maintainer, logs, *, {{ $name }}/*, allow
                - p, proj:{{ $name }}:maintainer, exec, *, {{ $name }}/*, allow
              - name: observer
                description: Observer permissions
                {{- $observerGroups := list -}}
                {{- if hasKey $envConfig.resource.data.appProject "observerGroups" -}}
                  {{- $observerGroups = $envConfig.resource.data.appProject.observerGroups -}}
                {{- end }}
                {{- if $observerGroups }}
                groups:
                {{- range $observerGroups }}
                - {{ . }}
                {{- end }}
                {{- else }}
                groups: []
                {{- end }}
                policies:
                - p, proj:{{ $name }}:observer, applications, get, {{ $name }}/*, allow
                - p, proj:{{ $name }}:observer, applicationsets, get, {{ $name }}/*, allow
              - name: contributor
                description: Contributor permissions
                {{- if .observed.composite.resource.spec.appProject.contributorGroups }}
                groups:
                {{- range .observed.composite.resource.spec.appProject.contributorGroups }}
                - {{ . }}
                {{- end }}
                {{- else }}
                groups: []
                {{- end }}
                policies:
                - p, proj:{{ $name }}:contributor, applications, *, {{ $name }}/*, allow
                - p, proj:{{ $name }}:contributor, repositories, *, {{ $name }}/*, allow
                - p, proj:{{ $name }}:contributor, applicationsets, *, {{ $name }}/*, allow
                - p, proj:{{ $name }}:contributor, logs, *, {{ $name }}/*, allow
                - p, proj:{{ $name }}:contributor, exec, *, {{ $name }}/*, allow
              - name: cicd
                description: Use this role for your CI/CD pipelines
                policies:
                - p, proj:{{ $name }}:cicd, applications, sync, {{ $name }}/*, allow
                - p, proj:{{ $name }}:cicd, applicationsets, sync, {{ $name }}/*, allow
                - p, proj:{{ $name }}:cicd, applications, get, {{ $name }}/*, allow
                - p, proj:{{ $name }}:cicd, applicationsets, get, {{ $name }}/*, allow
    - step: detect-readiness
      functionRef:
        name: function-auto-ready
    - step: sequence-creation
      functionRef:
        name: function-sequencer
      input:
        apiVersion: sequencer.fn.crossplane.io/v1beta1
        kind: Input
        rules:
          - sequence:
            - namespace-.*
            - netpol-.*
            - rbacrole-.*
            - rb-.*
            - launchtemplate-.*
            - role-.*
            - rpa-.*
            - ae-.*
            - nodepool-.*
