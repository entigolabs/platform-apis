apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: valkeyinstances.database.entigo.com
spec:
  scope: Namespaced
  group: database.entigo.com
  names:
    kind: ValkeyInstance
    plural: valkeyinstances
    shortNames:
      - vk
      - valkey
      - valkeys
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                deletionProtection:
                  type: boolean
                  description: |
                    Deletion protection for the ElastiCache replication group.
                  default: true
                engineVersion:
                  type: string
                  description: |
                    Cache engine version. ElastiCache automatically uses the latest patch version.
                    For supported versions, see: https://docs.aws.amazon.com/AmazonElastiCache/latest/dg/supported-engine-versions.html
                  default: "8.2"
                nodeType:
                  type: string
                  description: |
                    ElastiCache node type determines memory, compute, and network capacity.
                    For a list of available node types, see: https://docs.aws.amazon.com/AmazonElastiCache/latest/dg/CacheNodes.SupportedTypes.html
                  default: cache.t4g.small
                numCacheClusters:
                  type: integer
                  description: |
                    Number of cache clusters in the replication group (1 primary + replicas).
                    Minimum 2 required for automatic failover. Maximum 6 (1 primary + 5 replicas).
                  default: 2
                  minimum: 1
                  maximum: 6
                autoMinorVersionUpgrade:
                  type: boolean
                  description: |
                    Indicates that minor engine upgrades will be applied automatically during the maintenance window.
                  default: true
                maintenanceWindow:
                  type: string
                  description: |
                    Weekly time range during which system maintenance can occur (in UTC).
                    Format: ddd:hh24:mi-ddd:hh24:mi. Example: "sun:05:00-sun:06:00"
                    Must be at least 60 minutes.
                  default: "sun:05:00-sun:06:00"
                snapshotWindow:
                  type: string
                  description: |
                    Daily time range (in UTC) during which ElastiCache begins taking daily snapshots.
                    Format: hh24:mi-hh24:mi. Example: "03:00-05:00"
                    Must not overlap with maintenance_window.
                  default: "03:00-05:00"
                snapshotRetentionLimit:
                  type: integer
                  description: |
                    Number of days for which ElastiCache retains automatic snapshots before deleting them.
                    Set to 0 to disable automated backups.
                  default: 7
                  minimum: 0
                  maximum: 35
                parameterGroupName:
                  type: string
                  description: |
                    Name of the parameter group to associate with this replication group.
                    If not specified, the default parameter group for the engine version is used.
              required:
                - engineVersion
                - nodeType
            status:
              type: object
              properties:
                arn:
                  type: string
                  description: ARN of the replication group
                automaticFailoverEnabled:
                  type: boolean
                  description: Indicates automatic failover is enabled
                primaryEndpoint:
                  type: object
                  description: Primary endpoint for the replication group
                  properties:
                    address:
                      type: string
                    port:
                      type: number
                  required:
                    - address
                    - port
                readerEndpoint:
                  type: object
                  description: Reader endpoint for the replication group
                  properties:
                    address:
                      type: string
                    port:
                      type: number
                  required:
                    - address
                    - port
                status:
                  type: string
                  description: Current state of the replication group
                snapshotWindow:
                  type: string
                  description: Daily time range for snapshots
                snapshotRetentionLimit:
                  type: integer
                  description: Number of days snapshots are retained
                maintenanceWindow:
                  type: string
                  description: Weekly maintenance window
                engineVersion:
                  type: string
                  description: Current engine version
          required:
            - spec
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: valkeyinstances.database.entigo.com
spec:
  compositeTypeRef:
    apiVersion: database.entigo.com/v1alpha1
    kind: ValkeyInstance
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              environmentConfig:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-database
              vpc:
                apiVersion: ec2.aws.upbound.io/v1beta1
                kind: VPC
                matchName: vpc
              elasticacheSubnetGroup:
                apiVersion: elasticache.aws.upbound.io/v1beta1
                kind: SubnetGroup
                matchName: elasticache
              kmsDataKeyAlias:
                apiVersion: kms.aws.upbound.io/v1beta1
                kind: Alias
                matchName: data
              kmsConfigKeyAlias:
                apiVersion: kms.aws.upbound.io/v1beta1
                kind: Alias
                matchName: config

            ---
            {{- $envConfig := mustFirst (getExtraResources . "environmentConfig") }}
            {{- $vpc := mustFirst (getExtraResources . "vpc") }}
            {{- $elasticacheSubnetGroup := mustFirst (getExtraResources . "elasticacheSubnetGroup") }}
            {{- $kmsDataKeyAlias := mustFirst (getExtraResources . "kmsDataKeyAlias") }}
            {{- $kmsConfigKeyAlias := mustFirst (getExtraResources . "kmsConfigKeyAlias") }}

            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $namespace := .observed.composite.resource.metadata.namespace }}
            {{- $spec := .observed.composite.resource.spec }}

            {{- /* Get config from environment */ -}}
            {{- $providerConfigRef := $envConfig.resource.data.awsProvider }}
            {{- $subnetGroupName := $elasticacheSubnetGroup.resource.status.atProvider.id }}
            {{- $region := $vpc.resource.status.atProvider.region }}
            {{- $kmsDataKeyArn := $kmsDataKeyAlias.resource.status.atProvider.targetKeyArn }}
            {{- $kmsConfigKeyArn := $kmsConfigKeyAlias.resource.status.atProvider.targetKeyArn }}

            ---
            apiVersion: elasticache.aws.m.upbound.io/v1beta1
            kind: ReplicationGroup
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: replication-group
                crossplane.io/external-name: {{ $name }}
              name: {{ $name }}
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                region: {{ $region }}
                engine: valkey
                description: {{ $name }}
                engineVersion: {{ $spec.engineVersion | quote }}
                nodeType: {{ $spec.nodeType }}
                numCacheClusters: {{ $spec.numCacheClusters }}
                automaticFailoverEnabled: true
                multiAzEnabled: true
                applyImmediately: true
                autoMinorVersionUpgrade: {{ $spec.autoMinorVersionUpgrade | quote }}
                atRestEncryptionEnabled: "true"
                transitEncryptionEnabled: true
                authTokenSecretRef:
                  key: auth-token
                  name: {{ $name }}-auth-token
                autoGenerateAuthToken: true
                authTokenUpdateStrategy: "SET"
                kmsKeyId: {{ $kmsDataKeyArn }}
                finalSnapshotIdentifier: {{ $name }}-final-snapshot
                maintenanceWindow: {{ $spec.maintenanceWindow }}
                snapshotWindow: {{ $spec.snapshotWindow }}
                snapshotRetentionLimit: {{ $spec.snapshotRetentionLimit }}
                {{- if $spec.parameterGroupName }}
                parameterGroupName: {{ $spec.parameterGroupName }}
                {{- end }}
                subnetGroupName: {{ $subnetGroupName | quote }}
                tags:
                  {{- range $key, $value := $envConfig.resource.data.tags }}
                  {{ $key }}: {{ $value | quote }}
                  {{- end }}
              writeConnectionSecretToRef:
                name: {{ $name }}

    - step: prepare-credentials
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        spec:
          source: |
            import base64
            import json

            oxr = option("params").oxr
            name = oxr.metadata.name
            namespace = oxr.metadata.namespace

            # Request connection secret
            extraResourcesRequest = {
                apiVersion = "meta.krm.kcl.dev/v1alpha1"
                kind = "ExtraResources"
                requirements = {
                    connectionSecret = {
                        apiVersion = "v1"
                        kind = "Secret"
                        matchName = name
                        matchNamespace = namespace
                    }
                }
            }

            # Get connection secret if available
            er = option("params")?.extraResources
            connectionSecret = er?.connectionSecret[0]?.Resource if er?.connectionSecret else None

            # Create JSON credentials secret
            credentialsSecret = {
                apiVersion = "v1"
                kind = "Secret"
                metadata.name = name + "-credentials"
                metadata.namespace = namespace
                metadata.annotations = {
                    "krm.kcl.dev/composition-resource-name" = "credentials-json"
                    "krm.kcl.dev/ready" = "True"
                }
                type = "Opaque"
                stringData = {
                    AUTH_TOKEN = base64.decode(connectionSecret.data["attribute.auth_token"])
                    PORT = base64.decode(connectionSecret.data.port)
                    PRIMARY_ENDPOINT = base64.decode(connectionSecret.data.primary_endpoint_address)
                    READER_ENDPOINT = base64.decode(connectionSecret.data.reader_endpoint_address)
                    "credentials.json" = json.encode({
                        AUTH_TOKEN = base64.decode(connectionSecret.data["attribute.auth_token"])
                        PORT = base64.decode(connectionSecret.data.port)
                        PRIMARY_ENDPOINT = base64.decode(connectionSecret.data.primary_endpoint_address)
                        READER_ENDPOINT = base64.decode(connectionSecret.data.reader_endpoint_address)
                    })
                }
            } if connectionSecret else None

            items = [extraResourcesRequest] + ([credentialsSecret] if credentialsSecret else [])

    - step: sync-to-secrets-manager
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $namespace := .observed.composite.resource.metadata.namespace }}

            # Request environment resources
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              environmentConfig:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-database
              vpc:
                apiVersion: ec2.aws.upbound.io/v1beta1
                kind: VPC
                matchName: vpc
              kmsConfigKeyAlias:
                apiVersion: kms.aws.upbound.io/v1beta1
                kind: Alias
                matchName: config

            ---
            {{- $envConfig := mustFirst (getExtraResources . "environmentConfig") }}
            {{- $vpc := mustFirst (getExtraResources . "vpc") }}
            {{- $kmsConfigKeyAlias := mustFirst (getExtraResources . "kmsConfigKeyAlias") }}

            {{- $providerConfigRef := $envConfig.resource.data.awsProvider }}
            {{- $region := $vpc.resource.status.atProvider.region }}
            {{- $kmsConfigKeyArn := $kmsConfigKeyAlias.resource.status.atProvider.targetKeyArn }}

            # AWS Secrets Manager Secret
            apiVersion: secretsmanager.aws.m.upbound.io/v1beta1
            kind: Secret
            metadata:
              name: {{ $name }}-credentials
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: secrets-manager-secret
                crossplane.io/external-name: {{ $name }}-credentials
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                name: {{ $name }}-credentials
                region: {{ $region }}
                description: Valkey connection credentials for {{ $name }}
                kmsKeyId: {{ $kmsConfigKeyArn }}
                tags:
                  {{- range $key, $value := $envConfig.resource.data.tags }}
                  {{ $key }}: {{ $value | quote }}
                  {{- end }}

            ---
            # AWS Secrets Manager SecretVersion
            apiVersion: secretsmanager.aws.m.upbound.io/v1beta1
            kind: SecretVersion
            metadata:
              name: {{ $name }}-credentials
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: secrets-manager-version
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                region: {{ $region }}
                secretIdRef:
                  name: {{ $name }}-credentials
                secretStringSecretRef:
                  name: {{ $name }}-credentials
                  key: credentials.json

    - step: detect-readiness
      functionRef:
        name: function-auto-ready

---
apiVersion: database.entigo.com/v1alpha1
kind: ValkeyInstance
metadata:
  name: example-valkey-v7
spec: {}
