apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: buckets.storage.entigo.com
spec:
  scope: Namespaced
  group: storage.entigo.com
  names:
    kind: Bucket
    plural: buckets
    shortNames:
      - s3
      - s3buckets
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    enableVersioning:
                      description: Enable versioning for the S3 bucket
                      type: boolean
                      default: false
                    publicAccess:
                      description: Allow public access to the bucket
                      type: boolean
                      default: false
                    kmsKeyId:
                      description: KMS key ID for bucket encryption
                      type: string
                    enableAcl:
                      description: Enable ACLs for the bucket
                      type: boolean
                      default: false
                    bucketKeyEnabled:
                      description: Enable bucket keys for KMS encryption
                      type: boolean
                      default: true
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: platform-apis-storage
data:
  awsProvider: crossplane-aws
  awsRegion: eu-north-1
  dataKMSKey: data
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: s3-bucket
spec:
  compositeTypeRef:
    apiVersion: storage.entigo.com/v1alpha1
    kind: Bucket
  mode: Pipeline
  pipeline:
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Reference
              ref:
                name: platform-apis-storage
    - step: render-bucket-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $bucketName := .observed.composite.resource.metadata.name }}
            {{- $namespace := .observed.composite.resource.metadata.namespace }}
            {{- $enableVersioning := false }}
            {{- $publicAccess := false }}
            {{- $kmsKeyId := "" }}
            {{- $enableAcl := false }}
            {{- $bucketKeyEnabled := true }}
            {{- $region := "eu-north-1" }}

            {{- if .observed.composite.resource.spec.parameters }}
            {{- $enableVersioning = default false .observed.composite.resource.spec.parameters.enableVersioning }}
            {{- $publicAccess = default false .observed.composite.resource.spec.parameters.publicAccess }}
            {{- $kmsKeyId = default "" .observed.composite.resource.spec.parameters.kmsKeyId }}
            {{- $enableAcl = default false .observed.composite.resource.spec.parameters.enableAcl }}
            {{- $bucketKeyEnabled = default true .observed.composite.resource.spec.parameters.bucketKeyEnabled }}
            {{- end }}

            {{- /* Get region and KMS key from environment config */ -}}
            {{- if .context }}
            {{- if index .context "apiextensions.crossplane.io/environment" }}
            {{- $env := index .context "apiextensions.crossplane.io/environment" }}
            {{- if index $env "region" }}
            {{- $region = index $env "region" }}
            {{- end }}
            {{- if and (not $kmsKeyId) (index $env "kmsKeyId") }}
            {{- $kmsKeyId = index $env "kmsKeyId" }}
            {{- end }}
            {{- end }}
            {{- end }}

            ---
            # Main S3 Bucket
            apiVersion: s3.aws.upbound.io/v1beta1
            kind: Bucket
            metadata:
              name: {{ $bucketName }}
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: bucket
            spec:
              forProvider:
                region: {{ $region }}

            ---
            # Bucket Public Access Block - Private by default
            apiVersion: s3.aws.upbound.io/v1beta1
            kind: BucketPublicAccessBlock
            metadata:
              name: {{ $bucketName }}
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: public-access-block
            spec:
              forProvider:
                bucketRef:
                  name: {{ $bucketName }}
                blockPublicAcls: {{ not $publicAccess }}
                blockPublicPolicy: {{ not $publicAccess }}
                ignorePublicAcls: {{ not $publicAccess }}
                restrictPublicBuckets: {{ not $publicAccess }}
                region: {{ $region }}

            {{- if $kmsKeyId }}
            ---
            # Bucket Server Side Encryption Configuration
            apiVersion: s3.aws.upbound.io/v1beta1
            kind: BucketServerSideEncryptionConfiguration
            metadata:
              name: {{ $bucketName }}
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: encryption
            spec:
              forProvider:
                bucketRef:
                  name: {{ $bucketName }}
                region: {{ $region }}
                rule:
                  - applyServerSideEncryptionByDefault:
                      - sseAlgorithm: aws:kms
                        kmsMasterKeyId: {{ $kmsKeyId }}
                    bucketKeyEnabled: {{ $bucketKeyEnabled }}
            {{- end }}

            {{- if $enableVersioning }}
            ---
            # Bucket Versioning
            apiVersion: s3.aws.upbound.io/v1beta1
            kind: BucketVersioning
            metadata:
              name: {{ $bucketName }}
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: versioning
            spec:
              forProvider:
                bucketRef:
                  name: {{ $bucketName }}
                region: {{ $region }}
                versioningConfiguration:
                  - status: Enabled
            {{- end }}

            ---
            # Bucket Ownership Controls - Disable ACLs by default
            apiVersion: s3.aws.upbound.io/v1beta1
            kind: BucketOwnershipControls
            metadata:
              name: {{ $bucketName }}
              namespace: {{ $namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ownership-controls
            spec:
              forProvider:
                bucketRef:
                  name: {{ $bucketName }}
                region: {{ $region }}
                rule:
                  - objectOwnership: {{ if $enableAcl }}ObjectWriter{{ else }}BucketOwnerEnforced{{ end }}
