apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: buckets.storage.entigo.com
spec:
  scope: Namespaced
  group: storage.entigo.com
  names:
    kind: Bucket
    plural: buckets
    shortNames:
      - s3
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    enableVersioning:
                      description: Enable versioning for the S3 bucket
                      type: boolean
                      default: false
                    publicAccess:
                      description: Allow public access to the bucket
                      type: boolean
                      default: false
                    kmsDataKeyId:
                      description: KMS key ID for bucket encryption
                      type: string
                    kmsConfigKeyId:
                      description: KMS key ID for IAM credentials secret encryption
                      type: string
                    enableAcl:
                      description: Enable ACLs for the bucket
                      type: boolean
                      default: false
---
apiVersion: apiextensions.crossplane.io/v1alpha1
kind: ManagedResourceActivationPolicy
metadata:
  name: platform-apis-bucket
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  activate:
    - buckets.s3.aws.m.upbound.io
    - bucketpublicaccessblocks.s3.aws.m.upbound.io
    - bucketserversideencryptionconfigurations.s3.aws.m.upbound.io
    - bucketversionings.s3.aws.m.upbound.io
    - bucketownershipcontrols.s3.aws.m.upbound.io
    - users.iam.aws.m.upbound.io
    - policies.iam.aws.m.upbound.io
    - userpolicyattachments.iam.aws.m.upbound.io
    - accesskeys.iam.aws.m.upbound.io
    - secrets.secretsmanager.aws.m.upbound.io
    - secretversions.secretsmanager.aws.m.upbound.io
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: platform-apis-storage
data:
  awsProvider: crossplane-aws
  awsRegion: eu-north-1
  dataKMSKey: data
  configKMSKey: config
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: buckets.storage.entigo.com
spec:
  compositeTypeRef:
    apiVersion: storage.entigo.com/v1alpha1
    kind: Bucket
  mode: Pipeline
  pipeline:
    - step: render-bucket-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            # Get required resources
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              environmentConfig:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-storage
              kmsDataAlias:
                apiVersion: kms.aws.upbound.io/v1beta1
                kind: Alias
                matchName: data
              kmsConfigAlias:
                apiVersion: kms.aws.upbound.io/v1beta1
                kind: Alias
                matchName: config
            ---
            {{- $envConfig := mustFirst (getExtraResources . "environmentConfig") }}
            {{- $kmsDataAlias := mustFirst (getExtraResources . "kmsDataAlias") }}
            {{- $kmsConfigAlias := mustFirst (getExtraResources . "kmsConfigAlias") }}

            {{- $bucketName := .observed.composite.resource.metadata.name }}
            {{- $enableVersioning := false }}
            {{- $publicAccess := false }}
            {{- $kmsDataKeyId := "" }}
            {{- $kmsConfigKeyId := "" }}
            {{- $enableAcl := false }}

            {{- /* Get config from environment */ -}}
            {{- $region := $envConfig.resource.data.awsRegion }}
            {{- $providerConfigRef := $envConfig.resource.data.awsProvider }}
            {{- $kmsDataKeyId = $kmsDataAlias.resource.status.atProvider.targetKeyArn }}
            {{- $kmsConfigKeyId = $kmsConfigAlias.resource.status.atProvider.targetKeyArn }}

            {{- /* Apply user parameters */ -}}
            {{- if .observed.composite.resource.spec.parameters }}
            {{- $enableVersioning = default false .observed.composite.resource.spec.parameters.enableVersioning }}
            {{- $publicAccess = default false .observed.composite.resource.spec.parameters.publicAccess }}
            {{- if .observed.composite.resource.spec.parameters.kmsDataKeyId }}
            {{- $kmsDataKeyId = .observed.composite.resource.spec.parameters.kmsDataKeyId }}
            {{- end }}
            {{- if .observed.composite.resource.spec.parameters.kmsConfigKeyId }}
            {{- $kmsConfigKeyId = .observed.composite.resource.spec.parameters.kmsConfigKeyId }}
            {{- end }}
            {{- $enableAcl = default false .observed.composite.resource.spec.parameters.enableAcl }}
            {{- end }}

            ---
            # Main S3 Bucket
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: Bucket
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: bucket
                crossplane.io/external-name: {{ $bucketName }}
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                region: {{ $region }}
              writeConnectionSecretToRef:
                name: {{ $bucketName }}-bucket

            ---
            # Bucket Public Access Block - Private by default
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: BucketPublicAccessBlock
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: public-access-block
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                bucketRef:
                  name: {{ $bucketName }}
                blockPublicAcls: {{ not $publicAccess }}
                blockPublicPolicy: {{ not $publicAccess }}
                ignorePublicAcls: {{ not $publicAccess }}
                restrictPublicBuckets: {{ not $publicAccess }}
                region: {{ $region }}

            ---
            # Bucket Server Side Encryption Configuration
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: BucketServerSideEncryptionConfiguration
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: encryption
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                bucketRef:
                  name: {{ $bucketName }}
                region: {{ $region }}
                rule:
            {{- if $kmsDataKeyId }}
                  - applyServerSideEncryptionByDefault:
                      sseAlgorithm: aws:kms
                      kmsMasterKeyId: {{ $kmsDataKeyId }}
                    bucketKeyEnabled: true
            {{- else }}
                  - applyServerSideEncryptionByDefault:
                      sseAlgorithm: aws:kms
                    bucketKeyEnabled: true
            {{- end }}

            ---
            # Bucket Versioning
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: BucketVersioning
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: versioning
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                bucketRef:
                  name: {{ $bucketName }}
                region: {{ $region }}
                versioningConfiguration:
                  status: {{ if $enableVersioning }}Enabled{{ else }}Suspended{{ end }}

            ---
            # Bucket Ownership Controls - Disable ACLs by default
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: BucketOwnershipControls
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ownership-controls
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                bucketRef:
                  name: {{ $bucketName }}
                region: {{ $region }}
                rule:
                  objectOwnership: {{ if $enableAcl }}ObjectWriter{{ else }}BucketOwnerEnforced{{ end }}

            ---
            # IAM User for bucket access
            apiVersion: iam.aws.m.upbound.io/v1beta1
            kind: User
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: iam-user
                crossplane.io/external-name: {{ $bucketName }}
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                tags:
                  bucket: {{ $bucketName }}

            ---
            # IAM Policy for full bucket access
            apiVersion: iam.aws.m.upbound.io/v1beta1
            kind: Policy
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: iam-policy
                crossplane.io/external-name: {{ $bucketName }}
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                policy: |
                  {
                    "Version": "2012-10-17",
                    "Statement": [
                      {
                        "Effect": "Allow",
                        "Action": "s3:*",
                        "Resource": [
                          "arn:aws:s3:::{{ $bucketName }}",
                          "arn:aws:s3:::{{ $bucketName }}/*"
                        ]
                      }
                    ]
                  }

            ---
            # Attach policy to user
            apiVersion: iam.aws.m.upbound.io/v1beta1
            kind: UserPolicyAttachment
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: iam-user-policy-attachment
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                policyArnRef:
                  name: {{ $bucketName }}
                userRef:
                  name: {{ $bucketName }}

            ---
            # IAM Access Key for user
            apiVersion: iam.aws.m.upbound.io/v1beta1
            kind: AccessKey
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: iam-access-key
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                userRef:
                  name: {{ $bucketName }}
              writeConnectionSecretToRef:
                name: {{ $bucketName }}-access-key

    - step: detect-readiness
      functionRef:
        name: function-auto-ready
---
apiVersion: storage.entigo.com/v1alpha1
kind: Bucket
metadata:
  name: taivotestbucket
spec:
  parameters: {}
