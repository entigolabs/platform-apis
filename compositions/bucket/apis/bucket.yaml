apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: buckets.storage.entigo.com
spec:
  scope: Namespaced
  group: storage.entigo.com
  names:
    kind: Bucket
    plural: buckets
    shortNames:
      - s3
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties: {}
---
apiVersion: apiextensions.crossplane.io/v1alpha1
kind: ManagedResourceActivationPolicy
metadata:
  name: platform-apis-bucket
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  activate:
    - users.iam.aws.m.upbound.io
    - accesskeys.iam.aws.m.upbound.io
    - secrets.secretsmanager.aws.m.upbound.io
    - secretversions.secretsmanager.aws.m.upbound.io
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: platform-apis-storage
data:
  awsProvider: crossplane-aws
  awsRegion: eu-north-1
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: buckets.storage.entigo.com
spec:
  compositeTypeRef:
    apiVersion: storage.entigo.com/v1alpha1
    kind: Bucket
  mode: Pipeline
  pipeline:
    - step: render-bucket-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            # Get required resources
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              environmentConfig:
                apiVersion: apiextensions.crossplane.io/v1beta1
                kind: EnvironmentConfig
                matchName: platform-apis-storage
            ---
            {{- $envConfig := mustFirst (getExtraResources . "environmentConfig") }}

            {{- $bucketName := .observed.composite.resource.metadata.name }}

            {{- /* Get config from environment */ -}}
            {{- $region := $envConfig.resource.data.awsRegion }}
            {{- $providerConfigRef := $envConfig.resource.data.awsProvider }}
            ---
            # IAM User for bucket access
            apiVersion: iam.aws.m.upbound.io/v1beta1
            kind: User
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: iam-user
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                tags:
                  bucket: {{ $bucketName }}

            ---
            # IAM Access Key for user
            apiVersion: iam.aws.m.upbound.io/v1beta1
            kind: AccessKey
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: iam-access-key
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                userRef:
                  name: {{ $bucketName }}
              writeConnectionSecretToRef:
                name: {{ $bucketName }}

            ---
            # AWS Secrets Manager Secret
            apiVersion: secretsmanager.aws.m.upbound.io/v1beta1
            kind: Secret
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: secrets-manager-secret
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                name: {{ $bucketName }}
                region: {{ $region }}
                description: IAM credentials for S3 bucket {{ $bucketName }}

            ---
            # AWS Secrets Manager Secret Version
            apiVersion: secretsmanager.aws.m.upbound.io/v1beta1
            kind: SecretVersion
            metadata:
              name: {{ $bucketName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: secrets-manager-version
            spec:
              providerConfigRef:
                name: {{ $providerConfigRef }}
                kind: ClusterProviderConfig
              forProvider:
                region: {{ $region }}
                secretIdRef:
                  name: {{ $bucketName }}
                secretStringSecretRef:
                  name: {{ $bucketName }}
                  key: password

    - step: detect-readiness
      functionRef:
        name: function-auto-ready
---
apiVersion: storage.entigo.com/v1alpha1
kind: Bucket
metadata:
  name: taivotestbucketuser
spec:
  parameters: {}
