apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: buckets.storage.entigo.com
spec:
  scope: Namespaced
  group: storage.entigo.com
  names:
    kind: Bucket
    plural: buckets
    shortNames:
      - s3
      - s3buckets
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    enableVersioning:
                      description: Enable versioning for the S3 bucket
                      type: boolean
                      default: false
                    publicAccess:
                      description: Allow public access to the bucket
                      type: boolean
                      default: false
                    kmsKeyId:
                      description: KMS key ID for bucket encryption
                      type: string
                    enableAcl:
                      description: Enable ACLs for the bucket
                      type: boolean
                      default: false
                    bucketKeyEnabled:
                      description: Enable bucket keys for KMS encryption
                      type: boolean
                      default: true
