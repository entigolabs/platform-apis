apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: repositories.artifact.entigo.com
spec:
  scope: Namespaced
  group: artifact.entigo.com
  names:
    kind: Repository
    plural: repositories
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            status:
              type: object
              properties:
                repositoryUri:
                  type: string
                  description: "Repository URI for pulling and pushing images."
