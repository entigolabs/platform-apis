server {
    listen       ${PORT};
    server_name  localhost;

    root /var/docusaurus;
    index index.html;

    # Force correct scheme and host in redirects
    absolute_redirect off;
    port_in_redirect off;
    server_name_in_redirect off;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 10.0.0.0/8;

    # Security
    location ~ /\.(?!well-known) {
        deny all;
    }

    # PostHog configuration file. This file is generated at launch time by the configuration template script. 
    location = /posthog-config.js {
        root /var/docusaurus;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/javascript";
    }

    # PostHog static assets - trailing slashes preserve path mapping
    location ^~ /ingest/static/ {

        rewrite ^/ingest/static/(.*)$ /static/$1 break;

        proxy_pass https://${POSTHOG_CLOUD_REGION}-assets.i.posthog.com;
        proxy_set_header Host "${POSTHOG_CLOUD_REGION}-assets.i.posthog.com";
        proxy_ssl_server_name on;
        
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    # PostHog reverse proxy
    location ^~ /ingest/ {
        rewrite ^/ingest/(.*)$ /$1 break;

        proxy_pass https://${POSTHOG_CLOUD_REGION}.i.posthog.com;
        
        proxy_set_header Host ${POSTHOG_CLOUD_REGION}.i.posthog.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_http_version 1.1;
        
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html =404;
    }

    # Prevent caching of HTML files
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript;

    error_page 404 /404.html;
}